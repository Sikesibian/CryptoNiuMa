<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sig-glow-advanced" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#1A237E" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="doc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <linearGradient id="gold-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCA28"/>
      <stop offset="50%" stop-color="#FFF8E1"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="wax-seal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="50%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#B71C1C"/>
    </linearGradient>
    <linearGradient id="pen-main" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1C2833"/>
      <stop offset="50%" stop-color="#455A64"/>
      <stop offset="100%" stop-color="#1C2833"/>
    </linearGradient>
  </defs>
  
  <g filter="url(#sig-glow-advanced)">
    <!-- Elegant floating document -->
    <g style="transform-origin: 512px 512px;">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="5s" repeatCount="indefinite" />
      
      <!-- Document Paper -->
      <rect x="182" y="82" width="660" height="860" rx="10" fill="url(#doc-bg)" stroke="#E0E0E0" stroke-width="1" />
      
      <!-- Outer Gold Border -->
      <rect x="212" y="112" width="600" height="800" fill="none" stroke="url(#gold-border)" stroke-width="4" />
      <!-- Inner delicate border -->
      <rect x="222" y="122" width="580" height="780" fill="none" stroke="url(#gold-border)" stroke-width="1.5" />
      
      <!-- Header block -->
      <polygon points="412,112 612,112 632,192 392,192" fill="#1565C0" />
      <path d="M492 152 A20 20 0 1 1 532 152 A20 20 0 1 1 492 152" fill="url(#gold-border)" />
      
      <!-- Title Lines -->
      <rect x="312" y="260" width="400" height="12" rx="6" fill="#9E9E9E" />
      <rect x="362" y="300" width="300" height="10" rx="5" fill="#BDBDBD" />
      
      <!-- Paragraphs -->
      <rect x="312" y="380" width="400" height="8" rx="4" fill="#E0E0E0" />
      <rect x="312" y="405" width="400" height="8" rx="4" fill="#E0E0E0" />
      <rect x="312" y="430" width="350" height="8" rx="4" fill="#E0E0E0" />
      <rect x="312" y="455" width="380" height="8" rx="4" fill="#E0E0E0" />

      <!-- Approval Text -->
      <text x="312" y="550" font-family="'Times New Roman', Times, serif" font-style="italic" font-size="28" fill="#424242">Committee Approval:</text>
      
      <!-- Signature Line 1 -->
      <line x1="312" y1="650" x2="562" y2="650" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="6 4" />
      <text x="312" y="675" font-family="'Segoe UI', sans-serif" font-size="14" fill="#757575" font-weight="bold">ADVISOR / CHAIR</text>
      
      <!-- Signature Line 2 -->
      <line x1="312" y1="760" x2="562" y2="760" stroke="#BDBDBD" stroke-width="2" stroke-dasharray="6 4" />
      <text x="312" y="785" font-family="'Segoe UI', sans-serif" font-size="14" fill="#757575" font-weight="bold">COMMITTEE MEMBER</text>
      
      <!-- Wax Seal Ribbons -->
      <path d="M 680 730 L 660 850 L 690 830 L 720 850 L 700 730 Z" fill="#1565C0" />
      <path d="M 690 730 L 700 870 L 730 840 L 760 860 L 740 730 Z" fill="#0D47A1" />
      
      <!-- Wax Seal Base -->
      <circle cx="712" cy="722" r="50" fill="url(#wax-seal)" />
      <circle cx="712" cy="722" r="42" fill="none" stroke="#FFCDD2" stroke-width="1.5" opacity="0.5" stroke-dasharray="6 3" />
      <polygon points="712,695 719,712 738,715 725,728 728,746 712,737 696,746 699,728 686,715 705,712" fill="#FFCDD2" opacity="0.8" />
      
      <!-- Static Background Signature (Line 2) -->
      <path d="M 320 745 Q 340 700 350 750 T 380 725 T 400 750 Q 420 710 440 740 T 480 725 T 500 750 Q 520 710 540 740" fill="none" stroke="#37474F" stroke-width="4" stroke-linecap="round" opacity="0.4" />

      <!-- Animated Signature Path (Line 1) -->
      <path d="M 320 635 C 340 580, 360 625, 370 640 C 380 570, 400 610, 410 635 C 420 590, 440 630, 445 645 C 455 620, 465 600, 475 635 C 495 580, 520 620, 540 645 C 550 570, 570 630, 580 600" 
            fill="none" stroke="#1565C0" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0 1500; 1500 0; 1500 0" keyTimes="0; 0.6; 1" dur="5s" repeatCount="indefinite" />
      </path>
      
      <!-- Fountain Pen Animation Group -->
      <g>
        <animateTransform attributeName="transform" type="translate" 
           values="320,635; 345,610; 370,640; 390,600; 410,635; 425,615; 445,645; 460,620; 475,635; 505,610; 540,645; 560,600; 580,600; 650,550; 320,635" 
           keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.25; 0.3; 0.35; 0.4; 0.45; 0.5; 0.55; 0.6; 0.8; 1" 
           dur="5s" repeatCount="indefinite" />
           
        <g style="transform-origin: 0px 0px;">
          <animateTransform attributeName="transform" type="rotate" values="10; 0; 15; 5; 10" dur="0.8s" repeatCount="indefinite" />
          
          <g transform="scale(0.85) rotate(140)">
            <!-- Nib -->
            <path d="M0,0 L8,-25 Q0,-35 0,-40 Q0,-35 -8,-25 Z" fill="url(#gold-border)" />
            <!-- Slit & Air hole -->
            <line x1="0" y1="0" x2="0" y2="-20" stroke="#3E2723" stroke-width="1.5" />
            <circle cx="0" cy="-20" r="2" fill="#3E2723" />
            <!-- Nib Base/Grip -->
            <path d="M-10,-28 L10,-28 L14,-60 L-14,-60 Z" fill="#1C2833" />
            <rect x="-15" y="-60" width="30" height="15" fill="url(#gold-border)" rx="2" />
            <rect x="-14" y="-75" width="28" height="5" fill="url(#gold-border)" />
            
            <!-- Barrel -->
            <path d="M-15,-75 L15,-75 L18,-180 Q0,-190 -18,-180 Z" fill="url(#pen-main)" />
            <path d="M-15,-75 L0,-75 L3,-180 Q0,-190 -18,-180 Z" fill="#ECEFF1" opacity="0.08" />
            
            <!-- Golden Cap band and finial -->
            <line x1="-16" y1="-160" x2="16" y2="-160" stroke="url(#gold-border)" stroke-width="6" />
            <path d="M16,-175 Q40,-130 30,-90 Q28,-80 25,-90 Q30,-120 18,-165 Z" fill="url(#gold-border)" />
            <path d="M-18,-180 L18,-180 Q0,-215 -18,-180 Z" fill="url(#gold-border)" />
          </g>
        </g>
      </g>

    </g>
  </g>
</svg>