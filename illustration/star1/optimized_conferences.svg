<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="conf-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#2C3E50" flood-opacity="0.4"/>
    </filter>
  </defs>
  <g filter="url(#conf-glow)">
    <g style="transform-origin: 512px 512px;">
      <animateTransform attributeName="transform" type="rotate" values="-2; 2; -2" dur="4s" repeatCount="indefinite" />
      <!-- Lanyard -->
      <path d="M380 -50 V 150 M640 -50 V 150" stroke="#E74C3C" stroke-width="24" />
      <!-- Clip -->
      <rect x="472" y="120" width="80" height="60" rx="10" fill="#95A5A6" />
      <path d="M492 180 v40 h40 v-40" fill="none" stroke="#7F8C8D" stroke-width="12" />
      <!-- Badge ID Card -->
      <rect x="256" y="220" width="512" height="700" rx="20" fill="#ECF0F1" />
      <rect x="256" y="220" width="512" height="180" rx="20" fill="#34495E" />
      <!-- Fix top corner overlaps -->
      <path d="M256 400 V240 a20 20 0 0 1 20 -20 h472 a20 20 0 0 1 20 20 v160 Z" fill="#34495E" />
      
      <!-- User Photo -->
      <circle cx="512" cy="480" r="100" fill="#BDC3C7" />
      <!-- User silhouette -->
      <path d="M512 430 a40 40 0 1 0 0 -80 a40 40 0 0 0 0 80 zM422 550 c0 -60 50 -100 90 -100 s90 40 90 100" fill="#FFFFFF" />
      
      <!-- Text Lines -->
      <rect x="412" y="640" width="200" height="24" rx="12" fill="#2C3E50" />
      <rect x="362" y="700" width="300" height="16" rx="8" fill="#7F8C8D" />
      <rect x="392" y="740" width="240" height="16" rx="8" fill="#BDC3C7" />
      
      <!-- VIP / Speaker Ribbon -->
      <rect x="256" y="860" width="512" height="60" fill="#1ABC9C" />
      <text x="512" y="900" font-family="Arial, sans-serif" font-weight="bold" font-size="32" fill="#FFFFFF" text-anchor="middle">SPEAKER</text>
    </g>
  </g>
</svg>