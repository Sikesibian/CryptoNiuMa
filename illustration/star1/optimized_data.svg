<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="data-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0D47A1" />
      <stop offset="100%" stop-color="#020C1B" />
    </radialGradient>
    <linearGradient id="db-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0B5394" />
      <stop offset="50%" stop-color="#29B6F6" />
      <stop offset="100%" stop-color="#0B5394" />
    </linearGradient>
    <linearGradient id="db-top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#81D4FA" />
      <stop offset="100%" stop-color="#039BE5" />
    </linearGradient>
    <filter id="data-glow">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="data-shadow">
      <feDropShadow dx="0" dy="30" stdDeviation="25" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#data-bg)" rx="100" />
  
  <!-- Cyber Connections & Nodes Background -->
  <g stroke="#29B6F6" stroke-width="4" opacity="0.3" filter="url(#data-glow)">
    <animateTransform attributeName="transform" type="rotate" from="0 512 512" to="360 512 512" dur="30s" repeatCount="indefinite" />
    <circle cx="512" cy="512" r="400" fill="none" stroke-dasharray="20 40" stroke-width="8" />
    <circle cx="512" cy="512" r="300" fill="none" stroke-dasharray="50 20" />
    <!-- Radiating Lines -->
    <line x1="512" y1="112" x2="512" y2="12" />
    <line x1="512" y1="912" x2="512" y2="1012" />
    <line x1="112" y1="512" x2="12" y2="512" />
    <line x1="912" y1="512" x2="1012" y2="512" />
  </g>

  <!-- Volumetric Glowing Database Stack -->
  <g filter="url(#data-shadow)" style="transform-origin: 512px 512px;">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-25; 0,0" dur="4s" repeatCount="indefinite" ease-in-out="ease-in-out" />
    
    <!-- Tier 3 (Bottom) -->
    <g transform="translate(0, 400)">
      <path d="M 224 300 V 460 C 224 550, 800 550, 800 460 V 300" fill="url(#db-grad)" />
      <ellipse cx="512" cy="300" rx="288" ry="90" fill="url(#db-top)" />
      <!-- Indicator Lights -->
      <circle cx="340" cy="400" r="16" fill="#00E676" filter="url(#data-glow)">
        <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
      </circle>
      <circle cx="400" cy="420" r="16" fill="#00E676" filter="url(#data-glow)" />
      <rect x="640" y="380" width="80" height="20" rx="10" fill="#E0F7FA" opacity="0.8" />
    </g>
    
    <!-- Tier 2 (Middle) -->
    <g transform="translate(0, 200)">
      <animateTransform attributeName="transform" type="translate" values="0,200; 0,185; 0,200" dur="4s" repeatCount="indefinite" additive="sum" />
      <path d="M 224 300 V 460 C 224 550, 800 550, 800 460 V 300" fill="url(#db-grad)" />
      <ellipse cx="512" cy="300" rx="288" ry="90" fill="url(#db-top)" />
      <!-- Indicator Lights -->
      <circle cx="340" cy="400" r="16" fill="#00E676" filter="url(#data-glow)" />
      <circle cx="400" cy="420" r="16" fill="#FF1744" filter="url(#data-glow)">
         <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
      </circle>
      <rect x="640" y="380" width="80" height="20" rx="10" fill="#E0F7FA" opacity="0.8" />
    </g>
    
    <!-- Tier 1 (Top) -->
    <g transform="translate(0, 0)">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite" additive="sum" />
      <path d="M 224 300 V 460 C 224 550, 800 550, 800 460 V 300" fill="url(#db-grad)" />
      <ellipse cx="512" cy="300" rx="288" ry="90" fill="url(#db-top)" />
      <!-- Inner core glow on top -->
      <ellipse cx="512" cy="300" rx="180" ry="50" fill="#E1F5FE" opacity="0.4" filter="url(#data-glow)" />
      <ellipse cx="512" cy="300" rx="80" ry="20" fill="#FFFFFF" filter="url(#data-glow)" />
      <!-- Indicator Lights -->
      <circle cx="340" cy="400" r="16" fill="#00E676" filter="url(#data-glow)" />
      <circle cx="400" cy="420" r="16" fill="#00E676" filter="url(#data-glow)" />
      <rect x="640" y="380" width="80" height="20" rx="10" fill="#00E676" filter="url(#data-glow)">
        <animate attributeName="width" values="0; 80; 80" dur="2s" repeatCount="indefinite" />
      </rect>
    </g>
  </g>
</svg>