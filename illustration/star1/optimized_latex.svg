<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="latex-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#006666" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#latex-glow)">
    <g style="transform-origin: 512px 512px;">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite" />
      
      <rect x="128" y="224" width="768" height="576" rx="120" fill="#006666" />
      <rect x="150" y="246" width="724" height="532" rx="100" fill="#008080" />
      
      <!-- "LaTeX" written with exact relative kerning to simulate the math typesetting -->
      <g fill="#FFFFFF" font-family="'Times New Roman', Times, serif" font-weight="normal">
        <text x="210" y="580" font-size="280">L</text>
        <text x="360" y="440" font-size="200">A</text>
        <text x="490" y="580" font-size="280">T</text>
        <text x="635" y="620" font-size="280">E</text>
        <text x="790" y="580" font-size="280">X</text>
      </g>
    </g>
  </g>
</svg>