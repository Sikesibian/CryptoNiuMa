<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rebuttal-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#E67E22" flood-opacity="0.6"/>
    </filter>
    <filter id="shield-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <linearGradient id="shield-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#DAA520" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <linearGradient id="shield-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E50" />
      <stop offset="100%" stop-color="#1A252F" />
    </linearGradient>
    <linearGradient id="shield-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C" />
      <stop offset="100%" stop-color="#C0392B" />
    </linearGradient>
    <linearGradient id="steel-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ECF0F1" />
      <stop offset="50%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#BDC3C7" />
    </linearGradient>
  </defs>
  
  <g filter="url(#rebuttal-glow)">
    <!-- Animation for floating shield -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="4s" repeatCount="indefinite" />
    
    <!-- Cross Elements (Pen & Sword behind shield) -->
    <g>
      <!-- Sword -->
      <g transform="rotate(45 512 512)">
        <!-- Blade -->
        <path d="M 490 200 L 512 60 L 534 200 L 534 680 L 490 680 Z" fill="url(#steel-light)" />
        <path d="M 512 60 L 534 200 L 534 680 L 512 680 Z" fill="#FFFFFF" opacity="0.5"/>
        <!-- Crossguard / Hilt -->
        <rect x="422" y="680" width="180" height="24" rx="12" fill="url(#shield-gold)" />
        <rect x="492" y="704" width="40" height="120" rx="6" fill="#8E44AD" />
        <circle cx="512" cy="840" r="28" fill="url(#shield-gold)" />
      </g>
      
      <!-- Fountain Pen -->
      <g transform="rotate(-45 512 512)">
        <!-- Nib -->
        <path d="M 512 60 L 544 240 L 480 240 Z" fill="url(#steel-light)" />
        <path d="M 512 110 L 512 210" stroke="#2C3E50" stroke-width="4" stroke-linecap="round"/>
        <circle cx="512" cy="200" r="5" fill="#2C3E50" />
        <!-- Body -->
        <rect x="480" y="240" width="64" height="520" rx="8" fill="#2C3E50" />
        <!-- Gold accents on Pen -->
        <rect x="480" y="240" width="64" height="40" fill="url(#shield-gold)" />
        <rect x="480" y="320" width="64" height="15" fill="url(#shield-gold)" />
        <rect x="480" y="680" width="64" height="80" rx="8" fill="url(#shield-gold)" />
        <circle cx="512" cy="770" r="20" fill="url(#shield-gold)" />
      </g>
    </g>

    <!-- Main Shield -->
    <g>
      <animateTransform attributeName="transform" type="scale" values="1; 1.02; 1" dur="2s" repeatCount="indefinite" />
      
      <!-- Outer Gold Border -->
      <path d="M 512 200 C 760 200, 820 280, 820 500 C 820 780, 512 920, 512 950 C 512 920, 204 780, 204 500 C 204 280, 264 200, 512 200 Z" fill="url(#shield-gold)" stroke="#B8860B" stroke-width="12"/>
      
      <!-- Inner Base -->
      <path d="M 512 230 C 720 230, 780 300, 780 500 C 780 750, 512 880, 512 910 C 512 880, 244 750, 244 500 C 244 300, 304 230, 512 230 Z" fill="url(#shield-core)" />
      
      <!-- Shield Right Half Red Accent -->
      <path d="M 512 230 C 720 230, 780 300, 780 500 C 780 750, 512 880, 512 910 Z" fill="url(#shield-accent)" opacity="0.85"/>

      <!-- Target/Defense Ripple Rings in Center -->
      <circle cx="512" cy="512" r="140" fill="none" stroke="url(#shield-gold)" stroke-width="4" stroke-dasharray="15 15">
        <animateTransform attributeName="transform" type="rotate" values="0 512 512; 360 512 512" dur="15s" repeatCount="indefinite"/>
      </circle>
      <circle cx="512" cy="512" r="90" fill="url(#shield-gold)" opacity="0.15"/>
      <!-- Glowing Core Triangle / Crystal -->
      <path d="M 512 392 L 562 552 L 462 552 Z" fill="#FFFFFF" opacity="0.9" filter="url(#shield-glow)">
         <animateTransform attributeName="transform" type="rotate" values="0 512 512; 360 512 512" dur="4s" repeatCount="indefinite" />
      </path>
    </g>
    
    <!-- Rebuttal Document hovering -->
    <g transform="translate(362, 332)">
       <!-- floating up/down slightly out of sync -->
       <animateTransform attributeName="transform" type="translate" values="362, 342; 362, 322; 362, 342" dur="3s" repeatCount="indefinite" />
       <rect x="0" y="0" width="300" height="400" rx="12" fill="#ECF0F1" filter="url(#shield-glow)"/>
       
       <!-- Document Header -->
       <rect x="40" y="40" width="100" height="30" rx="6" fill="#E74C3C" />
       <rect x="150" y="40" width="110" height="30" rx="6" fill="#34495E" />
       
       <!-- Intro Content -->
       <rect x="40" y="100" width="220" height="12" rx="6" fill="#BDC3C7" />
       <rect x="40" y="125" width="180" height="12" rx="6" fill="#BDC3C7" />
       
       <!-- Reviewer Points vs Responses -->
       <!-- Reviewer 1 -->
       <rect x="40" y="170" width="100" height="16" rx="8" fill="#E74C3C" opacity="0.8"/>
       <!-- Checkmark / Response writing -->
       <path d="M 40 220 L 60 240 L 110 190" fill="none" stroke="#2ECC71" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
         <animate attributeName="stroke-dasharray" values="0 100; 100 100" dur="2s" repeatCount="indefinite" />
       </path>
       <rect x="130" y="210" width="130" height="12" rx="6" fill="#2ECC71" />
       <rect x="130" y="235" width="90" height="12" rx="6" fill="#2ECC71" />
       
       <!-- Signature stamp Base -->
       <circle cx="230" cy="330" r="30" fill="#E74C3C" />
       <circle cx="230" cy="330" r="22" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-dasharray="4 4"/>
       <!-- Inner Star for Stamp -->
       <path d="M 230 315 L 234 325 L 245 325 L 237 331 L 240 341 L 230 335 L 220 341 L 223 331 L 215 325 L 226 325 Z" fill="#F1C40F"/>
    </g>
    
    <!-- Sparkles / Atmosphere -->
    <g fill="#F1C40F">
      <circle cx="260" cy="300" r="8">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="4; 8; 4" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="800" cy="650" r="10">
        <animate attributeName="opacity" values="0.1; 0.9; 0.1" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
        <animate attributeName="r" values="5; 10; 5" dur="2.5s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="750" cy="250" r="6">
        <animate attributeName="opacity" values="0.3; 1; 0.3" dur="2s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="750" r="7">
        <animate attributeName="opacity" values="0.2; 1; 0.2" dur="1.8s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>
</svg>