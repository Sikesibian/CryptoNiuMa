<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="response-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#4CAF50" flood-opacity="0.3"/>
    </filter>
  </defs>
  <g filter="url(#response-glow)">
    <g style="transform-origin: 512px 512px;">
      
      <!-- Bubble 1: Reviewer (Left) -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; -10,-10; 0,0" dur="3s" repeatCount="indefinite" />
        <rect x="150" y="200" width="500" height="260" rx="40" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="10" />
        <polygon points="250,460 200,550 320,460" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="10" />
        <line x1="220" y1="280" x2="580" y2="280" stroke="#BDBDBD" stroke-width="20" stroke-linecap="round" />
        <line x1="220" y1="360" x2="400" y2="360" stroke="#BDBDBD" stroke-width="20" stroke-linecap="round" />
      </g>
      
      <!-- Bubble 2: Author Response (Right) -->
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 10,10; 0,0" dur="3s" begin="1.5s" repeatCount="indefinite" />
        <rect x="374" y="550" width="500" height="260" rx="40" fill="#4CAF50" />
        <polygon points="774,810 824,900 704,810" fill="#4CAF50" />
        
        <!-- Animated typing dots -->
        <circle cx="504" cy="680" r="20" fill="#FFFFFF">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" />
        </circle>
        <circle cx="624" cy="680" r="20" fill="#FFFFFF">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="0.5s" repeatCount="indefinite" />
        </circle>
        <circle cx="744" cy="680" r="20" fill="#FFFFFF">
          <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" begin="1s" repeatCount="indefinite" />
        </circle>
      </g>

    </g>
  </g>
</svg>