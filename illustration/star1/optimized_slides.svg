<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Opulent Cinematic Glows -->
    <filter id="fancy-screen-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="35" flood-color="#E2E8F0" flood-opacity="0.2"/>
    </filter>
    <filter id="fancy-gold-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#F59E0B" flood-opacity="0.8"/>
    </filter>
    <filter id="fancy-ambient-shadow">
      <feDropShadow dx="0" dy="50" stdDeviation="40" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    
    <!-- Extreme Gradients for High Definition -->
    <linearGradient id="fancy-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    
    <!-- The Bright Glowing Screen itself -->
    <linearGradient id="fancy-screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="80%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- Projector Beams -->
    <linearGradient id="fancy-beam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#F1F5F9" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>

    <!-- Fancy Gold Gradient for ZKP Details -->
    <linearGradient id="fancy-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A" />
      <stop offset="50%" stop-color="#F59E0B" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
  </defs>

  <g>
    <!-- The Bright Fancy Screen -->
    <g filter="url(#fancy-ambient-shadow)" style="transform-origin: 512px 350px;">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-20; 0,0" dur="6s" repeatCount="indefinite" ease-in-out="ease-in-out" />
      
      <!-- Elegant White Glass Screen -->
      <rect x="64" y="100" width="896" height="560" rx="20" fill="url(#fancy-screen)" stroke="#CBD5E1" stroke-width="4" filter="url(#fancy-screen-glow)"/>
      
      <!-- Top Bezel / Header in Premium Dark -->
      <path d="M 64 160 Q 64 100 124 100 L 900 100 Q 960 100 960 160 Z" fill="#0F172A" />

      <text x="512" y="138" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="20" fill="#F8FAFC" text-anchor="middle" letter-spacing="8">ZERO-KNOWLEDGE</text>

      <!-- Advanced Fancy Content on Bright Screen -->
      <g transform="translate(0, -10)">
        
        <!-- Highly Styled Background Grid on the White Screen -->
        <g stroke="#E2E8F0" stroke-width="1" opacity="0.6">
           <line x1="80" y1="220" x2="944" y2="220" />
           <line x1="80" y1="320" x2="944" y2="320" />
           <line x1="80" y1="420" x2="944" y2="420" />
           <line x1="80" y1="520" x2="944" y2="520" />
           <line x1="330" y1="180" x2="330" y2="600" />
           <line x1="694" y1="180" x2="694" y2="600" />
        </g>

        <!-- Left Node: Prover P -->
        <g transform="translate(200, 370)">
           <circle cx="0" cy="0" r="60" fill="#FFFFFF" stroke="#0F172A" stroke-width="8" filter="url(#fancy-screen-glow)"/>
           <text x="0" y="20" font-family="'Times New Roman', serif" font-weight="bold" font-size="60" fill="#0F172A" text-anchor="middle">P</text>
           <text x="0" y="90" font-family="sans-serif" font-weight="bold" font-size="18" fill="#475569" text-anchor="middle">PROVER</text>
        </g>

        <!-- Right Node: Verifier V -->
        <g transform="translate(824, 370)">
           <circle cx="0" cy="0" r="60" fill="#0F172A" stroke="#0F172A" stroke-width="8" filter="url(#fancy-screen-glow)"/>
           <text x="0" y="20" font-family="'Times New Roman', serif" font-weight="bold" font-size="60" fill="#FFFFFF" text-anchor="middle">V</text>
           <text x="0" y="90" font-family="sans-serif" font-weight="bold" font-size="18" fill="#475569" text-anchor="middle">VERIFIER</text>
        </g>

        <!-- Dynamic Connection Channel -->
        <path d="M 270 370 L 754 370" fill="none" stroke="#CBD5E1" stroke-width="12" stroke-linecap="round"/>
        <path d="M 270 370 L 754 370" fill="none" stroke="url(#fancy-gold)" stroke-width="6" stroke-linecap="round" stroke-dasharray="24 16">
           <animate attributeName="stroke-dashoffset" values="40; 0" dur="1s" repeatCount="indefinite" />
        </path>

        <!-- Glorious Centerpiece (The Zero Knowledge Shield & Proof) -->
        <g transform="translate(512, 370)">
           <!-- Majestic Rotating Star/Shield Base -->
           <path d="M 0 -110 L 25 -30 L 105 -30 L 40 20 L 65 100 L 0 50 L -65 100 L -40 20 L -105 -30 L -25 -30 Z" fill="url(#fancy-gold)" filter="url(#fancy-gold-glow)">
             <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="20s" repeatCount="indefinite" />
           </path>
           <circle cx="0" cy="0" r="70" fill="#0F172A" stroke="#FFFFFF" stroke-width="6" />
           <!-- Pulsing Pi -->
           <text x="0" y="25" font-family="'Times New Roman', serif" font-style="italic" font-weight="bold" font-size="70" fill="#FFFFFF" text-anchor="middle">π</text>
        </g>
        
        <!-- Beautiful Math Equation Banner at the bottom -->
        <rect x="262" y="520" width="500" height="80" rx="40" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="4" filter="url(#fancy-screen-glow)"/>
        <text x="512" y="572" font-family="'Courier New', monospace" font-weight="bold" font-size="32" fill="#0F172A" text-anchor="middle">Verify(vk, x, <tspan fill="#F59E0B">π</tspan>) ≡ 1</text>
      </g>
    </g>

    <!-- Fancy Projector / Presentation Base -->
    <g style="transform-origin: 512px 860px;">
      <!-- Sculptural Premium Podium -->
      <path d="M 380 1024 L 644 1024 L 644 1000 L 380 1000 Z" fill="#020617" />
      <path d="M 420 840 C 440 900, 400 950, 380 1000 L 644 1000 C 624 950, 584 900, 604 840 Z" fill="#0F172A" stroke="#1E293B" stroke-width="4"/>
      
      <!-- Luminous Gold Accent Rings -->
      <ellipse cx="512" cy="840" rx="90" ry="25" fill="#020617" stroke="url(#fancy-gold)" stroke-width="6" filter="url(#fancy-gold-glow)"/>
      <ellipse cx="512" cy="840" rx="70" ry="18" fill="#1E293B" />
      <ellipse cx="512" cy="840" rx="40" ry="10" fill="#FFFFFF" filter="url(#fancy-screen-glow)"/>
      
      <!-- Energy Particles floating from projector -->
      <g fill="#F59E0B">
        <circle cx="480" cy="800" r="4">
          <animateTransform attributeName="transform" type="translate" values="0,0; -40,-150" dur="3s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1; 0" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="540" cy="810" r="5">
          <animateTransform attributeName="transform" type="translate" values="0,0; 50,-180" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1; 0" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="512" cy="790" r="3">
          <animateTransform attributeName="transform" type="translate" values="0,0; 0,-200" dur="2.5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="1; 0" dur="2.5s" repeatCount="indefinite"/>
        </circle>
      </g>
    </g>
  </g>
</svg>