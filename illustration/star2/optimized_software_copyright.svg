<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Official Authority Background (Deep Red) -->
    <radialGradient id="official-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#991B1B" /> <!-- Red 800 -->
      <stop offset="100%" stop-color="#450A0A" /> <!-- Red 950 -->
    </radialGradient>
    
    <!-- Luxury Gold Finish for Borders and Seals -->
    <linearGradient id="gold-metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF08A" />
      <stop offset="40%" stop-color="#D4AF37" />
      <stop offset="60%" stop-color="#B45309" />
      <stop offset="100%" stop-color="#FCD34D" />
    </linearGradient>

    <!-- Certificate Paper Texture -->
    <linearGradient id="cert-paper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#FCFAED" />
      <stop offset="100%" stop-color="#F3E7C9" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="cert-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="light-glow">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#official-bg)" rx="100" />
  
  <!-- Background Security Guilloche (Ambient concentric waves) -->
  <g opacity="0.15" fill="none" stroke="url(#gold-metal)" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="0 512 512; 360 512 512" dur="60s" repeatCount="indefinite" />
    <circle cx="512" cy="512" r="300" stroke-dasharray="10 20" />
    <circle cx="512" cy="512" r="450" stroke-dasharray="4 12" />
    <circle cx="512" cy="512" r="600" stroke-dasharray="20 40" />
    <!-- Dynamic wavy star -->
    <path d="M 512 112 Q 612 412 912 512 Q 612 612 512 912 Q 412 612 112 512 Q 412 412 512 112 Z" opacity="0.5" />
  </g>

  <!-- Central Certificate Main Body -->
  <g transform="translate(512, 512)" filter="url(#cert-shadow)">
    <!-- Gentle authority floating -->
    <animateTransform attributeName="transform" type="translate" values="512,512; 512,500; 512,512" dur="8s" repeatCount="indefinite" ease-in-out="ease-in-out" />
    
    <!-- Paper Base -->
    <rect x="-380" y="-440" width="760" height="880" rx="4" fill="url(#cert-paper)" />
    
    <!-- Golden Ornate Outer Border -->
    <rect x="-350" y="-410" width="700" height="820" fill="none" stroke="url(#gold-metal)" stroke-width="6" />
    <!-- Ornamental Corners -->
    <path d="M -360 -390 L -330 -390 M -360 -380 L -330 -380 M -390 -360 L -390 -330 M -380 -360 L -380 -330" stroke="url(#gold-metal)" stroke-width="3" fill="none"/>
    <path d="M 360 -390 L 330 -390 M 360 -380 L 330 -380 M 390 -360 L 390 -330 M 380 -360 L 380 -330" stroke="url(#gold-metal)" stroke-width="3" fill="none"/>
    <path d="M -360 390 L -330 390 M -360 380 L -330 380 M -390 360 L -390 330 M -380 360 L -380 330" stroke="url(#gold-metal)" stroke-width="3" fill="none"/>
    <path d="M 360 390 L 330 390 M 360 380 L 330 380 M 390 360 L 390 330 M 380 360 L 380 330" stroke="url(#gold-metal)" stroke-width="3" fill="none"/>

    <!-- Inner Slim Border -->
    <rect x="-335" y="-395" width="670" height="790" fill="none" stroke="#D4AF37" stroke-width="2" />
    
    <!-- Certificate Header (Official Crest Placeholder) -->
    <g transform="translate(0, -320)">
      <circle cx="0" cy="0" r="30" fill="url(#gold-metal)" />
      <circle cx="0" cy="0" r="24" fill="#991B1B" />
      <path d="M 0 -15 L 4 -4 L 15 -4 L 6 4 L 9 15 L 0 8 L -9 15 L -6 4 L -15 -4 L -4 -4 Z" fill="#FDE047" />
    </g>

    <!-- Certificate Title Lines -->
    <rect x="-200" y="-250" width="400" height="16" fill="#7F1D1D" rx="2" />
    <rect x="-120" y="-210" width="240" height="10" fill="#991B1B" rx="2" opacity="0.8" />
    
    <!-- Formal Text Placeholders -->
    <g fill="#A8A292" rx="4">
      <rect x="-260" y="-140" width="120" height="8" />  <rect x="-120" y="-140" width="380" height="8" fill="#4B5563" />
      <rect x="-260" y="-100" width="100" height="8" />  <rect x="-140" y="-100" width="300" height="8" fill="#4B5563" />
      <rect x="-260" y="-60" width="150" height="8" />   <rect x="-90" y="-60" width="250" height="8" fill="#4B5563" />
    </g>

    <!-- Protected Asset: Code Block Display -->
    <g transform="translate(0, 100)">
       <rect x="-260" y="-80" width="520" height="180" rx="10" fill="#1E293B" stroke="#475569" stroke-width="2" />
       <!-- Window Header -->
       <path d="M -260 -50 L 260 -50" stroke="#334155" stroke-width="2" />
       <circle cx="-230" cy="-65" r="5" fill="#EF4444" />
       <circle cx="-210" cy="-65" r="5" fill="#F59E0B" />
       <circle cx="-190" cy="-65" r="5" fill="#10B981" />
       <text x="0" y="-60" font-family="monospace" font-weight="bold" font-size="12" fill="#94A3B8" text-anchor="middle">source_code_protected.js</text>
       
       <!-- Code Lines (Abstract) -->
       <g stroke-linecap="round" stroke-width="6">
         <line x1="-220" y1="-20" x2="-80" y2="-20" stroke="#38BDF8" />
         <line x1="-220" y1="10" x2="40" y2="10" stroke="#A78BFA" />
         <line x1="-190" y1="40" x2="100" y2="40" stroke="#34D399" />
         <line x1="-190" y1="70" x2="-50" y2="70" stroke="#FBBF24" />
       </g>
       
       <!-- Authenticated Code Highlight -->
       <rect x="-240" y="-35" width="480" height="24" fill="#3B82F6" opacity="0.1" rx="4" />
    </g>

    <!-- Signature / Issue Date Area -->
    <g fill="#A8A292" rx="4" transform="translate(0, 310)">
      <rect x="60" y="-20" width="180" height="8" fill="#4B5563" />
      <rect x="100" y="10" width="140" height="8" fill="#4B5563" />
    </g>

    <!-- Security Elements Group -->
    
    <!-- 1. Holographic Gold Seal (Bottom Left) -->
    <g transform="translate(-200, 290)">
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="15s" repeatCount="indefinite" />
      <path d="M 0 -50 L 12 -38 L 30 -42 L 28 -24 L 45 -15 L 34 0 L 45 15 L 28 24 L 30 42 L 12 38 L 0 50 L -12 38 L -30 42 L -28 24 L -45 15 L -34 0 L -45 -15 L -28 -24 L -30 -42 L -12 -38 Z" fill="url(#gold-metal)" filter="url(#light-glow)" />
      <circle cx="0" cy="0" r="28" fill="#FFFBEB" opacity="0.8" />
      <path d="M 0 -18 L 4 -5 L 17 -5 L 7 5 L 11 18 L 0 10 L -11 18 L -7 5 L -17 -5 L -4 -5 Z" fill="url(#gold-metal)" />
      <circle cx="0" cy="0" r="20" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="2 4" />
    </g>

    <!-- 2. Official Red Registration Stamp (Bottom Right Authority Cover) -->
    <g transform="translate(160, 260)" opacity="0.85">
      <!-- Stamp Base -->
      <circle cx="0" cy="0" r="85" fill="none" stroke="#DC2626" stroke-width="10" />
      <circle cx="0" cy="0" r="72" fill="none" stroke="#DC2626" stroke-width="2" />
      
      <!-- Inner Star representing State/Official Authority -->
      <path d="M 0 -40 L 12 -12 L 40 -12 L 18 6 L 25 35 L 0 18 L -25 35 L -18 6 L -40 -12 L -12 -12 Z" fill="#DC2626" />
      
      <!-- Abstract Stamp Text (Radial Dashes) -->
      <g stroke="#DC2626" stroke-width="4" stroke-linecap="round">
        <path d="M -60 0 A 60 60 0 0 1 60 0" fill="none" stroke-dasharray="14 10" />
        <path d="M -45 45 A 60 60 0 0 0 45 45" fill="none" stroke-dasharray="8 12" />
      </g>
    </g>
  </g>
</svg>