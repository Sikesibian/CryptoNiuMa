<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional Technical Background Gradient -->
    <linearGradient id="tech-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" /> <!-- Slate 900 -->
      <stop offset="100%" stop-color="#1E293B" /> <!-- Slate 800 -->
    </linearGradient>
    
    <!-- Blueprint Grid Pattern -->
    <pattern id="blueprint-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="1" opacity="0.5" />
    </pattern>

    <!-- Paper Gradient -->
    <linearGradient id="paper-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F8FAFC" />
    </linearGradient>

    <linearGradient id="accent-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>

    <!-- Realistic Professional Shadow -->
    <filter id="pro-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.3" />
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#tech-bg)" rx="80" />
  <rect width="1024" height="1024" fill="url(#blueprint-grid)" rx="80" />
  
  <!-- Abstract Technical Network Background -->
  <g opacity="0.3" stroke="#475569" stroke-width="2" fill="none">
    <path d="M 100 200 L 300 150 L 500 300 L 800 250 L 900 400" />
    <path d="M 200 800 L 400 700 L 600 850 L 850 750" />
    <circle cx="300" cy="150" r="4" fill="#64748B" />
    <circle cx="500" cy="300" r="4" fill="#64748B" />
    <circle cx="800" cy="250" r="4" fill="#64748B" />
    <circle cx="400" cy="700" r="4" fill="#64748B" />
    <circle cx="600" cy="850" r="4" fill="#64748B" />
  </g>

  <!-- Main Composition Container -->
  <g filter="url(#pro-shadow)">
    <!-- Precise Hover Animation -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="6s" repeatCount="indefinite" ease-in-out="ease-in-out" />
    
    <!-- Document Folder / Clipboard Base -->
    <g transform="translate(512, 530)">
      <!-- Back Folder -->
      <rect x="-260" y="-350" width="520" height="700" rx="12" fill="#334155" stroke="#1E293B" stroke-width="4" />
      
      <!-- Report Paper -->
      <rect x="-240" y="-330" width="480" height="660" rx="4" fill="url(#paper-grad)" />
      
      <!-- Document Header -->
      <rect x="-200" y="-280" width="160" height="32" rx="4" fill="url(#accent-blue)" />
      <line x1="-20" y1="-270" x2="200" y2="-270" stroke="#94A3B8" stroke-width="8" stroke-linecap="round" />
      <line x1="-20" y1="-250" x2="140" y2="-250" stroke="#CBD5E1" stroke-width="8" stroke-linecap="round" />

      <!-- Text lines -->
      <g stroke="#E2E8F0" stroke-width="8" stroke-linecap="round">
        <line x1="-200" y1="-190" x2="200" y2="-190" stroke="#94A3B8" />
        <line x1="-200" y1="-160" x2="200" y2="-160" />
        <line x1="-200" y1="-130" x2="100" y2="-130" />
        <line x1="-200" y1="-100" x2="160" y2="-100" />
      </g>

      <!-- Formal Data Chart Section -->
      <rect x="-200" y="-40" width="400" height="220" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="2" />
      
      <!-- Grid within chart -->
      <g stroke="#E2E8F0" stroke-width="2">
        <line x1="-160" y1="0" x2="160" y2="0" />
        <line x1="-160" y1="40" x2="160" y2="40" />
        <line x1="-160" y1="80" x2="160" y2="80" />
        <line x1="-160" y1="120" x2="160" y2="120" />
      </g>

      <!-- Graph Bars -->
      <rect x="-140" y="60" width="40" height="100" rx="4" fill="#64748B">
        <animate attributeName="height" values="40; 100; 40" dur="5s" repeatCount="indefinite" />
        <animate attributeName="y" values="120; 60; 120" dur="5s" repeatCount="indefinite" />
      </rect>
      <rect x="-70" y="20" width="40" height="140" rx="4" fill="#3B82F6">
        <animate attributeName="height" values="100; 140; 100" dur="6s" repeatCount="indefinite" />
        <animate attributeName="y" values="60; 20; 60" dur="6s" repeatCount="indefinite" />
      </rect>
      <rect x="0" y="80" width="40" height="80" rx="4" fill="#0EA5E9">
        <animate attributeName="height" values="80; 120; 80" dur="4s" repeatCount="indefinite" />
        <animate attributeName="y" values="80; 40; 80" dur="4s" repeatCount="indefinite" />
      </rect>
      <rect x="70" y="40" width="40" height="120" rx="4" fill="#0284C7">
        <animate attributeName="height" values="120; 90; 120" dur="5.5s" repeatCount="indefinite" />
        <animate attributeName="y" values="40; 70; 40" dur="5.5s" repeatCount="indefinite" />
      </rect>
      <rect x="140" y="90" width="40" height="70" rx="4" fill="#38BDF8">
        <animate attributeName="height" values="50; 70; 50" dur="4.2s" repeatCount="indefinite" />
        <animate attributeName="y" values="110; 90; 110" dur="4.2s" repeatCount="indefinite" />
      </rect>

      <!-- Line Chart Overlay -->
      <path d="M -120 40 L -50 10 L 20 60 L 90 25 L 160 80" fill="none" stroke="#F59E0B" stroke-width="4" stroke-linejoin="round" />
      <circle cx="-120" cy="40" r="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
      <circle cx="-50" cy="10" r="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
      <circle cx="20" cy="60" r="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
      <circle cx="90" cy="25" r="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
      <circle cx="160" cy="80" r="6" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />
    </g>

    <!-- Technical UI Elements -->
    
    <!-- Data Analysis Widget (Left) -->
    <g transform="translate(180, 360)">
      <animateTransform attributeName="transform" type="translate" values="180,360; 180,345; 180,360" dur="7s" repeatCount="indefinite" />
      <rect x="-100" y="-80" width="200" height="160" rx="12" fill="#1E293B" stroke="#334155" stroke-width="2" filter="url(#pro-shadow)" />
      <text x="-70" y="-45" font-family="monospace" font-size="14" fill="#94A3B8">SYS.ANALYSIS</text>
      <circle cx="-80" cy="-50" r="4" fill="#10B981" filter="url(#glow)">
         <animate attributeName="opacity" values="1; 0.2; 1" dur="2s" repeatCount="indefinite" />
      </circle>
      <!-- Radar/Scanner style visual -->
      <circle cx="0" cy="20" r="45" fill="none" stroke="#334155" stroke-width="2" />
      <circle cx="0" cy="20" r="30" fill="none" stroke="#334155" stroke-width="2" />
      <path d="M 0 20 L 40 -20" stroke="#38BDF8" stroke-width="3" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" values="0 0 20; 360 0 20" dur="4s" repeatCount="indefinite" />
      </path>
    </g>

    <!-- Precision Gears (Right) -->
    <g transform="translate(800, 320)">
      <animateTransform attributeName="transform" type="translate" values="800,320; 800,340; 800,320" dur="6.5s" repeatCount="indefinite" />
      <!-- Tech Gear 1 -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" />
        <path d="M -15 -60 L 15 -60 L 22 -40 L 40 -40 L 48 -15 L 60 -5 L 60 15 L 48 22 L 40 40 L 15 48 L 5 60 L -15 60 L -22 40 L -40 40 L -48 15 L -60 5 L -60 -15 L -48 -22 L -40 -40 L -15 -48 Z" fill="#475569" stroke="#1E293B" stroke-width="4" stroke-linejoin="round" />
        <circle cx="0" cy="0" r="25" fill="#1E293B" />
        <circle cx="0" cy="0" r="10" fill="#94A3B8" />
      </g>
      <!-- Tech Gear 2 -->
      <g transform="translate(-50, 70)">
        <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="6s" repeatCount="indefinite" />
        <path d="M -10 -40 L 10 -40 L 15 -25 L 25 -25 L 30 -10 L 40 -5 L 40 10 L 30 15 L 25 25 L 10 30 L 5 40 L -10 40 L -15 25 L -25 25 L -30 10 L -40 5 L -40 -10 L -30 -15 L -25 -25 L -10 -30 Z" fill="#64748B" stroke="#1E293B" stroke-width="4" stroke-linejoin="round" />
        <circle cx="0" cy="0" r="16" fill="#1E293B" />
        <circle cx="0" cy="0" r="6" fill="#CBD5E1" />
      </g>
    </g>

    <!-- Official Seal / Status Indicator -->
    <g transform="translate(820, 720)">
      <animateTransform attributeName="transform" type="translate" values="820,720; 820,710; 820,720" dur="5s" repeatCount="indefinite" />
      <rect x="-80" y="-40" width="160" height="80" rx="40" fill="#0F172A" stroke="#334155" stroke-width="2" filter="url(#pro-shadow)" />
      <circle cx="-40" cy="0" r="15" fill="#10B981" filter="url(#glow)" />
      <path d="M -48 0 L -42 6 L -32 -6" fill="none" stroke="#0F172A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      <text x="0" y="5" font-family="monospace" font-size="16" fill="#F8FAFC" font-weight="bold">VERIFIED</text>
    </g>
    
    <!-- Code / Terminal Snippet -->
    <g transform="translate(260, 750)">
      <animateTransform attributeName="transform" type="translate" values="260,750; 280,750; 260,750" dur="8s" repeatCount="indefinite" />
      <rect x="-120" y="-50" width="240" height="100" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2" filter="url(#pro-shadow)" />
      <circle cx="-100" cy="-30" r="4" fill="#EF4444" />
      <circle cx="-85" cy="-30" r="4" fill="#F59E0B" />
      <circle cx="-70" cy="-30" r="4" fill="#10B981" />
      <line x1="-100" y1="0" x2="-20" y2="0" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" />
      <line x1="-100" y1="20" x2="60" y2="20" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" />
      <line x1="-100" y1="40" x2="-50" y2="40" stroke="#A78BFA" stroke-width="4" stroke-linecap="round" />
      <!-- Blinking cursor -->
      <line x1="-40" y1="35" x2="-40" y2="45" stroke="#FFFFFF" stroke-width="2">
         <animate attributeName="opacity" values="1; 0; 1" dur="1s" repeatCount="indefinite" />
      </line>
    </g>
  </g>
</svg>