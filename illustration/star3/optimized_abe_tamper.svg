<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradients -->
        <linearGradient id="abe-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="40%" stop-color="#064e3b" stop-opacity="0.3"/>
            <stop offset="60%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#022c22"/>
        </linearGradient>

        <linearGradient id="panel-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#020617" stop-opacity="0.95"/>
        </linearGradient>

        <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#10b981"/>
            <stop offset="50%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow-emerald" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur1"/>
            <feGaussianBlur stdDeviation="8" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-amber" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur1"/>
            <feGaussianBlur stdDeviation="8" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-rose" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Drop Shadow -->
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Animated Grid Pattern -->
        <pattern id="cyber-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.15"/>
            <circle cx="40" cy="40" r="1" fill="#10b981" opacity="0.4"/>
            <circle cx="0" cy="0" r="1.5" fill="#3b82f6" opacity="0.3">
                <animate attributeName="r" values="1;2;1" dur="2s" repeatCount="indefinite"/>
            </circle>
        </pattern>

        <pattern id="data-dots" width="10" height="10" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="#94a3b8" opacity="0.1"/>
        </pattern>

        <!-- Cyber Node -->
        <g id="cyber-node">
            <rect x="-25" y="-12" width="50" height="24" rx="4" fill="#0f172a" stroke="#10b981" stroke-width="1.5" filter="url(#drop-shadow)"/>
        </g>
    </defs>

    <!-- Background -->
    <rect width="100%" height="100%" fill="url(#abe-bg-grad)"/>
    <rect width="100%" height="100%" fill="url(#cyber-grid)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect width="100%" height="100%" fill="url(#data-dots)"/>

    <!-- Scanning Line Effect -->
    <line x1="0" y1="0" x2="400" y2="0" stroke="#10b981" stroke-width="2" opacity="0.2" filter="url(#glow-emerald)">
        <animate attributeName="y1" values="-50;650" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="y2" values="-50;650" dur="4s" repeatCount="indefinite"/>
    </line>

    <!-- Top Section: Encrypted Vault & Policy -->
    <g transform="translate(200, 75)">
        <!-- Vault Container -->
        <rect x="-160" y="-45" width="320" height="150" rx="12" fill="url(#panel-gradient)" stroke="#059669" stroke-width="1.5" filter="url(#drop-shadow)"/>
        <!-- Tech Corner Accents -->
        <path d="M -150 -45 L -160 -45 L -160 -35" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M 150 -45 L 160 -45 L 160 -35" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M -150 105 L -160 105 L -160 95" fill="none" stroke="#34d399" stroke-width="2"/>
        <path d="M 150 105 L 160 105 L 160 95" fill="none" stroke="#34d399" stroke-width="2"/>
        
        <!-- Animated Vault Header -->
        <rect x="-160" y="-45" width="320" height="24" rx="12" fill="#064e3b" opacity="0.5"/>
        <text x="0" y="-28" fill="#a7f3d0" font-family="'Orbitron', 'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="2" filter="url(#glow-emerald)">CIPHERTEXT VAULT</text>
        <line x1="-160" y1="-21" x2="160" y2="-21" stroke="#059669" stroke-width="1"/>

        <!-- Policy Tree Wiring -->
        <g stroke="#334155" stroke-width="2" fill="none">
            <!-- Root to Layer 1 -->
            <path d="M 0,0 L -60,40">
                 <animate attributeName="stroke" values="#f43f5e;#334155;#10b981;#10b981;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </path>
            <path d="M 0,0 L 60,40">
                 <animate attributeName="stroke" values="#f43f5e;#334155;#334155;#334155;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </path>
            <!-- Layer 1 to Layer 2 -->
            <path d="M -60,40 L -95,80">
                 <animate attributeName="stroke" values="#f43f5e;#334155;#10b981;#10b981;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </path>
            <path d="M -60,40 L -25,80">
                 <animate attributeName="stroke" values="#f43f5e;#334155;#10b981;#10b981;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Nodes -->
        <use href="#cyber-node" x="0" y="0"/>
        <text x="0" y="4" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">OR</text>
        
        <use href="#cyber-node" x="-60" y="40"/>
        <text x="-60" y="44" fill="#e2e8f0" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">AND</text>
        
        <rect x="35" y="28" width="50" height="24" rx="4" fill="#0f172a" stroke="#f43f5e" stroke-width="1.5">
             <animate attributeName="stroke" values="#f43f5e;#334155;#334155;#334155;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
        </rect>
        <text x="60" y="43" fill="#64748b" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">"Board"</text>

        <!-- Leaf Nodes (Attributes) -->
        <rect x="-125" y="68" width="60" height="24" rx="4" fill="#0f172a" stroke="#f43f5e" stroke-width="2">
             <animate attributeName="stroke" values="#f43f5e;#334155;#10b981;#10b981;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
        </rect>
        <text x="-95" y="83" fill="#fb7185" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">
             <animate attributeName="fill" values="#fb7185;#94a3b8;#34d399;#34d399;#fb7185" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             "Admin"
        </text>

        <rect x="-50" y="68" width="50" height="24" rx="4" fill="#0f172a" stroke="#f43f5e" stroke-width="2">
             <animate attributeName="stroke" values="#f43f5e;#334155;#10b981;#10b981;#f43f5e" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
        </rect>
        <text x="-25" y="83" fill="#fb7185" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">
             <animate attributeName="fill" values="#fb7185;#94a3b8;#34d399;#34d399;#fb7185" keyTimes="0;0.2;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             "IT"
        </text>

        <!-- Advanced Status Lock -->
        <g transform="translate(100, 65)">
             <circle cx="0" cy="0" r="22" fill="#020617" stroke="#f43f5e" stroke-width="2" filter="url(#glow-rose)" stroke-dasharray="10 4">
                  <animateTransform attributeName="transform" type="rotate" values="0;360" dur="10s" repeatCount="indefinite"/>
                  <animate attributeName="stroke" values="#f43f5e;#f43f5e;#10b981;#10b981;#f43f5e" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
                  <animate attributeName="filter" values="url(#glow-rose);url(#glow-rose);url(#glow-emerald);url(#glow-emerald);url(#glow-rose)" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             </circle>
             <circle cx="0" cy="0" r="15" fill="#1e1b4b" opacity="0.8"/>
             <!-- Shackle -->
             <path d="M-6,-4 C-6,-11 6,-11 6,-4 L6,0 M-9,0 L9,0 L9,10 L-9,10 Z" fill="none" stroke="#f43f5e" stroke-width="1.5">
                  <animate attributeName="stroke" values="#f43f5e;#f43f5e;#10b981;#10b981;#f43f5e" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             </path>
             <path d="M-6,-4 -6,1" fill="none" stroke="#f43f5e" stroke-width="1" stroke-dasharray="30" stroke-dashoffset="30">
                  <animate attributeName="stroke-dashoffset" values="0;30;30;0" keyTimes="0;0.4;0.9;1" dur="6s" repeatCount="indefinite"/>
             </path>
             <!-- Inside keyhole -->
             <circle cx="0" cy="4" r="2" fill="#f43f5e">
                 <animate attributeName="fill" values="#f43f5e;#f43f5e;#10b981;#10b981;#f43f5e" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             </circle>
        </g>
    </g>

    <!-- Tampering Connections & Data Flow -->
    <g>
        <!-- Left Data Stream -->
        <path d="M 120 450 L 120 280 C 120 250, 75 250, 75 185" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 5" filter="url(#glow-amber)">
             <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" calcMode="linear"/>
             <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
        </path>
        <circle cx="0" cy="0" r="3" fill="#fff" filter="url(#glow-amber)">
            <animateMotion path="M 120 450 L 120 280 C 120 250, 75 250, 75 185" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
        </circle>

        <!-- Right Data Stream -->
        <path d="M 280 450 L 280 280 C 280 250, 325 250, 325 185" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 5" filter="url(#glow-amber)">
             <animate attributeName="stroke-dashoffset" from="40" to="0" dur="1s" repeatCount="indefinite" calcMode="linear"/>
             <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
        </path>
        <circle cx="0" cy="0" r="3" fill="#fff" filter="url(#glow-amber)">
            <animateMotion path="M 280 450 L 280 280 C 280 250, 325 250, 325 185" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2;0.6;0.7;1" dur="6s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Middle Section: Hacker Console Form -->
    <g transform="translate(200, 310)">
        <!-- Console Window -->
        <rect x="-150" y="-55" width="300" height="110" rx="8" fill="#000000" stroke="#f59e0b" stroke-width="2" filter="url(#drop-shadow)"/>
        
        <!-- Tab Bar -->
        <path d="M -150 -55 L -150 -35 L 150 -35 L 150 -55 Z" fill="#451a03"/>
        <circle cx="-135" cy="-45" r="4" fill="#ef4444"/>
        <circle cx="-120" cy="-45" r="4" fill="#fbbf24"/>
        <circle cx="-105" cy="-45" r="4" fill="#10b981"/>
        <text x="0" y="-41" fill="#fbbf24" font-family="'Orbitron', 'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">ALGEBRAIC_TAMPER.ex3</text>
        
        <!-- Code Execution Animation -->
        <g font-family="'Courier New', monospace" font-size="11">
            <text x="-135" y="-15" fill="#94a3b8">> Analyzing sk_usr...</text>
            <text x="-135" y="0" fill="#cbd5e1">> Atts: ["Guest", "IT"]</text>
            
            <!-- Mathematical Injection -->
            <text x="-135" y="18" fill="#f43f5e" font-weight="bold">
                 > Inj: <tspan fill="#facc15">D_i = g^r * H("Admin")^r</tspan>
                 <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.2;0.3;0.9;1" dur="6s" repeatCount="indefinite"/>
            </text>
            
            <!-- Matrix Rain background behind text for vibe -->
            <text x="-135" y="36" fill="#10b981" font-weight="bold" filter="url(#glow-emerald)">
                 [$$$] BYPASS SUCCESSFUL
                 <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.45;0.9;1" dur="6s" repeatCount="indefinite"/>
            </text>
        </g>

        <!-- Spinning Hacker Emblem -->
        <g transform="translate(110, 5)">
            <circle cx="0" cy="0" r="18" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="10 4 2 4">
                <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="12" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="10 5">
                <animateTransform attributeName="transform" type="rotate" values="360;0" dur="2s" repeatCount="indefinite"/>
            </circle>
            <text x="0" y="4" fill="#fbbf24" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle">!</text>
        </g>
    </g>

    <!-- Bottom Section: Compromised User Key -->
    <g transform="translate(200, 460)">
        <rect x="-110" y="-30" width="220" height="70" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#drop-shadow)">
            <animate attributeName="stroke" values="#3b82f6;#f59e0b;#10b981;#10b981;#3b82f6" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
        </rect>
        <rect x="-110" y="-30" width="220" height="24" rx="0" fill="#3b82f6" opacity="0.2">
             <animate attributeName="fill" values="#3b82f6;#f59e0b;#10b981;#10b981;#3b82f6" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
        </rect>
        <text x="0" y="-17" fill="#60a5fa" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">
             <animate attributeName="fill" values="#60a5fa;#fbbf24;#34d399;#34d399;#60a5fa" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
             USER PRIVATE KEY (sk)
        </text>

        <!-- Attribute Chips -->
        <!-- Chip 1: Compromised -->
        <g transform="translate(-55, 12)">
            <rect x="-35" y="-12" width="70" height="24" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5">
                 <animate attributeName="stroke" values="#60a5fa;#f59e0b;#10b981;#10b981;#60a5fa" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </rect>
            <!-- Original Text -->
            <text x="0" y="4" fill="#94a3b8" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">
                "Guest"
                <animate attributeName="opacity" values="1;0;0;0;1" keyTimes="0;0.2;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
                <animate attributeName="y" values="4;-10;-10;-10;4" keyTimes="0;0.2;0.5;0.9;1" dur="6s" repeatCount="indefinite"/>
            </text>
            <!-- Forged Text -->
            <text x="0" y="4" fill="#fbbf24" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#glow-amber)">
                "Admin"
                <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.3;0.85;0.95;1" dur="6s" repeatCount="indefinite"/>
                <animate attributeName="y" values="20;4;4;20;20" keyTimes="0;0.3;0.85;0.95;1" dur="6s" repeatCount="indefinite"/>
            </text>
            <!-- Glitch overlays -->
            <rect x="-35" y="-12" width="70" height="24" rx="4" fill="url(#data-dots)" opacity="0">
                 <animate attributeName="opacity" values="0;0.8;0;0;0" keyTimes="0;0.25;0.4;0.9;1" dur="6s" repeatCount="indefinite"/>
            </rect>
        </g>
        
        <!-- Chip 2: Legitimate -->
        <g transform="translate(55, 12)">
            <rect x="-35" y="-12" width="70" height="24" rx="4" fill="#0f172a" stroke="#60a5fa" stroke-width="1.5">
                 <animate attributeName="stroke" values="#60a5fa;#3b82f6;#10b981;#10b981;#60a5fa" keyTimes="0;0.3;0.5;0.8;1" dur="6s" repeatCount="indefinite"/>
            </rect>
            <text x="0" y="4" fill="#cbd5e1" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">"IT"</text>
        </g>
    </g>

    <!-- Footer Banner -->
    <g transform="translate(200, 540)">
        <polygon points="-160,-16 160,-16 170,16 -170,16" fill="#1f070e" stroke="#10b981" stroke-width="1.5" filter="url(#glow-emerald)"/>
        <text x="0" y="5" text-anchor="middle" fill="#6ee7b7" font-family="'Times New Roman', serif" font-size="15" font-weight="bold" letter-spacing="0.5">
            ABE：代数篡改与越权 (Privilege Escalation)
        </text>
        <rect x="-165" y="-12" width="330" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 30 50 15 5 200">
             <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.5s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>