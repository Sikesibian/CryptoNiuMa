<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="acns-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#091428"/>
            <stop offset="50%" stop-color="#0a192f"/>
            <stop offset="100%" stop-color="#020c1b"/>
        </linearGradient>
        <linearGradient id="acns-glow" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00f2fe"/>
            <stop offset="100%" stop-color="#4facfe"/>
        </linearGradient>
        <filter id="cyber-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glitch-shift">
            <feOffset dx="2" dy="-2" in="SourceGraphic" result="red-shift"/>
            <feOffset dx="-2" dy="2" in="SourceGraphic" result="blue-shift"/>
            <feBlend mode="screen" in="red-shift" in2="blue-shift"/>
        </filter>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4facfe" stroke-width="0.5" opacity="0.15"/>
            <circle cx="0" cy="0" r="1.5" fill="#00f2fe" opacity="0.3"/>
        </pattern>
        <clipPath id="hex-clip">
            <polygon points="200,80 340,160 340,320 200,400 60,320 60,160"/>
        </clipPath>
    </defs>
    
    <!-- Background & Grid -->
    <rect width="400" height="600" fill="url(#acns-bg)"/>
    <rect width="400" height="600" fill="url(#grid)"/>

    <!-- Dynamic Overlay Elements -->
    <g opacity="0.1">
        <path d="M0 100 L400 100 M0 300 L400 300 M0 500 L400 500" stroke="#00f2fe" stroke-width="1">
            <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
        </path>
    </g>

    <g clip-path="url(#hex-clip)">
        <polygon points="200,80 340,160 340,320 200,400 60,320 60,160" fill="rgba(79, 172, 254, 0.05)" stroke="url(#acns-glow)" stroke-width="4" filter="url(#cyber-glow)"/>
        <!-- Particles -->
        <circle cx="200" cy="240" r="120" fill="none" stroke="#00f2fe" stroke-width="1" stroke-dasharray="10 5" opacity="0.5">
            <animateTransform attributeName="transform" type="rotate" from="0 200 240" to="360 200 240" dur="20s" repeatCount="indefinite"/>
        </circle>
        <circle cx="200" cy="240" r="90" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="5 20" opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" from="360 200 240" to="0 200 240" dur="15s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Center Emblem (Shield & Eye) -->
    <g transform="translate(200, 240)" filter="url(#cyber-glow)">
        <path d="M0 -70 L55 -35 L55 35 L0 70 L-55 35 L-55 -35 Z" fill="rgba(2, 12, 27, 0.8)" stroke="#00f2fe" stroke-width="3"/>
        <path d="M-30 -10 Q0 -30 30 -10 Q30 20 0 40 Q-30 20 -30 -10 Z" fill="#0a192f" stroke="#4facfe" stroke-width="2"/>
        <circle cx="0" cy="5" r="8" fill="#00f2fe">
            <animate attributeName="r" values="8;12;8" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Tech UI Frames -->
    <path d="M 20 20 L 60 20 M 20 20 L 20 60" fill="none" stroke="#4facfe" stroke-width="3"/>
    <path d="M 380 20 L 340 20 M 380 20 L 380 60" fill="none" stroke="#4facfe" stroke-width="3"/>
    <path d="M 20 580 L 60 580 M 20 580 L 20 540" fill="none" stroke="#4facfe" stroke-width="3"/>
    <path d="M 380 580 L 340 580 M 380 580 L 380 540" fill="none" stroke="#4facfe" stroke-width="3"/>
    <rect x="20" y="20" width="360" height="560" fill="none" stroke="#4facfe" stroke-width="1" opacity="0.3"/>

    <!-- Typographic Title -->
    <text x="200" y="460" text-anchor="middle" fill="#00f2fe" font-family="'Oswald', sans-serif" font-size="36" font-weight="bold" letter-spacing="4">ACNS</text>
    <text x="200" y="490" text-anchor="middle" fill="#4facfe" font-family="'Rajdhani', sans-serif" font-size="12" letter-spacing="2" opacity="0.8">APPLIED CRYPTOGRAPHY &amp; NETWORK SECURITY</text>
    
    <!-- Cyber Bar -->
    <rect x="100" y="520" width="200" height="4" fill="#0a192f" stroke="#00f2fe" stroke-width="1"/>
    <rect x="100" y="520" width="50" height="4" fill="#00f2fe">
        <animate attributeName="x" values="100;250;100" dur="3s" repeatCount="indefinite"/>
    </rect>
</svg>