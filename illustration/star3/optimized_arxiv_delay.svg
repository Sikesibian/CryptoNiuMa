<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Arxiv Dark Abyss Background -->
        <radialGradient id="arxiv-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#050510"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        
        <filter id="glow-arxiv">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Glitch for stuck queue state -->
        <filter id="glitch-arxiv">
            <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="1" result="noise">
                 <animate attributeName="baseFrequency" values="0.01; 0.9; 0.01" dur="0.2s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        
        <pattern id="grid-arxiv" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="1"/>
            <circle cx="15" cy="15" r="1.5" fill="#475569" opacity="0.3"/>
        </pattern>
        
        <!-- Animated scanline -->
        <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ef4444" stop-opacity="0"/>
            <stop offset="50%" stop-color="#ef4444" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
        </linearGradient>
    </defs>
    
    <rect width="400" height="600" fill="url(#arxiv-bg)"/>
    <rect width="400" height="600" fill="url(#grid-arxiv)"/>
    
    <!-- Giant Digital Hourglass / Processing Unit -->
    <g transform="translate(200, 250) scale(1.6)">
        
        <!-- Outer Structure -->
        <path d="M -70 -100 L 70 -100 L 20 -10 L 70 80 L -70 80 L -20 -10 Z" fill="#0f172a" stroke="#334155" stroke-width="4"/>
        <path d="M -60 -90 L 60 -90 L 15 -10 L 60 70 L -60 70 L -15 -10 Z" fill="#000" stroke="#1e293b" stroke-width="2"/>
        
        <!-- Sand top (Data blocks) -->
        <g opacity="0.8">
            <rect x="-40" y="-80" width="80" height="6" fill="#3b82f6"/>
            <rect x="-35" y="-70" width="70" height="6" fill="#3b82f6"/>
            <rect x="-30" y="-60" width="60" height="6" fill="#3b82f6"/>
            <rect x="-25" y="-50" width="50" height="6" fill="#3b82f6"/>
            <rect x="-20" y="-40" width="40" height="6" fill="#3b82f6"/>
            <rect x="-15" y="-30" width="30" height="6" fill="#3b82f6"/>
            
            <!-- Shrinking over time -->
            <animateTransform attributeName="transform" type="translate" values="0 0; 0 20; 0 0" dur="10s" repeatCount="indefinite"/>
        </g>
        
        <!-- Data Dripping (Stuck) -->
        <line x1="0" y1="-10" x2="0" y2="20" stroke="#3b82f6" stroke-width="2" stroke-dasharray="2 4">
            <animate attributeName="stroke-dashoffset" values="0; 6" dur="0.5s" repeatCount="indefinite"/>
        </line>
        <circle cx="0" cy="15" r="2" fill="#3b82f6">
            <animate attributeName="cy" values="15; 40" dur="1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1; 0" dur="1s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Stuck Element (The Paper) -->
        <g transform="translate(0, -10)">
            <rect x="-15" y="-12" width="30" height="20" fill="#2a0a0a" stroke="#ef4444" stroke-width="2" filter="url(#glow-arxiv)"/>
            <text x="0" y="-2" fill="#fca5a5" font-family="'Courier New', monospace" font-size="6" font-weight="bold" text-anchor="middle">.TEX</text>
            <text x="0" y="5" fill="#f87171" font-family="'Courier New', monospace" font-size="5" text-anchor="middle">STUCK</text>
            
            <!-- Scan laser on the paper -->
            <rect x="-15" y="-12" width="30" height="4" fill="url(#scanline)" filter="url(#glow-arxiv)">
                <animate attributeName="y" values="-12; 4; -12" dur="1s" repeatCount="indefinite"/>
            </rect>
            
            <!-- Small shake animation -->
            <animateTransform attributeName="transform" type="translate" values="0 -10; -1 -10; 1 -9; 0 -10" dur="0.1s" repeatCount="indefinite"/>
        </g>
        
        <!-- Sand bottom (Processed blocks) -->
        <g opacity="0.6">
            <rect x="-15" y="40" width="30" height="6" fill="#475569"/>
            <rect x="-20" y="50" width="40" height="6" fill="#475569"/>
            <rect x="-25" y="60" width="50" height="6" fill="#475569"/>
        </g>

        <!-- Orbital Queue -->
        <g stroke-width="1.5" fill="none">
            <!-- Path for orbital ring -->
            <ellipse cx="0" cy="-10" rx="90" ry="25" stroke="#1e293b" stroke-dasharray="4 4"/>
            
            <!-- Other papers passing smoothly -->
            <circle cx="-90" cy="-10" r="4" fill="#10b981"/>
            <text x="-90" y="-15" fill="#10b981" font-family="monospace" font-size="6" text-anchor="middle">2403.0112</text>
            
            <circle cx="90" cy="-10" r="4" fill="#10b981"/>
            <text x="90" y="-15" fill="#10b981" font-family="monospace" font-size="6" text-anchor="middle">2403.0113</text>
        </g>
        
        <!-- ON HOLD Box overlapping everything -->
        <g transform="translate(0, 30)">
            <rect x="-45" y="-18" width="90" height="24" rx="3" fill="#450a0a" stroke="#ef4444" stroke-width="2" filter="url(#glow-arxiv)">
                <animate attributeName="stroke" values="#ef4444; #7f1d1d; #ef4444" dur="0.8s" repeatCount="indefinite"/>
            </rect>
            <!-- Cross-hatching warning pattern inside box -->
            <path d="M -45 -18 L -27 6 M -35 -18 L -17 6 M -25 -18 L -7 6" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
            <text x="0" y="-1" fill="#fca5a5" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#glitch-arxiv)">ON HOLD</text>
            <text x="0" y="15" fill="#ef4444" font-family="'Courier New', monospace" font-size="5" text-anchor="middle">PENDING MODERATION</text>
        </g>

    </g>
    
    <!-- Timeline Info below -->
    <g transform="translate(200, 440)">
        <rect x="-170" y="-15" width="340" height="30" fill="#0f172a" stroke="#334155" stroke-width="2"/>
        <text x="-160" y="5" fill="#94a3b8" font-family="'Courier New', monospace" font-size="12">Status:</text>
        <g>
            <animate attributeName="opacity" values="1; 0.3; 1" dur="1.5s" repeatCount="indefinite"/>
            <text x="-100" y="5" fill="#f59e0b" font-family="'Courier New', monospace" font-size="12" font-weight="bold">Waiting for admin review...</text>
        </g>
        <text x="160" y="5" fill="#ef4444" font-family="'Courier New', monospace" font-size="12" text-anchor="end">Day 14</text>
    </g>

    <!-- Bottom Title -->
    <g transform="translate(200, 540)">
        <rect x="-120" y="-20" width="240" height="40" rx="5" fill="#4c0519" stroke="#ef4444" stroke-width="2">
            <animate attributeName="stroke" values="#ef4444; #4c0519; #ef4444" dur="1s" repeatCount="indefinite"/>
        </rect>
        <text x="0" y="5" text-anchor="middle" fill="#fca5a5" font-family="'Times New Roman', serif" font-size="16" font-weight="bold">arXiv 审核卡审</text>
        <g>
            <text x="0" y="-25" text-anchor="middle" fill="#ef4444" font-family="'Courier New', Courier, monospace" font-size="12" letter-spacing="1" font-weight="bold">MODERATION_HOLD_QUEUE</text>
        </g>
    </g>
</svg>