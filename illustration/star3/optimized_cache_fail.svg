<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 背景与光效 -->
        <linearGradient id="cache-cyber-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="50%" stop-color="#081024"/>
            <stop offset="100%" stop-color="#010308"/>
        </linearGradient>
        
        <!-- 卡片玻璃效果 -->
        <linearGradient id="cache-glass-blue" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(56, 189, 248, 0.12)"/>
            <stop offset="100%" stop-color="rgba(56, 189, 248, 0.02)"/>
        </linearGradient>
        <linearGradient id="cache-glass-red" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="rgba(244, 63, 94, 0.12)"/>
            <stop offset="100%" stop-color="rgba(244, 63, 94, 0.02)"/>
        </linearGradient>

        <!-- 动态光扫过效果 -->
        <linearGradient id="cache-shine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%" stop-color="rgba(255,255,255,0.4)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>

        <!-- 动态发光 -->
        <filter id="cache-glow-blue" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cache-glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="cache-glow-yellow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <!-- 背景网格纹理 -->
        <pattern id="cache-hex-grid" width="30" height="51.96" patternUnits="userSpaceOnUse" patternTransform="scale(0.4)">
            <path d="M15 0 L30 8.66 L30 25.98 L15 34.64 L0 25.98 L0 8.66 Z" fill="none" stroke="rgba(56, 189, 248, 0.08)" stroke-width="1"/>
            <path d="M15 51.96 L30 43.3 L0 43.3 Z" fill="none" stroke="rgba(56, 189, 248, 0.08)" stroke-width="1"/>
        </pattern>
        <pattern id="cache-dot-grid" width="16" height="16" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1" fill="rgba(148, 163, 184, 0.15)"/>
        </pattern>

        <clipPath id="typing-clip">
            <rect x="-160" y="0" width="0" height="16">
                <animate attributeName="width" values="0;230;230;0;0" dur="5s" keyTimes="0; 0.25; 0.9; 0.91; 1" repeatCount="indefinite"/>
            </rect>
            <rect x="-160" y="16" width="0" height="20">
                <animate attributeName="width" values="0;0;250;250;0;0" dur="5s" keyTimes="0; 0.35; 0.6; 0.9; 0.91; 1" repeatCount="indefinite"/>
            </rect>
        </clipPath>
        
        <!-- 核心混合扫光遮罩 -->
        <clipPath id="shine-clip">
            <path d="M -60 50 L -60 -20 L 60 -20 L 60 50 Z" />
        </clipPath>
    </defs>

    <!-- 底层环境 -->
    <rect width="400" height="600" fill="url(#cache-cyber-bg)"/>
    <rect width="400" height="600" fill="url(#cache-dot-grid)">
        <animate attributeName="opacity" values="0.5;1;0.5" dur="8s" repeatCount="indefinite"/>
    </rect>
    <rect width="400" height="300" y="300" fill="url(#cache-hex-grid)">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- 环境光圈 -->
    <circle cx="200" cy="110" r="120" fill="#38BDF8" opacity="0.03" filter="url(#cache-glow-blue)">
        <animate attributeName="r" values="120;140;120" dur="6s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="380" r="100" fill="#f43f5e" opacity="0.03" filter="url(#cache-glow-red)">
        <animate attributeName="r" values="100;130;100" dur="4s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
    </circle>

    <!-- ========================================== -->
    <!-- 顶部：抽象的体系结构图 -->
    <!-- ========================================== -->
    <g transform="translate(200, 110)">
        <!-- 环形总线 (Ring Bus) -->
        <ellipse cx="0" cy="0" rx="140" ry="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"/>
        
        <!-- 数据顺时针流动特效 -->
        <ellipse cx="0" cy="0" rx="140" ry="40" fill="none" stroke="#38BDF8" stroke-width="2" stroke-dasharray="10 40 30 180" opacity="0.6">
            <animate attributeName="stroke-dashoffset" values="260;0" dur="3s" linear repeatCount="indefinite"/>
        </ellipse>
        <!-- 数据逆时针流动特效 (红色攻击流) -->
        <ellipse cx="0" cy="0" rx="140" ry="40" fill="none" stroke="#f43f5e" stroke-width="2" stroke-dasharray="5 60" opacity="0.4">
            <animate attributeName="stroke-dashoffset" values="0;260" dur="2s" linear repeatCount="indefinite"/>
        </ellipse>

        <!-- CPU 数据交互探测线 -->
        <g stroke-dasharray="3 3" opacity="0.5">
            <!-- Victim reading -->
            <path d="M -80 0 Q -80 40 0 60" fill="none" stroke="#0ea5e9" stroke-width="2">
                <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" linear repeatCount="indefinite"/>
            </path>
            <!-- Attacker probing -->
            <path d="M 80 0 Q 80 40 0 60" fill="none" stroke="#e11d48" stroke-width="2">
                <animate attributeName="stroke-dashoffset" values="0;20" dur="0.8s" linear repeatCount="indefinite"/>
            </path>
        </g>

        <!-- CPU 0 (Victim) -->
        <g transform="translate(-80, -30)">
            <!-- 背景浮动动画 -->
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="4s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
                <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#cache-glass-blue)" stroke="rgba(56, 189, 248, 0.5)" stroke-width="1.5"/>
                <!-- 内部高光边缘 -->
                <path d="M -43 -28 L 43 -28" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
                
                <text x="0" y="-8" fill="#e0f2fe" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#cache-glow-blue)">CPU 0</text>
                <text x="0" y="4" fill="#7dd3fc" font-family="sans-serif" font-size="8" text-anchor="middle">Victim Process</text>
                <rect x="-35" y="12" width="70" height="12" rx="3" fill="rgba(56,189,248,0.15)" stroke="#0ea5e9" stroke-width="1"/>
                <text x="0" y="21" fill="#bae6fd" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="1">L1 / L2</text>
            </g>
        </g>
        
        <!-- CPU 1 (Attacker) -->
        <g transform="translate(80, -30)">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,-3; 0,0" dur="3.5s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
                <!-- 外围告警圈特效 -->
                <rect x="-45" y="-30" width="90" height="60" rx="8" fill="none" stroke="#f43f5e" stroke-width="2" opacity="0">
                    <animate attributeName="opacity" values="0; 0.8; 0" dur="2s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
                    <animateTransform attributeName="transform" type="scale" values="1; 1.05; 1" dur="2s" repeatCount="indefinite"/>
                </rect>

                <rect x="-45" y="-30" width="90" height="60" rx="8" fill="url(#cache-glass-red)" stroke="rgba(244, 63, 94, 0.6)" stroke-width="1.5"/>
                <path d="M -43 -28 L 43 -28" stroke="rgba(255,255,255,0.4)" stroke-width="1" fill="none"/>
                
                <text x="0" y="-8" fill="#ffe4e6" font-family="'Courier New', monospace" font-size="11" font-weight="bold" text-anchor="middle" filter="url(#cache-glow-red)">CPU 1</text>
                <text x="0" y="4" fill="#fda4af" font-family="sans-serif" font-size="8" text-anchor="middle">Spy Process</text>
                <rect x="-35" y="12" width="70" height="12" rx="3" fill="rgba(244,63,94,0.15)" stroke="#e11d48" stroke-width="1"/>
                <text x="0" y="21" fill="#fecdd3" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle" letter-spacing="1">L1 / L2</text>
            </g>
        </g>

        <!-- L3 Shared Cache -->
        <g transform="translate(0, 60)">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,2; 0,0" dur="4.5s" repeatCount="indefinite"/>
                <rect x="-100" y="-20" width="200" height="40" rx="8" fill="#0f172a" stroke="#475569" stroke-width="1.5"/>
                <rect x="-100" y="-20" width="200" height="40" rx="8" fill="url(#cache-glass-blue)" opacity="0.3"/>
                
                <text x="0" y="-3" fill="#94a3b8" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="2">L3 SHARED CACHE</text>
                
                <!-- L3 Cache Lines details -->
                <g transform="translate(0, 8)">
                    <rect x="-70" y="0" width="30" height="8" fill="#334155" rx="2"/>
                    
                    <!-- 目标 Cache Line 剧烈闪烁 -->
                    <rect x="-30" y="0" width="60" height="8" fill="#e11d48" filter="url(#cache-glow-red)" rx="2">
                        <animate attributeName="opacity" values="0.4;1;0.4;0.8;0.4" dur="1.2s" repeatCount="indefinite"/>
                        <animate attributeName="fill" values="#e11d48;#fb7185;#e11d48" dur="1.2s" repeatCount="indefinite"/>
                    </rect>
                    <text x="0" y="-4" fill="#fecdd3" font-family="sans-serif" font-size="7" font-weight="bold" text-anchor="middle" opacity="0.8">Target Line</text>
                    
                    <rect x="40" y="0" width="30" height="8" fill="#334155" rx="2"/>
                </g>
            </g>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- 中部：动态的时间直方图 (分辨率降级效果) -->
    <!-- ========================================== -->
    <g transform="translate(200, 310)">
        <rect x="-170" y="-80" width="340" height="160" rx="10" fill="rgba(2, 6, 23, 0.7)" stroke="#1e293b" stroke-width="2" style="backdrop-filter: blur(8px);"/>
        
        <!-- 头部说明条 -->
        <g transform="translate(0, -60)">
            <text x="-150" y="4" fill="#64748b" font-family="'Courier New', monospace" font-size="11" font-weight="bold">RDTSC MEASUREMENT</text>
            <!-- 闪烁的降级警告 -->
            <rect x="35" y="-10" width="125" height="20" rx="4" fill="rgba(245, 158, 11, 0.15)" stroke="#f59e0b" stroke-width="1.5">
                <animate attributeName="stroke" values="#f59e0b;#fbbf24;#f59e0b" dur="1s" repeatCount="indefinite"/>
            </rect>
            <text x="97" y="4" fill="#fbbf24" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle" filter="url(#cache-glow-yellow)">RESOLUTION DEGRADED</text>
        </g>

        <!-- 测信道时间直方图 -->
        <g transform="translate(0, 0)">
            <!-- X轴与粗糙的时间分桶 (Coarse Ticks) -->
            <line x1="-140" y1="50" x2="140" y2="50" stroke="#475569" stroke-width="2"/>
            
            <g stroke="#334155" stroke-dasharray="2,4" stroke-width="1.5">
                <line x1="-100" y1="-40" x2="-100" y2="55"/>
                <line x1="-20" y1="-40" x2="-20" y2="55"/>
                <line x1="60" y1="-40" x2="60" y2="55"/>
                <line x1="140" y1="-40" x2="140" y2="55"/>
            </g>

            <!-- 理论上完美的 Hit & Miss 曲线 (被幽灵化呈现出"原本可以分辨"的模样) -->
            <path d="M -90 50 C -60 50 -60 5 -40 5 C -20 5 -20 50 10 50" fill="url(#cache-glass-blue)" stroke="#38BDF8" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
            <text x="-40" y="-3" fill="#38BDF8" font-family="'Courier New', monospace" font-size="9" font-weight="bold" text-anchor="middle">Hit (True)</text>
            
            <path d="M -30 50 C 0 50 0 -15 20 -15 C 40 -15 40 50 70 50" fill="url(#cache-glass-red)" stroke="#f43f5e" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
            <text x="20" y="-23" fill="#f43f5e" font-family="'Courier New', monospace" font-size="9" font-weight="bold" text-anchor="middle">Miss (True)</text>

            <!-- ### 现实中不可分的桶混叠效果 ### -->
            <!-- 中间的巨大模糊图块 -->
            <path d="M -60 50 L -60 -20 L 60 -20 L 60 50 Z" fill="rgba(148, 163, 184, 0.15)" stroke="#94a3b8" stroke-width="2"/>
            
            <!-- 加入扫光特效强调重叠区域 -->
            <rect x="-60" y="-20" width="120" height="70" fill="url(#cache-shine)" clip-path="url(#shine-clip)">
                <animate attributeName="x" values="-180; 60" dur="2.5s" calcMode="spline" keySplines="0.4 0 0.2 1" repeatCount="indefinite"/>
            </rect>

            <!-- 错误标识动效 -->
            <text x="0" y="10" fill="#f1f5f9" font-family="sans-serif" font-size="12" font-weight="900" text-anchor="middle" letter-spacing="1">
                INDISTINGUISHABLE
                <animate attributeName="opacity" values="0.8; 1; 0.8" dur="0.2s" repeatCount="indefinite"/>
            </text>
            <text x="0" y="26" fill="#94a3b8" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">All results fit single tick</text>

            <!-- Ticks 标记 -->
            <text x="-60" y="68" fill="#64748b" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">Tick N</text>
            <!-- Tick N+1 动效高亮 -->
            <text x="20" y="68" fill="#cbd5e1" font-family="'Courier New', monospace" font-size="10" font-weight="bold" text-anchor="middle">
                Tick N+1
                <animate attributeName="fill" values="#cbd5e1;#ffffff;#cbd5e1" dur="1s" repeatCount="indefinite"/>
            </text>
            <text x="100" y="68" fill="#64748b" font-family="'Courier New', monospace" font-size="9" text-anchor="middle">Tick N+2</text>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- 下部：防护机制说明终端 (打字机效果) -->
    <!-- ========================================== -->
    <g transform="translate(200, 460)">
        <rect x="-170" y="-25" width="340" height="70" rx="8" fill="#040b18" stroke="#1e293b" stroke-width="2"/>
        
        <!-- 终端顶边装饰 -->
        <path d="M -170 -10 L -170 -25 Q -170 -25 -162 -25 L 162 -25 Q 170 -25 170 -17 L 170 -10 Z" fill="#0f172a"/>
        <circle cx="-155" cy="-17" r="3" fill="#ef4444"/>
        <circle cx="-145" cy="-17" r="3" fill="#f59e0b"/>
        <circle cx="-135" cy="-17" r="3" fill="#10b981"/>
        <text x="0" y="-14" fill="#475569" font-family="'Courier New', monospace" font-size="8" font-weight="bold" text-anchor="middle">ROOT TERM - KERNEL.SYSCTL</text>

        <!-- 终端输出动效 -->
        <g>
            <g clip-path="url(#typing-clip)">
                <text x="-150" y="11" fill="#a3e635" font-family="'Courier New', monospace" font-size="11">> sysctl kernel.timer_resolution</text>
                <text x="-150" y="29" fill="#cbd5e1" font-family="'Courier New', monospace" font-size="11">> kernel.timer_resolution = <tspan fill="#fbbf24" font-weight="bold">1000 ns</tspan></text>
            </g>
            <!-- 闪烁并跟随的打字光标 -->
            <rect width="6" height="12" fill="#cbd5e1">
                <animate attributeName="x" 
                         values="-150; 60; 60; -150; 80; 80; -150; -150" 
                         dur="5s" 
                         keyTimes="0; 0.25; 0.35; 0.351; 0.6; 0.9; 0.91; 1" 
                         repeatCount="indefinite"/>
                <animate attributeName="y" 
                         values="1; 1; 1; 19; 19; 19; 1; 1" 
                         dur="5s" 
                         keyTimes="0; 0.25; 0.35; 0.351; 0.6; 0.9; 0.91; 1" 
                         repeatCount="indefinite" calcMode="discrete"/>
                <animate attributeName="opacity" 
                         values="1;0;1" 
                         dur="0.6s" 
                         repeatCount="indefinite" 
                         calcMode="discrete"/>
            </rect>
        </g>
    </g>

    <!-- ========================================== -->
    <!-- 底部状态指示条 (强烈警告风) -->
    <!-- ========================================== -->
    <g transform="translate(200, 540)">
        <!-- 动效底纹 -->
        <path d="M -110 0 L -90 -16 L 90 -16 L 110 0 Z" fill="rgba(244, 63, 94, 0.15)">
            <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
        </path>
        <line x1="-90" y1="-16" x2="90" y2="-16" stroke="#f43f5e" stroke-width="2" filter="url(#cache-glow-red)"/>
        
        <!-- 文字上下微弱浮动 -->
        <g>
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,-1; 0,0" dur="2s" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" repeatCount="indefinite"/>
            <text x="0" y="5" text-anchor="middle" fill="#ffe4e6" font-family="'Times New Roman', serif" font-size="16" font-weight="900" letter-spacing="3">侧信道攻击失效</text>
        </g>
        <text x="0" y="20" text-anchor="middle" fill="#f43f5e" font-family="'Courier New', monospace" font-size="10" letter-spacing="1">ERROR: TIMING RESOLUTION TOO LOW</text>
    </g>
</svg>