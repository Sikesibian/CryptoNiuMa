<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="cic-bg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#0a1a06"/>
            <stop offset="60%" stop-color="#030802"/>
            <stop offset="100%" stop-color="#010301"/>
        </radialGradient>
        <linearGradient id="cic-lime" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bef264"/>
            <stop offset="50%" stop-color="#65a30d"/>
            <stop offset="100%" stop-color="#166534"/>
        </linearGradient>
        <linearGradient id="cic-emerald" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#34d399"/>
            <stop offset="100%" stop-color="#064e3b"/>
        </linearGradient>
        <filter id="cic-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="cic-waves" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 0 20 Q 10 10 20 20 T 40 20" fill="none" stroke="#166534" stroke-width="0.5" opacity="0.3"/>
            <path d="M 0 40 Q 10 30 20 40 T 40 40" fill="none" stroke="#14532d" stroke-width="0.5" opacity="0.3"/>
        </pattern>
    </defs>
    <rect width="400" height="600" fill="url(#cic-bg)"/>
    <rect width="400" height="600" fill="url(#cic-waves)"/>

    <g transform="translate(200, 270)" filter="url(#cic-glow)">
        <!-- Complex Radar/Sonar Grid -->
        <g stroke="#4ade80" fill="none" opacity="0.6">
            <circle cx="0" cy="0" r="160" stroke-width="0.5" stroke-dasharray="2,6"/>
            <circle cx="0" cy="0" r="120" stroke-width="1" stroke-dasharray="5,10">
                <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="40s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="80" stroke-width="1.5" stroke-dasharray="8,8">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="40" stroke="url(#cic-emerald)" stroke-width="3"/>
            
            <path d="M 0 -180 L 0 180 M -180 0 L 180 0" stroke-width="0.5" opacity="0.5"/>
            <path d="M -127 -127 L 127 127 M -127 127 L 127 -127" stroke-width="0.5" opacity="0.3"/>
        </g>

        <!-- Scanning Radar Beam -->
        <path d="M 0 0 L 0 -160 A 160 160 0 0 1 113 -113 Z" fill="url(#cic-lime)" opacity="0.15">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
        </path>
        <line x1="0" y1="0" x2="0" y2="-160" stroke="#a3e635" stroke-width="2" stroke-linecap="round">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
        </line>

        <!-- Communication Nodes & Network Graph -->
        <g stroke="#84cc16" stroke-width="1.5">
            <!-- connecting lines -->
            <path d="M -50 -50 L 60 -70 L 90 20 L 20 80 L -70 40 Z" fill="none" stroke-dasharray="4,4">
                <animate attributeName="stroke-dashoffset" values="16;0" dur="1s" repeatCount="indefinite"/>
            </path>
            <path d="M -50 -50 L 20 80 M 60 -70 L -70 40 M 90 20 L -50 -50" fill="none" opacity="0.4"/>
            <path d="M 0 0 L -50 -50 M 0 0 L 60 -70 M 0 0 L 90 20 M 0 0 L 20 80 M 0 0 L -70 40" stroke="url(#cic-lime)" stroke-width="1" opacity="0.8"/>
            
            <!-- Nodes -->
            <circle cx="-50" cy="-50" r="6" fill="#022c22" stroke="#bef264" stroke-width="2">
                <animate attributeName="r" values="5;7;5" dur="1.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="60" cy="-70" r="8" fill="#022c22" stroke="#bef264" stroke-width="2">
                <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="90" cy="20" r="5" fill="#022c22" stroke="#bef264" stroke-width="2"/>
            <circle cx="20" cy="80" r="7" fill="#022c22" stroke="#bef264" stroke-width="2">
                <animate attributeName="r" values="6;9;6" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="-70" cy="40" r="5" fill="#022c22" stroke="#bef264" stroke-width="2"/>
            <circle cx="0" cy="0" r="10" fill="#a3e635"/>
        </g>
        
        <!-- Signal Waves expanding from center -->
        <circle cx="0" cy="0" r="10" fill="none" stroke="#bef264" stroke-width="2" opacity="0">
            <animate attributeName="r" values="10;60" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="10" fill="none" stroke="#bef264" stroke-width="2" opacity="0">
            <animate attributeName="r" values="10;60" dur="2s" begin="1s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite"/>
        </circle>
    </g>

    <text x="200" y="510" text-anchor="middle" fill="#d9f99d" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" letter-spacing="4" filter="url(#cic-glow)">CIC</text>
    <text x="200" y="550" text-anchor="middle" fill="#a3e635" font-family="'Times New Roman', Times, serif" font-size="16" letter-spacing="1">Communications in Cryptology</text>
    <path d="M 80 570 L 320 570" stroke="#4ade80" stroke-width="1" stroke-dasharray="2,4" opacity="0.5"/>
</svg>