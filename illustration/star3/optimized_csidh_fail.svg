<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" style="background-color: #020617; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden;">
    <defs>
        <linearGradient id="csidh-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020814"/>
            <stop offset="50%" stop-color="#071b29"/>
            <stop offset="100%" stop-color="#010408"/>
        </linearGradient>
        
        <filter id="glow-emerald"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-amber"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-cyan"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="glow-red"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        
        <pattern id="grid-csidh" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0f2b3b" stroke-width="0.5"/>
        </pattern>

        <marker id="arrow-l1" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#10b981"/></marker>
        <marker id="arrow-l2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#0ea5e9"/></marker>
        <marker id="arrow-shift" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#f59e0b"/></marker>
        <marker id="arrow-sieve" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/></marker>
        
        <g id="isogeny-path-segment">
            <path d="M0,0 Q-20,30 20,40 T40,80" stroke="#f59e0b" stroke-width="2" fill="none"/>
        </g>
        
        <style>
            @keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
            @keyframes pulse-emerald { 0%, 100% { filter: drop-shadow(0 0 5px #10b981); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px #10b981); transform: scale(1.2); } }
            @keyframes pulse-red { 0%, 100% { filter: drop-shadow(0 0 5px #ef4444); transform: scale(1); } 50% { filter: drop-shadow(0 0 15px #ef4444); transform: scale(1.2); } }
            @keyframes path-flow { from { stroke-dashoffset: 30; } to { stroke-dashoffset: 0; } }
            @keyframes dash-flow { from { stroke-dashoffset: 100; } to { stroke-dashoffset: 0; } }
            @keyframes float-shift { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        </style>
    </defs>

    <rect width="400" height="600" fill="url(#csidh-bg)"/>
    <rect width="400" height="600" fill="url(#grid-csidh)"/>

    <g transform="translate(200, 45)">
        <rect x="-160" y="-20" width="320" height="45" rx="6" fill="rgba(16, 185, 129, 0.1)" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2"/>
        <text y="0" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#6ee7b7" text-anchor="middle">CSIDH: Action on F_p Isogeny Graph (Cayley Grid)</text>
        <text y="15" font-family="'Courier New', monospace" font-size="10" fill="#34d399" text-anchor="middle">E_A = [s] * E_0 (Commutative Group Action)</text>
    </g>

    <!-- Cayley Graph Grid representing the Ideal Class Group -->
    <g transform="translate(200, 180)">
        
        <!-- Multi-dimensional Grid (Static baseline) -->
        <g opacity="0.6">
            <!-- Grid Lines Horizontal (l1 action) -->
            <path d="M-90,-60 L90,-60 M-90,-20 L90,-20 M-90,20 L90,20 M-90,60 L90,60" stroke="#0ea5e9" fill="none" stroke-width="1" opacity="0.4"/>
            <!-- Grid Lines Vertical (l2 action) -->
            <path d="M-60,-90 L-60,90 M-20,-90 L-20,90 M20,-90 L20,90 M60,-90 L60,90" stroke="#10b981" fill="none" stroke-width="1" opacity="0.4"/>
            
            <!-- Nodes along the Grid -->
            <!-- We'll just generate a few circles for intersections -->
            <circle cx="-60" cy="-60" r="3" fill="#38bdf8"/>
            <circle cx="-20" cy="-60" r="3" fill="#34d399"/>
            <circle cx="20" cy="-60" r="3" fill="#38bdf8"/>
            <circle cx="60" cy="-60" r="3" fill="#34d399"/>

            <circle cx="-60" cy="-20" r="3" fill="#34d399"/>
            <circle cx="-20" cy="-20" r="3" fill="#38bdf8"/>
            <circle cx="20" cy="-20" r="3" fill="#34d399"/>
            <circle cx="60" cy="-20" r="3" fill="#38bdf8"/>

            <circle cx="-60" cy="20" r="3" fill="#38bdf8"/>
            <circle cx="-20" cy="20" r="3" fill="#34d399"/>
            <circle cx="20" cy="20" r="3" fill="#38bdf8"/>
            <circle cx="60" cy="20" r="3" fill="#34d399"/>

            <circle cx="-60" cy="60" r="3" fill="#34d399"/>
            <circle cx="-20" cy="60" r="3" fill="#38bdf8"/>
            <circle cx="20" cy="60" r="3" fill="#34d399"/>
            <circle cx="60" cy="60" r="3" fill="#38bdf8"/>
            
            <!-- Torus wrapped edges (dashed) -->
            <path d="M90,-60 L110,-60 M-90,-60 L-110,-60" stroke="#0ea5e9" stroke-dasharray="2 4" opacity="0.4"/>
            <path d="M-60,90 L-60,110 M-60,-90 L-60,-110" stroke="#10b981" stroke-dasharray="2 4" opacity="0.4"/>
        </g>
        
        <!-- Commutative Secret Path Highlight -->
        <!-- Start at E_0 (-60, 20), go right then up, vs up then right -->
        <path d="M-60,20 L20,20 L20,-60" 
              stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-dasharray="8 6" 
              style="animation: dash-flow 1.5s linear infinite;" filter="url(#glow-amber)" marker-end="url(#arrow-shift)"/>
        
        <!-- Another equivalent path to show commutativity -->
        <path d="M-60,20 L-60,-60 L20,-60" 
              stroke="#fcd34d" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.6"
              style="animation: dash-flow 1.5s linear infinite reverse;"/>

        <!-- E_0 node (Starting Curve over F_p) -->
        <circle cx="-60" cy="20" r="5" fill="#10b981" style="animation: pulse-emerald 3s infinite;"/>
        <text x="-75" y="10" font-family="'Courier New', monospace" font-weight="bold" font-size="12" fill="#a7f3d0" text-anchor="middle">E_0</text>
        
        <!-- E_A node (Ending Curve over F_p) -->
        <circle cx="20" cy="-60" r="5" fill="#ef4444"/>
        <text x="35" y="-70" font-family="'Courier New', monospace" font-weight="bold" font-size="12" fill="#fca5a5" text-anchor="middle">E_A</text>

        <!-- Legend highlighting F_p Grid -->
        <g transform="translate(-150, 60)">
            <rect x="0" y="-8" width="105" height="55" fill="#020814" stroke="#0f2b3b" rx="2" opacity="0.8"/>
            <line x1="5" y1="5" x2="20" y2="5" stroke="#0ea5e9" stroke-width="2"/>
            <text x="25" y="9" font-family="'Courier New', monospace" font-size="9" fill="#bae6fd">[l_1] Action</text>
            <line x1="5" y1="20" x2="20" y2="20" stroke="#10b981" stroke-width="2"/>
            <text x="25" y="24" font-family="'Courier New', monospace" font-size="9" fill="#a7f3d0">[l_2] Action</text>
            <line x1="5" y1="35" x2="20" y2="35" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4 2"/>
            <text x="25" y="39" font-family="'Courier New', monospace" font-size="9" fill="#fcd34d">[s] Path</text>
        </g>
    </g>

    <!-- Kuperberg's Algorithm Sieve -->
    <g transform="translate(200, 420)">
        <rect x="-160" y="-120" width="320" height="78" rx="4" fill="rgba(6, 182, 212, 0.05)" stroke="#0891b2" stroke-width="1"/>
        <text x="-150" y="-100" font-family="'Courier New', monospace" font-weight="bold" font-size="11" fill="#67e8f9">Abelian Hidden Shift Problem:</text>
        
        <text x="-130" y="-80" font-family="'Courier New', monospace" font-size="11" fill="#a5f3fc">f_0(x) = [x] * E_0</text>
        <text x="10" y="-80" font-family="'Courier New', monospace" font-size="11" fill="#a5f3fc">f_1(x) = [x] * E_A</text>
        
        <path d="M-50,-70 Q0,-60 50,-70" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-shift)"/>
        <text x="0" y="-52" font-family="'Courier New', monospace" font-weight="bold" font-size="12" fill="#fde68a" text-anchor="middle" filter="url(#glow-amber)">f_0(x) = f_1(x - s)</text>

        <text y="-25" font-family="'Courier New', monospace" font-weight="bold" font-size="12" fill="#ef4444" text-anchor="middle" filter="url(#glow-red)">Kuperberg's Quantum Sieve (L_q(1/2))</text>
        
        <!-- Sieve Tree -->
        <!-- Layer 1 -->
        <circle cx="-120" cy="0" r="2" fill="#e2e8f0"/>
        <text x="-120" y="12" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8" text-anchor="middle">|k_1></text>
        <circle cx="-60" cy="0" r="2" fill="#e2e8f0"/>
        <text x="-60" y="12" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8" text-anchor="middle">|k_2></text>
        <circle cx="60" cy="0" r="2" fill="#e2e8f0"/>
        <text x="60" y="12" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8" text-anchor="middle">|k_3></text>
        <circle cx="120" cy="0" r="2" fill="#e2e8f0"/>
        <text x="120" y="12" font-family="'Courier New', monospace" font-size="9" fill="#94a3b8" text-anchor="middle">|k_4></text>
        
        <!-- Edges 1 to 2 (Animated flow) -->
        <path d="M-120,5 Q-90,25 -90,30" stroke="#0ea5e9" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 1s linear infinite;"/>
        <path d="M-60,5 Q-90,25 -90,30" stroke="#0ea5e9" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 1s linear infinite;"/>
        <path d="M120,5 Q90,25 90,30" stroke="#0ea5e9" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 1s linear infinite;"/>
        <path d="M60,5 Q90,25 90,30" stroke="#0ea5e9" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 1s linear infinite;"/>
        
        <!-- Layer 2 -->
        <circle cx="-90" cy="30" r="3" fill="#38bdf8" filter="url(#glow-cyan)"/>
        <text x="-125" y="34" font-family="'Courier New', monospace" font-size="9" fill="#bae6fd" text-anchor="middle">|k_1 - k_2></text>
        <circle cx="90" cy="30" r="3" fill="#38bdf8" filter="url(#glow-cyan)"/>
        <text x="125" y="34" font-family="'Courier New', monospace" font-size="9" fill="#bae6fd" text-anchor="middle">|k_3 - k_4></text>

        <!-- Edges 2 to 3 (Animated flow) -->
        <path d="M-90,35 Q0,65 0,70" stroke="#ef4444" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 0.8s linear infinite;" marker-end="url(#arrow-sieve)"/>
        <path d="M90,35 Q0,65 0,70" stroke="#ef4444" fill="none" stroke-width="1.5" stroke-dasharray="4 2" style="animation: path-flow 0.8s linear infinite;"/>
        
        <!-- Layer 3 (Result) -->
        <circle cx="0" cy="70" r="4" fill="#ef4444" style="animation: pulse-red 2s infinite;" filter="url(#glow-red)"/>
        <text x="0" y="85" font-family="'Courier New', monospace" font-weight="bold" font-size="11" fill="#fca5a5" text-anchor="middle">|0> (Yields shifted phase s)</text>
    </g>

    <!-- Warning Footer -->
    <g transform="translate(200, 565)">
        <rect x="-150" y="-18" width="300" height="36" rx="4" fill="#4c0519" stroke="#ef4444" stroke-width="2"/>
        <text x="0" y="5" font-family="'Impact', sans-serif" letter-spacing="1" font-size="16" fill="#fca5a5" text-anchor="middle" filter="url(#glow-red)">FATAL SUBEXPONENTIAL BREAK</text>
    </g>
</svg>