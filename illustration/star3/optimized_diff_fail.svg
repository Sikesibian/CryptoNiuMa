<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="diff-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#090514"/>
            <stop offset="100%" stop-color="#140a0f"/>
        </linearGradient>
        <!-- Hexagon Cryptography Pattern -->
        <pattern id="diff-hex" width="30" height="51.96" patternUnits="userSpaceOnUse" patternTransform="scale(0.8)">
            <path d="M15 0 L30 8.66 L30 25.98 L15 34.64 L0 25.98 L0 8.66 Z" fill="none" stroke="rgba(255, 60, 100, 0.04)" stroke-width="1"/>
            <path d="M15 51.96 L30 43.3 L30 25.98 L15 34.64 L0 25.98 L0 43.3 Z" fill="none" stroke="rgba(255, 60, 100, 0.04)" stroke-width="1"/>
        </pattern>
        <!-- Intense Glow Filters -->
        <filter id="diff-glow-cyan" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="diff-glow-red" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- Stream Dashes -->
        <linearGradient id="diff-stream-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(77, 248, 255, 0)"/>
            <stop offset="100%" stop-color="#4df8ff"/>
        </linearGradient>
    </defs>

    <rect width="400" height="600" fill="url(#diff-bg)"/>
    <rect width="400" height="600" fill="url(#diff-hex)">
        <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Top Diagram: The Broken Differential Trail -->
    <g transform="translate(0, 60)">
        
        <!-- Background Holographic Delta -->
        <text x="200" y="160" fill="rgba(255, 255, 255, 0.02)" font-family="serif" font-size="160" font-weight="bold" text-anchor="middle">Δ</text>

        <!-- Left Target: Delta X Input -->
        <g transform="translate(60, 130)">
            <rect x="-35" y="-20" width="70" height="40" rx="4" fill="#0f172a" stroke="#4df8ff" stroke-width="1.5" filter="url(#diff-glow-cyan)"/>
            <text x="0" y="5" fill="#4df8ff" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">ΔX</text>
            <text x="0" y="32" fill="#4df8ff" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.6">Input</text>
        </g>

        <!-- Right Target: Delta Y Expected -->
        <g transform="translate(340, 130)">
            <rect x="-35" y="-20" width="70" height="40" rx="4" fill="#1a0b12" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="4 2">
                <animate attributeName="stroke" values="#4b5563;#ff2a2a;#4b5563" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
            </rect>
            <text x="0" y="5" fill="#9ca3af" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">ΔY</text>
            <text x="0" y="32" fill="#9ca3af" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.6">Target</text>
        </g>

        <!-- Input Data Stream (Always Flowing) -->
        <path d="M 95,130 L 155,130" fill="none" stroke="url(#diff-stream-cyan)" stroke-width="3" stroke-dasharray="8 6">
            <animate attributeName="stroke-dashoffset" from="14" to="0" dur="0.5s" repeatCount="indefinite" calcMode="linear"/>
        </path>

        <!-- Output Broken Stream -->
        <g transform="translate(245, 130)">
            <!-- Line attempts to form but shatters -->
            <path d="M 0,0 L 60,0" fill="none" stroke="#ff2a2a" stroke-width="3" stroke-dasharray="4 8">
                <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.4;0.6;1" dur="2s" repeatCount="indefinite"/>
                <animate attributeName="stroke-dashoffset" from="12" to="0" dur="0.5s" repeatCount="indefinite"/>
            </path>
            <!-- Giant Red Cross / Block -->
            <g>
                <animateTransform attributeName="transform" type="scale" values="0;0;1.2;1;1;0" keyTimes="0;0.35;0.4;0.45;0.9;1" dur="2s" repeatCount="indefinite"/>
                <path d="M 20,-12 L 40,12 M 20,12 L 40,-12" fill="none" stroke="#ff2a2a" stroke-width="4" stroke-linecap="round" filter="url(#diff-glow-red)"/>
            </g>
        </g>

        <!-- Center Element: The S-Box causing the contradiction -->
        <g transform="translate(200, 130)">
            <!-- The S-Box Component -->
            <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#0f172a" stroke="#4df8ff" stroke-width="2">
                <animate attributeName="stroke" values="#4df8ff;#4df8ff;#ff2a2a;#ff2a2a;#4df8ff" keyTimes="0;0.3;0.35;0.9;1" dur="2s" repeatCount="indefinite" />
                <animate attributeName="fill" values="#0f172a;#0f172a;#2a0f12;#2a0f12;#0f172a" keyTimes="0;0.3;0.35;0.9;1" dur="2s" repeatCount="indefinite" />
            </rect>
            
            <text x="0" y="0" fill="#fff" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">S-Box [3]</text>

            <!-- Scanning line over S-Box -->
            <line x1="-38" y1="-28" x2="38" y2="-28" stroke="#4df8ff" stroke-width="1.5" opacity="0.6">
                <animate attributeName="y1" values="-28;28;-28" dur="1s" repeatCount="indefinite"/>
                <animate attributeName="y2" values="-28;28;-28" dur="1s" repeatCount="indefinite"/>
                <animate attributeName="stroke" values="#4df8ff;#4df8ff;#ff2a2a;#ff2a2a;#4df8ff" keyTimes="0;0.3;0.35;0.9;1" dur="2s" repeatCount="indefinite" />
            </line>

            <!-- DDT Look Up Hologram (Pops up when calculating) -->
            <g transform="translate(0, -65)">
                <!-- Appears right before failure -->
                <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.3;0.9;1" dur="2s" repeatCount="indefinite"/>
                <animateTransform attributeName="transform" type="translate" values="0,-50; 0,-65; 0,-65; 0,-50" keyTimes="0;0.2;0.9;1" dur="2s" repeatCount="indefinite"/>
                
                <rect x="-60" y="-20" width="120" height="40" rx="3" fill="#1e1e1e" stroke="#4b5563" stroke-width="1.5"/>
                <line x1="0" y1="20" x2="0" y2="35" stroke="#4b5563" stroke-width="1.5" stroke-dasharray="2 2"/>
                
                <text x="0" y="0" fill="#d1d5db" font-family="monospace" font-size="11" text-anchor="middle">DDT[<tspan fill="#61afef">ΔX</tspan>][<tspan fill="#e5c07b">ΔY</tspan>] =</text>
                <!-- the zero that breaks everything -->
                <text x="0" y="16" fill="#ff2a2a" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#diff-glow-red)">
                    <animate attributeName="opacity" values="1;0.2;1" dur="0.1s" repeatCount="indefinite"/>
                    0
                </text>
            </g>
        </g>
    </g>

    <!-- Terminal Code Simulation -->
    <g transform="translate(200, 400)">
        <rect x="-175" y="-130" width="350" height="210" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
        
        <!-- macOS style Terminal Header -->
        <rect x="-175" y="-130" width="350" height="24" rx="6" fill="#161b22"/>
        <rect x="-175" y="-115" width="350" height="9" fill="#161b22"/>
        <circle cx="-160" cy="-118" r="4" fill="#ff5f56"/>
        <circle cx="-145" cy="-118" r="4" fill="#ffbd2e"/>
        <circle cx="-130" cy="-118" r="4" fill="#28c840"/>
        <text x="0" y="-115" fill="#8b949e" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">cryptanalysis_spn.py</text>

        <!-- Python Source Code -->
        <g font-family="'Courier New', monospace" font-size="12">
            <text x="-160" y="-80" fill="#ff7b72">def <tspan fill="#d2a8ff">check_trail</tspan><tspan fill="#c9d1d9">(DDT, dx, dy):</tspan></text>
            <text x="-160" y="-60" fill="#c9d1d9">    prob = DDT[dx][dy] / 256.0</text>
            <text x="-160" y="-40" fill="#ff7b72">    if <tspan fill="#c9d1d9">prob == </tspan><tspan fill="#79c0ff">0</tspan><tspan fill="#c9d1d9">:</tspan></text>
            <text x="-160" y="-20" fill="#ff7b72">        raise <tspan fill="#ffa657">TrailContradiction</tspan></text>
            
            <line x1="-160" y1="-5" x2="160" y2="-5" stroke="#30363d" stroke-width="1" stroke-dasharray="2 2"/>

            <!-- Flashing Exception Trigger -->
            <g>
                <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.35;0.4;0.9;1" dur="2s" repeatCount="indefinite"/>
                
                <rect x="-165" y="5" width="330" height="60" fill="rgba(255, 42, 42, 0.1)" stroke="#ff2a2a" stroke-width="1" stroke-dasharray="2 4"/>
                
                <text x="-150" y="25" fill="#ff7b72" font-weight="bold">Traceback: In S-Box[3] Layer</text>
                <text x="-150" y="45" fill="#ff2a2a" font-weight="bold" filter="url(#diff-glow-red)">
                    <animate attributeName="opacity" values="1;0;1" dur="0.15s" repeatCount="indefinite"/>
                    TrailContradiction: Pr(ΔX→ΔY) = 0
                </text>
                <text x="-150" y="60" fill="#8b949e" font-size="11">=> Path mathematically impossible to exist.</text>
            </g>
        </g>
    </g>

    <!-- Footer shadow banner -->
    <g transform="translate(200, 540)">
        <polygon points="-130,-16 130,-16 140,16 -140,16" fill="#2a000f" stroke="#ff2a2a" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#ff2a2a" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#diff-glow-red)">
            差分路径断裂：发生概率矛盾
        </text>
        <!-- Glitched framing border -->
        <rect x="-135" y="-12" width="270" height="24" fill="none" stroke="#fff" stroke-width="1" stroke-dasharray="30 20 5 10 10 200">
             <animate attributeName="stroke-dashoffset" from="275" to="0" dur="1.5s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>