<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="ep-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#1e1b4b"/>
            <stop offset="40%" stop-color="#171724"/>
            <stop offset="80%" stop-color="#09090b"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <radialGradient id="ep-glow-core" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="ep-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fef08a"/>
            <stop offset="40%" stop-color="#eab308"/>
            <stop offset="60%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#b45309"/>
        </linearGradient>
        <linearGradient id="ep-hologram" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#818cf8" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#312e81" stop-opacity="0.9"/>
        </linearGradient>
        <filter id="glow-ep-intense" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="glow-ep-soft">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- Data Matrix Pattern -->
        <pattern id="ep-matrix" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5" opacity="0.5"/>
            <circle cx="20" cy="20" r="1.5" fill="#38bdf8" opacity="0.3"/>
            <circle cx="0" cy="0" r="1" fill="#eab308" opacity="0.4"/>
            <path d="M 18 20 L 22 20 M 20 18 L 20 22" stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#ep-bg)"/>
    <rect width="400" height="600" fill="url(#ep-matrix)"/>
    
    <!-- Central ethereal glow -->
    <circle cx="200" cy="250" r="150" fill="url(#ep-glow-core)" filter="url(#glow-ep-intense)"/>

    <!-- Orbital Academic Network Layer 1 -->
    <g transform="translate(200, 250)" stroke-width="1.5" fill="none" opacity="0.7" filter="url(#glow-ep-soft)">
        <!-- Outer synchronization ring -->
        <circle cx="0" cy="0" r="170" stroke="#38bdf8" stroke-dasharray="2 6 8 4" opacity="0.6">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Inner gold data track -->
        <circle cx="0" cy="0" r="145" stroke="url(#ep-gold)" stroke-width="2" stroke-dasharray="10 20 5 15">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Tilted Network Rings -->
        <g stroke="#818cf8">
            <ellipse cx="0" cy="0" rx="180" ry="50" transform="rotate(25)">
                <animateTransform attributeName="transform" type="rotate" from="25" to="385" dur="45s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="0" cy="0" rx="180" ry="50" transform="rotate(-35)">
                <animateTransform attributeName="transform" type="rotate" from="-35" to="325" dur="35s" repeatCount="indefinite"/>
            </ellipse>
            <ellipse cx="0" cy="0" rx="180" ry="50" transform="rotate(85)" stroke="#38bdf8" stroke-dasharray="10 10">
                <animateTransform attributeName="transform" type="rotate" from="85" to="445" dur="55s" repeatCount="indefinite"/>
            </ellipse>
        </g>
    </g>

    <!-- Revolving Data Nodes & Constellations -->
    <g transform="translate(200, 250)" filter="url(#glow-ep-intense)">
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="20s" repeatCount="indefinite"/>
            <!-- Triangle Constellation -->
            <polygon points="0,-145 125.5,72.5 -125.5,72.5" fill="none" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="5 5" opacity="0.4"/>
            
            <!-- Floating Nodes -->
            <circle cx="0" cy="-145" r="6" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
            <circle cx="125.5" cy="72.5" r="5" fill="#38bdf8" stroke="#0284c7" stroke-width="2"/>
            <circle cx="-125.5" cy="72.5" r="5" fill="#38bdf8" stroke="#0284c7" stroke-width="2"/>
            
            <!-- Connection lines -->
            <path d="M 0 -145 L 80 -80 L 125.5 72.5 M -125.5 72.5 L -80 -80 L 0 -145" stroke="#38bdf8" stroke-width="0.5" fill="none" opacity="0.6"/>
        </g>
    </g>

    <!-- Main Emblem: High-Tech IACR Scroll -->
    <g transform="translate(200, 250)" filter="url(#glow-ep-intense)">
        <!-- Pedestal / Base -->
        <path d="M -90 -110 L 90 -110 L 100 110 L -100 110 Z" fill="#040816" stroke="#1e293b" opacity="0.8"/>
        <rect x="-95" y="-120" width="190" height="240" rx="8" fill="url(#ep-hologram)" opacity="0.2" stroke="#38bdf8" stroke-width="1"/>
        
        <!-- Glowing Pillars -->
        <rect x="-85" y="-100" width="12" height="200" rx="6" fill="#1e293b" stroke="url(#ep-gold)" stroke-width="1.5"/>
        <rect x="73" y="-100" width="12" height="200" rx="6" fill="#1e293b" stroke="url(#ep-gold)" stroke-width="1.5"/>
        
        <line x1="-79" y1="-90" x2="-79" y2="90" stroke="#fef08a" stroke-width="2" opacity="0.5"/>
        <line x1="79" y1="-90" x2="79" y2="90" stroke="#fef08a" stroke-width="2" opacity="0.5"/>
        
        <!-- Central Layered Document -->
        <!-- Back page layers for depth -->
        <path d="M -72 -105 L 72 -105 L 72 85 L -72 85 Z" fill="#0f172a" stroke="#818cf8" stroke-width="1" opacity="0.4"/>
        <path d="M -69 -98 L 69 -98 L 69 90 L -69 90 Z" fill="#1e293b" stroke="#38bdf8" stroke-width="0.5" opacity="0.7"/>
        <!-- Front page perfectly centered -->
        <path d="M -66 -90 L 66 -90 L 66 80 Q 66 100 46 100 L -46 100 Q -66 100 -66 80 Z" fill="#020617" stroke="url(#ep-gold)" stroke-width="3"/>
        
        <!-- Header Text centered -->
        <text x="0" y="-60" text-anchor="middle" fill="#f8fafc" font-family="'Times New Roman', serif" font-size="28" font-weight="900" letter-spacing="4" filter="url(#glow-ep-soft)">IACR</text>

        <!-- Abstract Text Lines (Research Papers / Code) centered -->
        <g stroke-linecap="round" opacity="0.8">
            <path d="M -45 -35 L 45 -35" stroke="#38bdf8" stroke-width="3"/>
            <path d="M -45 -15 L 15 -15" stroke="#94a3b8" stroke-width="2.5"/>
            <!-- Highlighted golden line -->
            <path d="M -45 5 L 45 5" stroke="url(#ep-gold)" stroke-width="4" filter="url(#glow-ep-soft)"/>
            <path d="M -45 25 L 35 25" stroke="#38bdf8" stroke-width="2" stroke-dasharray="8 4"/>
        </g>
        
        <!-- Cryptographic Lock / Wax Seal Element Centered -->
        <g transform="translate(0, 70)">
            <circle cx="0" cy="0" r="25" fill="#1e1b4b" stroke="url(#ep-gold)" stroke-width="3" filter="url(#glow-ep-soft)"/>
            <circle cx="0" cy="0" r="19" fill="none" stroke="#fef08a" stroke-dasharray="3 3" stroke-width="1.5">
                <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="10s" repeatCount="indefinite"/>
            </circle>
            <!-- Keyhole / Node -->
            <circle cx="0" cy="-3" r="5" fill="url(#ep-gold)"/>
            <path d="M -4 -1 L 4 -1 L 7 11 L -7 11 Z" fill="url(#ep-gold)"/>
            <circle cx="0" cy="7" r="2" fill="#1e1b4b"/>
        </g>
    </g>

    <!-- Bottom Branding with Tech Frames -->
    <g transform="translate(200, 480)" filter="url(#glow-ep-intense)">
        <!-- Framing lines -->
        <path d="M -150 -15 L -120 -15 L -110 5 L 110 5 L 120 -15 L 150 -15" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.6"/>
        <path d="M -160 0 L -140 0 M 140 0 L 160 0" stroke="url(#ep-gold)" stroke-width="3"/>
        
        <text x="0" y="-12" text-anchor="middle" fill="url(#ep-gold)" font-family="'Times New Roman', Times, serif" font-size="44" font-weight="bold" letter-spacing="6">ePrint</text>
    </g>
    
    <g transform="translate(200, 535)" filter="url(#glow-ep-soft)">
        <!-- Futuristic badge -->
        <polygon points="-120,0 -110,-16 110,-16 120,0 110,16 -110,16" fill="#0f172a" stroke="url(#ep-gold)" stroke-width="2"/>
        <polygon points="-115,0 -107,-12 107,-12 115,0 107,12 -107,12" fill="none" stroke="#38bdf8" stroke-width="0.5" stroke-dasharray="4 2"/>
        
        <text x="0" y="5" text-anchor="middle" fill="#fef08a" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold" letter-spacing="4">CRYPTOLOGY ARCHIVE</text>
        
        <!-- Blinking cursor / node -->
        <circle cx="-135" cy="0" r="3" fill="#38bdf8">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="135" cy="0" r="3" fill="#38bdf8">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
    </g>
</svg>