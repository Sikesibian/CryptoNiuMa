<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="eso-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="40%" stop-color="#1e1b4b"/>
            <stop offset="80%" stop-color="#172554"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </radialGradient>
        <linearGradient id="eso-shield" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="50%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#1e3a8a"/>
        </linearGradient>
        <linearGradient id="eso-cyber" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
        <filter id="eso-glow-intense">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="eso-glow-soft">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="eso-stars" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="20" cy="20" r="1.5" fill="#3b82f6" opacity="0.4">
                <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite" />
            </circle>
            <path d="M 0 0 L 40 40 M 40 0 L 0 40" stroke="#1e3a8a" stroke-width="0.5" opacity="0.2"/>
        </pattern>
        <!-- Hexagon path for reuse -->
        <polygon id="hex" points="0,-10 8.66,-5 8.66,5 0,10 -8.66,5 -8.66,-5"/>
    </defs>

    <rect width="400" height="600" fill="url(#eso-bg)"/>
    <rect width="400" height="600" fill="url(#eso-stars)"/>

    <!-- Glowing core background -->
    <circle cx="200" cy="240" r="140" fill="#1d4ed8" filter="url(#eso-glow-intense)">
        <animate attributeName="opacity" values="0.1;0.25;0.1" dur="5s" repeatCount="indefinite"/>
        <animate attributeName="r" values="130;145;130" dur="5s" repeatCount="indefinite"/>
    </circle>

    <!-- European Union Star Ring Concept - High Tech -->
    <g transform="translate(200, 240)">
        <!-- Complex orbital rings -->
        <circle cx="0" cy="0" r="140" fill="none" stroke="#1e3a8a" stroke-width="1.5" stroke-dasharray="8 4 2 4">
             <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="125" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.6">
             <animate attributeName="r" values="124;126;124" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <g>
            <circle cx="0" cy="0" r="110" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="1 6"/>
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
        </g>
        
        <g fill="#93c5fd" filter="url(#eso-glow-soft)">
            <!-- 12 Stars of Europe positioned precisely -->
            <path d="M 0 -135 L 2 -129 L 8 -129 L 3 -125 L 5 -119 L 0 -123 L -5 -119 L -3 -125 L -8 -129 L -2 -129 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" repeatCount="indefinite"/></path>
            <path d="M 67.5 -116.9 L 69.5 -110.9 L 75.5 -110.9 L 70.5 -106.9 L 72.5 -100.9 L 67.5 -104.9 L 62.5 -100.9 L 64.5 -106.9 L 59.5 -110.9 L 65.5 -110.9 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="0.5s" repeatCount="indefinite"/></path>
            <path d="M 116.9 -67.5 L 118.9 -61.5 L 124.9 -61.5 L 119.9 -57.5 L 121.9 -51.5 L 116.9 -55.5 L 111.9 -51.5 L 113.9 -57.5 L 108.9 -61.5 L 114.9 -61.5 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1s" repeatCount="indefinite"/></path>
            <path d="M 135 0 L 137 6 L 143 6 L 138 10 L 140 16 L 135 12 L 130 16 L 132 10 L 127 6 L 133 6 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="1.5s" repeatCount="indefinite"/></path>
            <path d="M 116.9 67.5 L 118.9 73.5 L 124.9 73.5 L 119.9 77.5 L 121.9 83.5 L 116.9 79.5 L 111.9 83.5 L 113.9 77.5 L 108.9 73.5 L 114.9 73.5 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2s" repeatCount="indefinite"/></path>
            <path d="M 67.5 116.9 L 69.5 122.9 L 75.5 122.9 L 70.5 126.9 L 72.5 132.9 L 67.5 128.9 L 62.5 132.9 L 64.5 126.9 L 59.5 122.9 L 65.5 122.9 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="2.5s" repeatCount="indefinite"/></path>
            <path d="M 0 135 L 2 141 L 8 141 L 3 145 L 5 151 L 0 147 L -5 151 L -3 145 L -8 141 L -2 141 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3s" repeatCount="indefinite"/></path>
            <path d="M -67.5 116.9 L -65.5 122.9 L -59.5 122.9 L -64.5 126.9 L -62.5 132.9 L -67.5 128.9 L -72.5 132.9 L -70.5 126.9 L -75.5 122.9 L -69.5 122.9 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="3.5s" repeatCount="indefinite"/></path>
            <path d="M -116.9 67.5 L -114.9 73.5 L -108.9 73.5 L -113.9 77.5 L -111.9 83.5 L -116.9 79.5 L -121.9 83.5 L -119.9 77.5 L -124.9 73.5 L -118.9 73.5 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="4s" repeatCount="indefinite"/></path>
            <path d="M -135 0 L -133 6 L -127 6 L -132 10 L -130 16 L -135 12 L -140 16 L -138 10 L -143 6 L -137 6 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="4.5s" repeatCount="indefinite"/></path>
            <path d="M -116.9 -67.5 L -114.9 -61.5 L -108.9 -61.5 L -113.9 -57.5 L -111.9 -51.5 L -116.9 -55.5 L -121.9 -51.5 L -119.9 -57.5 L -124.9 -61.5 L -118.9 -61.5 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="5s" repeatCount="indefinite"/></path>
            <path d="M -67.5 -116.9 L -65.5 -110.9 L -59.5 -110.9 L -64.5 -106.9 L -62.5 -100.9 L -67.5 -104.9 L -72.5 -100.9 L -70.5 -106.9 L -75.5 -110.9 L -69.5 -110.9 Z"><animate attributeName="opacity" values="0.3;1;0.3" dur="6s" begin="5.5s" repeatCount="indefinite"/></path>
        </g>
        
        <!-- Large Architectural Cyber Shield with floating anim -->
        <g filter="url(#eso-glow-intense)">
            <animateTransform attributeName="transform" type="translate" values="0,-5; 0,5; 0,-5" dur="6s" repeatCount="indefinite"/>
            
            <!-- Layer 1: Holographic backplate -->
            <path d="M -70 -60 L 0 -95 L 70 -60 L 70 35 C 70 80 30 115 0 130 C -30 115 -70 80 -70 35 Z" fill="#1e3a8a" opacity="0.4"/>
            
            <!-- Layer 2: Main Shield Plating -->
            <path d="M -60 -50 L 0 -80 L 60 -50 L 60 30 C 60 70 25 100 0 115 C -25 100 -60 70 -60 30 Z" fill="url(#eso-shield)" stroke="#bfdbfe" stroke-width="2.5"/>
            
            <!-- Layer 3: Cyber Design Inlay -->
            <path d="M -45 -35 L 0 -55 L 45 -35 L 45 25 C 45 60 18 85 0 95 C -18 85 -45 60 -45 25 Z" fill="#020617"/>
            <path d="M -35 -25 L 0 -40 L 35 -25 L 35 20 C 35 45 12 65 0 75 C -12 65 -35 45 -35 20 Z" fill="none" stroke="url(#eso-cyber)" stroke-width="1.5" stroke-dasharray="4 2">
                 <animate attributeName="stroke-dashoffset" values="6;0" dur="1s" repeatCount="indefinite"/>
            </path>
            
            <!-- High-tech core detailing -->
            <path d="M 0 -75 L 0 110" stroke="#60a5fa" stroke-width="2" opacity="0.8"/>
            
            <!-- Scanning Laser Line -->
            <line x1="-35" y1="0" x2="35" y2="0" stroke="#93c5fd" stroke-width="2" opacity="0.5">
                 <animate attributeName="y1" values="-60;80;-60" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" calcMode="spline"/>
                 <animate attributeName="y2" values="-60;80;-60" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" calcMode="spline"/>
            </line>
            
            <!-- Security Network Nodes -->
            <g fill="none" stroke="#60a5fa" stroke-width="1.5">
                <line x1="-45" y1="0" x2="-20" y2="0"/>
                <line x1="20" y1="0" x2="45" y2="0"/>
                <line x1="-30" y1="35" x2="-15" y2="25"/>
                <line x1="30" y1="35" x2="15" y2="25"/>
            </g>
            
            <!-- Shield Core Lock -->
            <circle cx="0" cy="0" r="20" fill="#1e1b4b" stroke="#3b82f6" stroke-width="3"/>
            <circle cx="0" cy="0" r="14" fill="none" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4 4">
                 <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Inner Glowing Eye/Lock -->
            <polygon points="-8,-4 8,-4 4,8 -4,8" fill="#60a5fa">
                 <animate attributeName="fill" values="#60a5fa;#eff6ff;#60a5fa" dur="2s" repeatCount="indefinite"/>
            </polygon>
            <circle cx="0" cy="0" r="3" fill="#ffffff">
                  <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Cybernetic Hexagons floating over shield -->
            <g transform="translate(-30, -20)">
                <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/><use href="#hex" fill="#3b82f6" opacity="0.6"/></g>
            </g>
            <g transform="translate(30, -20)">
                <g><animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="6s" repeatCount="indefinite"/><use href="#hex" fill="#3b82f6" opacity="0.6"/></g>
            </g>
            <g transform="translate(-20, 45)">
                <g><animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="4s" repeatCount="indefinite"/><use href="#hex" fill="#3b82f6" opacity="0.6"/></g>
            </g>
            <g transform="translate(20, 45)">
                <g><animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4.5s" repeatCount="indefinite"/><use href="#hex" fill="#3b82f6" opacity="0.6"/></g>
            </g>
        </g>
    </g>

    <!-- Typography framing & Title -->
    <g transform="translate(200, 480)" filter="url(#eso-glow-intense)">
        <!-- Framing elements -->
        <path d="M -130 -20 L -90 -20 L -75 0 L 75 0 L 90 -20 L 130 -20" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8" stroke-dasharray="120 40">
             <animate attributeName="stroke-dashoffset" values="160;0" dur="4s" repeatCount="indefinite"/>
        </path>
        <path d="M -110 20 L -80 20 L -65 5 L 65 5 L 80 20 L 110 20" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.6" stroke-dasharray="80 20">
             <animate attributeName="stroke-dashoffset" values="0;100" dur="3s" repeatCount="indefinite"/>
        </path>
        
        <text x="0" y="5" text-anchor="middle" fill="#eff6ff" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="900" letter-spacing="8">ESORICS</text>
    </g>
    
    <g transform="translate(200, 535)" filter="url(#eso-glow-soft)">
        <rect x="-140" y="-12" width="280" height="40" fill="#0f172a" stroke="#1e3a8a" stroke-width="1" opacity="0.8" rx="4"/>
        <text x="0" y="4" text-anchor="middle" fill="#93c5fd" font-family="'Times New Roman', serif" font-size="12" letter-spacing="1.5">European Symposium on Research</text>
        <text x="0" y="19" text-anchor="middle" fill="#93c5fd" font-family="'Times New Roman', serif" font-size="12" letter-spacing="1.5">in Computer Security</text>
        
        <circle cx="-125" cy="8" r="2.5" fill="#3b82f6">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="125" cy="8" r="2.5" fill="#3b82f6">
            <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
        </circle>
    </g>
</svg>