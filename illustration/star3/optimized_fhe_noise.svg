<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="fhe-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050510"/>
            <stop offset="100%" stop-color="#1a0b1c"/>
        </linearGradient>
        <linearGradient id="fhe-noise-grad" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#ff7b00" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#00ffcc" stop-opacity="0.1"/>
        </linearGradient>
        <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="noise-glitch">
            <feTurbulence type="fractalNoise" baseFrequency="0.15" numOctaves="3" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.1"/>
        </pattern>
    </defs>

    <rect width="100%" height="100%" fill="url(#fhe-bg)"/>
    <rect width="100%" height="100%" fill="url(#grid)"/>

    <!-- Math formulas layer -->
    <g font-family="'Fira Code', 'Courier New', monospace" font-size="11" fill="#00ffcc" opacity="0.3" transform="translate(20, 30)">
        <text y="0">Homomorphic_Eval(E(m1), E(m2)) → E(m1 ⊗ m2)</text>
        <text y="20">v_{noise} ≈ ||e1·m2 + e2·m1 + e1·e2||</text>
        <text y="40">Condition: v_{noise} &lt; q / 2</text>
    </g>

    <!-- Noise growth graph -->
    <g transform="translate(40, 100)">
        <!-- Axes -->
        <path d="M 0 150 L 0 0 M 0 150 L 320 150" stroke="#4a5568" stroke-width="2"/>
        <text x="325" y="155" fill="#a0aec0" font-size="10" font-family="monospace">Depth</text>
        <text x="-35" y="10" fill="#a0aec0" font-size="10" font-family="monospace">Noise</text>
        
        <!-- Threshold line -->
        <line x1="0" y1="30" x2="320" y2="30" stroke="#ff2a2a" stroke-dasharray="5,5" stroke-width="2" filter="url(#glow-red)"/>
        <text x="5" y="25" fill="#ff2a2a" font-size="10" font-family="monospace" font-weight="bold">DECRYPTION FAILURE THRESHOLD (q/2)</text>

        <!-- Noise curve -->
        <path d="M 0 140 Q 150 130 220 80 T 300 10" fill="none" stroke="url(#fhe-noise-grad)" stroke-width="4" filter="url(#glow-red)"/>
        
        <!-- Data points -->
        <circle cx="0" cy="140" r="3" fill="#00ffcc"/>
        <circle cx="80" cy="130" r="3" fill="#00ffcc"/>
        <circle cx="160" cy="105" r="3" fill="#ff7b00"/>
        <circle cx="240" cy="60" r="4" fill="#ff2a2a" filter="url(#glow-red)"/>
        <circle cx="300" cy="10" r="6" fill="#ff0000" filter="url(#glow-red)">
            <animate attributeName="r" values="6;10;6" dur="0.5s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Terminal Output -->
    <g transform="translate(20, 300)">
        <rect width="360" height="180" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
        <rect width="360" height="25" rx="6" fill="#161b22"/>
        <circle cx="15" cy="12.5" r="5" fill="#ff5f56"/>
        <circle cx="35" cy="12.5" r="5" fill="#ffbd2e"/>
        <circle cx="55" cy="12.5" r="5" fill="#27c93f"/>
        <text x="180" y="17" fill="#8b949e" font-family="monospace" font-size="10" text-anchor="middle">fhe_circuit_eval.sh</text>

        <g font-family="'Fira Code', 'Courier New', monospace" font-size="11" transform="translate(15, 50)">
            <text y="0" fill="#56d364">&gt; [Gate 12] Mult... Noise: 22 bits OK</text>
            <text y="20" fill="#56d364">&gt; [Gate 13] Mult... Noise: 27 bits OK</text>
            <text y="40" fill="#e3b341">&gt; [Gate 14] Mult... WARNING: Noise budget low</text>
            <text y="60" fill="#ff7b72">&gt; [Gate 15] Mult... FATAL: Budget overflow</text>
            
            <rect x="0" y="75" width="330" height="20" fill="#ff2a2a" opacity="0.2"/>
            <text y="89" fill="#ff7b72" font-weight="bold" filter="url(#noise-glitch)">ERR: Decryption yields uniform noise</text>
            
            <text y="110" fill="#8b949e">Output: <tspan fill="#d2a8ff">0x</tspan><tspan fill="#ff7b72" font-weight="bold" filter="url(#noise-glitch)">8F3A...1B9C</tspan></text>
        </g>
    </g>

    <!-- UI Alert Box -->
    <g transform="translate(20, 500)">
        <polygon points="10,0 350,0 360,10 360,60 350,70 10,70 0,60 0,10" fill="#2d0a0a" stroke="#ff2a2a" stroke-width="2" filter="url(#glow-red)"/>
        <path d="M 0 10 L 10 0 M 360 60 L 350 70" stroke="#ff2a2a" stroke-width="2"/>
        
        <text x="180" y="30" text-anchor="middle" fill="#ff7b72" font-family="'Orbitron', sans-serif" font-size="16" font-weight="bold" letter-spacing="2">FHE NOISE OVERFLOW</text>
        <text x="180" y="50" text-anchor="middle" fill="#ffb4a1" font-family="monospace" font-size="11">HOMOMORPHIC EVALUATION ABORTED</text>
    </g>
</svg>