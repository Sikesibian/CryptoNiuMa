<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dynamic Background transitioning from normal to alert -->
        <radialGradient id="desk-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0f172a">
                <animate attributeName="stop-color" values="#0f172a; #0f172a; #450a0a; #450a0a" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        
        <filter id="glow-scan">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <filter id="glow-stamp">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Violent Screen Shake when the stamp hits -->
        <filter id="stamp-shake">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" result="noise">
                <animate attributeName="baseFrequency" values="0.001; 0.001; 0.8; 0.001" keyTimes="0; 0.49; 0.5; 0.7" dur="4s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G">
                 <animate attributeName="scale" values="0; 0; 15; 0" keyTimes="0; 0.49; 0.5; 0.7" dur="4s" repeatCount="indefinite"/>
            </feDisplacementMap>
        </filter>

        <!-- Technical Checkered background -->
        <pattern id="format-grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e293b" stroke-width="1">
                <animate attributeName="stroke" values="#1e293b; #1e293b; #7f1d1d; #7f1d1d" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
            </path>
        </pattern>

        <linearGradient id="scan-beam" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0"/>
            <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.6"/>
        </linearGradient>
    </defs>

    <rect width="400" height="600" fill="url(#desk-bg)"/>
    <rect width="400" height="600" fill="url(#format-grid)"/>

    <!-- The Scene (Affected by Camera Shake) -->
    <g filter="url(#stamp-shake)">
        
        <!-- Scanning Target Area -->
        <g transform="translate(200, 260)">
            <!-- Virtual Screen UI -->
            <rect x="-140" y="-160" width="280" height="320" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="10, 10"/>
            <text x="0" y="-170" fill="#94a3b8" font-family="'Courier New', monospace" font-size="12" text-anchor="middle">IEEE_Format_Checker_v9.1.exe</text>

            <!-- PDF Wireframe (Double Column layout) -->
            <g>
                <!-- Pulse opacity before getting rejected -->
                <animate attributeName="opacity" values="1; 1; 0.4; 0.4" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
                
                <rect x="-80" y="-120" width="160" height="240" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
                <!-- Title -->
                <rect x="-60" y="-100" width="120" height="15" fill="#94a3b8"/>
                <!-- Authors -->
                <rect x="-30" y="-75" width="60" height="6" fill="#cbd5e1"/>
                
                <!-- Column 1 -->
                <rect x="-70" y="-55" width="65" height="150" fill="#cbd5e1"/>
                <rect x="-70" y="100" width="65" height="10" fill="#cbd5e1"/>
                
                <!-- Column 2 -->
                <rect x="5" y="-55" width="65" height="80" fill="#cbd5e1"/>
                <!-- Figure -->
                <rect x="5" y="30" width="65" height="40" fill="#94a3b8"/>
                <rect x="5" y="75" width="65" height="35" fill="#cbd5e1"/>
            </g>

            <!-- Flashing Error Overlays -->
            <!-- Error 1: Left Margin -->
            <g>
                <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.15; 0.2; 1" dur="4s" repeatCount="indefinite"/>
                <rect x="-80" y="-120" width="15" height="240" fill="#ef4444" opacity="0.4" filter="url(#glow-scan)"/>
                <line x1="-72" y1="-20" x2="-110" y2="-40" stroke="#fca5a5" stroke-width="2"/>
                <rect x="-180" y="-60" width="70" height="25" fill="#7f1d1d" stroke="#fca5a5" rx="3"/>
                <text x="-145" y="-45" fill="#fff" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" font-weight="bold">Margin &lt; 1"</text>
            </g>

            <!-- Error 2: Missing Base Font -->
            <g>
                <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.25; 0.3; 1" dur="4s" repeatCount="indefinite"/>
                <rect x="-70" y="-20" width="65" height="20" fill="#ef4444" opacity="0.6" filter="url(#glow-scan)"/>
                <line x1="-37" y1="-10" x2="-110" y2="10" stroke="#fca5a5" stroke-width="2"/>
                <rect x="-180" y="0" width="70" height="25" fill="#7f1d1d" stroke="#fca5a5" rx="3"/>
                <text x="-145" y="15" fill="#fff" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" font-weight="bold">Type 3 Font</text>
            </g>
            
            <!-- Error 3: Image DPI -->
            <g>
                <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.35; 0.4; 1" dur="4s" repeatCount="indefinite"/>
                <rect x="5" y="30" width="65" height="40" fill="#f59e0b" opacity="0.6" filter="url(#glow-scan)"/>
                <line x1="37" y1="50" x2="110" y2="60" stroke="#fbbf24" stroke-width="2"/>
                <rect x="110" y="50" width="75" height="25" fill="#78350f" stroke="#fbbf24" rx="3"/>
                <text x="147" y="66" fill="#fff" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" font-weight="bold">DPI=72(Low)</text>
            </g>

            <!-- The Scanning Laser -->
            <g>
                <animateTransform attributeName="transform" type="translate" values="0 -140; 0 140; 0 140; 0 -140" keyTimes="0; 0.45; 0.9; 1" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1; 1; 0; 0" keyTimes="0; 0.45; 0.46; 1" dur="4s" repeatCount="indefinite"/>
                <line x1="-120" y1="0" x2="120" y2="0" stroke="#3b82f6" stroke-width="4" filter="url(#glow-scan)"/>
                <!-- Laser Scanner Ends -->
                <polygon points="-120,-8 -100,0 -120,8" fill="#3b82f6"/>
                <polygon points="120,-8 100,0 120,8" fill="#3b82f6"/>
                <!-- Glow beam -->
                <rect x="-120" y="-30" width="240" height="30" fill="url(#scan-beam)"/>
            </g>

            <!-- Huge Administrative Stamp / Judgment -->
            <g>
                <animateTransform attributeName="transform" type="scale" values="4; 1; 1; 1; 4" keyTimes="0; 0.5; 0.52; 0.9; 1" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.49; 0.5; 0.9; 1" dur="4s" repeatCount="indefinite"/>
                
                <g transform="rotate(-15)">
                    <rect x="-130" y="-35" width="260" height="70" fill="#4c0519" stroke="#ef4444" stroke-width="8" rx="10" fill-opacity="0.9"/>
                    <!-- Inner Border -->
                    <rect x="-120" y="-25" width="240" height="50" fill="none" stroke="#ef4444" stroke-width="2" rx="5"/>
                    <text x="0" y="15" fill="#ef4444" font-family="'Impact', sans-serif" font-size="44" text-anchor="middle" letter-spacing="4" filter="url(#glow-stamp)">DESK REJECT</text>
                </g>
            </g>

            <!-- PDF eXpress Status Text -->
            <g>
                <animate attributeName="opacity" values="0; 0; 1; 1; 0" keyTimes="0; 0.49; 0.5; 0.9; 1" dur="4s" repeatCount="indefinite"/>
                <text x="0" y="150" fill="#ef4444" font-family="'Courier New', monospace" font-size="16" font-weight="bold" text-anchor="middle" filter="url(#glow-scan)">
                    <animate attributeName="opacity" values="1; 0; 1" dur="0.2s" repeatCount="indefinite"/>
                    > FORMAT_VIOLATION_DETECTED
                </text>
            </g>

        </g>
    </g>

    <!-- Bottom Badge Element -->
    <g transform="translate(200, 540)">
        <rect x="-120" y="-20" width="240" height="40" rx="4" fill="#0f172a" stroke="#3b82f6" stroke-width="2">
            <animate attributeName="stroke" values="#3b82f6; #3b82f6; #ef4444; #ef4444" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="fill" values="#0f172a; #0f172a; #4c0519; #4c0519" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
        </rect>
        <text x="0" y="5" text-anchor="middle" fill="#fca5a5" font-family="'Times New Roman', serif" font-size="16" font-weight="bold">冰冷的格式审查</text>
        <text x="0" y="-25" text-anchor="middle" fill="#93c5fd" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="1">
             <animate attributeName="fill" values="#93c5fd; #93c5fd; #f87171; #f87171" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
            SYSTEM: PDF EXPRESS
        </text>
    </g>
</svg>