<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="icics-bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#1a0b2e"/>
            <stop offset="100%" stop-color="#0a0410"/>
        </linearGradient>
        <radialGradient id="plasma" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#9d4edd"/>
            <stop offset="50%" stop-color="#5a189a"/>
            <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <filter id="purple-glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
            <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        </pattern>
    </defs>
    
    <rect width="400" height="600" fill="url(#icics-bg)"/>
    <circle cx="200" cy="240" r="180" fill="url(#plasma)" opacity="0.3"/>
    <rect width="400" height="600" fill="url(#scanlines)"/>

    <!-- Concentric Comms Waves -->
    <g fill="none" stroke="#c77dff" stroke-width="1.5" opacity="0.6" transform="translate(200, 240)">
        <circle cx="0" cy="0" r="140">
            <animate attributeName="r" values="0;140" dur="3s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="0" r="140">
            <animate attributeName="r" values="0;140" dur="3s" begin="1.5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Cyber-Satellite / Network Structure -->
    <g transform="translate(200, 240)" filter="url(#purple-glow)">
        <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="rgba(60, 9, 108, 0.4)" stroke="#e0aaff" stroke-width="2"/>
        <path d="M0 -60 L0 0 M52 -30 L0 0 M52 30 L0 0 M0 60 L0 0 M-52 30 L0 0 M-52 -30 L0 0" stroke="#c77dff" stroke-width="1.5" stroke-dasharray="2 2"/>
        <circle cx="0" cy="0" r="15" fill="#e0aaff"/>
        <circle cx="0" cy="0" r="6" fill="#1a0b2e"/>
        <!-- Orbiting data packets -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite"/>
            <circle cx="80" cy="0" r="4" fill="#ff9e00"/>
            <circle cx="-80" cy="0" r="4" fill="#00f5d4"/>
            <circle cx="0" cy="80" r="4" fill="#f72585"/>
        </g>
    </g>

    <!-- Communication Data Flow -->
    <g stroke="#9d4edd" stroke-width="2" opacity="0.5">
        <path d="M50 400 Q200 350 350 400" fill="none"/>
        <path d="M50 420 Q200 390 350 420" fill="none"/>
        <path d="M50 440 Q200 430 350 440" fill="none"/>
    </g>

    <text x="200" y="490" text-anchor="middle" fill="#e0aaff" font-family="'Exo', sans-serif" font-size="42" font-weight="900" filter="url(#purple-glow)" letter-spacing="6">ICICS</text>
    
    <text x="200" y="525" text-anchor="middle" fill="#c77dff" font-family="'Roboto Condensed', sans-serif" font-size="11" letter-spacing="3">INFORMATION &amp; COMMUNICATIONS SECURITY</text>
    
    <!-- Bottom HUD elements -->
    <path d="M120 560 L140 580 L260 580 L280 560" fill="none" stroke="#7b2cbf" stroke-width="2"/>
    <rect x="180" y="575" width="40" height="5" fill="#e0aaff" filter="url(#purple-glow)"/>
</svg>