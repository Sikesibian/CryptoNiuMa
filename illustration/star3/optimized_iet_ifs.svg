<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="iet-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#172554"/>
            <stop offset="50%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#020617"/>
        </radialGradient>
        <linearGradient id="iet-blue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="50%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </linearGradient>
        <linearGradient id="iet-purple" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c084fc"/>
            <stop offset="100%" stop-color="#7e22ce"/>
        </linearGradient>
        <filter id="iet-glow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="iet-dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="1.5" fill="#1e3a8a" opacity="0.4"/>
        </pattern>
    </defs>
    <rect width="400" height="600" fill="url(#iet-bg)"/>
    <rect width="400" height="600" fill="url(#iet-dots)"/>

    <!-- High-tech Grid and Nodes -->
    <g stroke="#1e40af" stroke-width="1" fill="none" opacity="0.6">
        <path d="M 80 50 L 320 50 M 80 430 L 320 430"/>
        <path d="M 50 80 L 50 400 M 350 80 L 350 400"/>
        <path d="M 50 80 L 80 50 M 350 80 L 320 50 M 50 400 L 80 430 M 350 400 L 320 430"/>
    </g>

    <!-- Scanning Radar / Data Ripples -->
    <g transform="translate(200, 240)">
        <ellipse cx="0" cy="0" rx="140" ry="60" fill="none" stroke="#2563eb" stroke-width="1" stroke-dasharray="4 8">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="0" cy="0" rx="100" ry="100" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.3">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
        </ellipse>
        <circle cx="0" cy="0" r="120" stroke="url(#iet-blue)" stroke-width="0.5" fill="none" opacity="0.5"/>
    </g>

    <!-- Main Shield & Lock -->
    <g transform="translate(200, 240)" filter="url(#iet-glow)">
        <!-- Complex Shield -->
        <path d="M 0 -100 L 70 -70 L 70 20 C 70 80 0 120 0 120 C 0 120 -70 80 -70 20 L -70 -70 Z" fill="#0f172a" stroke="url(#iet-blue)" stroke-width="3"/>
        <path d="M 0 -85 L 55 -60 L 55 15 C 55 60 0 95 0 95 C 0 95 -55 60 -55 15 L -55 -60 Z" fill="none" stroke="url(#iet-purple)" stroke-width="2" stroke-dasharray="10 5">
            <animate attributeName="stroke-dashoffset" values="30;0" dur="2s" repeatCount="indefinite"/>
        </path>
        
        <!-- Futuristic Lock Core -->
        <path d="M -25 -25 V -45 A 25 25 0 0 1 25 -45 V -25" fill="none" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"/>
        <path d="M -20 -25 V -45 A 20 20 0 0 1 20 -45 V -25" fill="none" stroke="#93c5fd" stroke-width="2" stroke-linecap="round"/>
        
        <rect x="-35" y="-25" width="70" height="55" rx="8" fill="url(#iet-blue)" stroke="#bfdbfe" stroke-width="2"/>
        
        <!-- Lock Keyhole Design -->
        <circle cx="0" cy="-5" r="9" fill="#020617"/>
        <path d="M -5 -5 L 5 -5 L 8 15 L -8 15 Z" fill="#020617"/>
        <circle cx="0" cy="-5" r="4" fill="#60a5fa"/>

        <!-- Energy Pulses -->
        <circle cx="-35" cy="2" r="3" fill="#c084fc">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="35" cy="2" r="3" fill="#c084fc">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.75s" repeatCount="indefinite"/>
        </circle>
    </g>

    <text x="200" y="470" text-anchor="middle" fill="#d8b4fe" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" letter-spacing="3" filter="url(#iet-glow)">IET IFS</text>
    <text x="200" y="510" text-anchor="middle" fill="#93c5fd" font-family="'Times New Roman', Times, serif" font-size="16" letter-spacing="1">IET Information Security</text>
    <path d="M 100 540 L 300 540" fill="none" stroke="#3b82f6" stroke-width="1" stroke-dasharray="1 3"/>
</svg>