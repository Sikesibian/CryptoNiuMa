<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" style="background-color: #010308; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden;">
    <defs>
        <linearGradient id="iso-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="50%" stop-color="#08071a"/>
            <stop offset="100%" stop-color="#000000"/>
        </linearGradient>

        <radialGradient id="iso-glow-et" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
        </radialGradient>

        <filter id="iso-glow-cyan"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="iso-glow-red"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="iso-glow-purp"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="iso-glow-green"><feGaussianBlur stdDeviation="3.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>

        <pattern id="iso-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e1b4b" stroke-width="0.5"/>
            <circle cx="0" cy="0" r="1.5" fill="#312e81" opacity="0.6"/>
        </pattern>

        <marker id="iso-arr-cyan" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#22d3ee"/></marker>
        <marker id="iso-arr-purp" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#c084fc"/></marker>
        <marker id="iso-arr-red" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto"><path d="M0,0 L5,2.5 L0,5 Z" fill="#ef4444"/></marker>
        
        <style>
            @keyframes iso-pulse-node { 0%, 100% { stroke-width: 2; filter: brightness(1); } 50% { stroke-width: 4; filter: brightness(1.3); } }
            @keyframes iso-path-walk { 0% { stroke-dashoffset: 100; stroke-opacity: 0.1; } 50% { stroke-opacity: 1; } 100% { stroke-dashoffset: 0; stroke-opacity: 0.3; } }
            @keyframes iso-fail-flash { 0%, 100% { opacity: 0.8; stroke: #9f1239; } 50% { opacity: 1; stroke: #fb7185; } }
            @keyframes iso-float-target { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
            @keyframes iso-search-ring { 0% { r: 5; opacity: 1; stroke-width: 2; } 100% { r: 40; opacity: 0; stroke-width: 0.5; } }

            .iso-edge-l2 { fill: none; stroke: rgba(34, 211, 238, 0.4); stroke-width: 1.5; }
            .iso-edge-l3 { fill: none; stroke: rgba(192, 132, 252, 0.4); stroke-width: 1.5; stroke-dasharray: 4 2; }
            
            .iso-walk-l2 { fill: none; stroke: #22d3ee; stroke-width: 2; stroke-dasharray: 100; animation: iso-path-walk 2s linear infinite; }
            .iso-walk-l3 { fill: none; stroke: #c084fc; stroke-width: 2.5; stroke-dasharray: 100; stroke-dashoffset: 100; }
            .iso-walk-fail { fill: none; stroke: #ef4444; stroke-width: 2.5; stroke-dasharray: 100; animation: iso-path-walk 1.5s linear infinite reverse; }

            .iso-node-start { fill: #0891b2; stroke: #22d3ee; stroke-width: 2; animation: iso-pulse-node 3s infinite; filter: url(#iso-glow-cyan); }
            .iso-node-mid { fill: #4a044e; stroke: #c084fc; stroke-width: 1.5; filter: url(#iso-glow-purp); }
            .iso-node-fail { fill: #4c0519; stroke: #ef4444; stroke-width: 2; animation: iso-fail-flash 1s infinite; filter: url(#iso-glow-red); }
            .iso-node-target { fill: #064e3b; stroke: #34d399; stroke-width: 2; filter: url(#iso-glow-green); }

            .iso-search-ring { fill: none; stroke: #ef4444; animation: iso-search-ring 1.5s infinite; }

            .iso-math-text { font-family: 'Courier New', monospace; font-size: 10px; fill: #94a3b8; }
            .iso-bold-text { font-family: 'Courier New', monospace; font-size: 11px; font-weight: bold; fill: #e2e8f0; }
            .iso-alert-text { font-family: 'Impact', sans-serif; letter-spacing: 2px; font-size: 18px; }
        </style>
    </defs>

    <rect width="400" height="600" fill="url(#iso-bg)"/>
    <rect width="400" height="600" fill="url(#iso-grid)"/>

    <!-- Header Panel -->
    <g transform="translate(200, 40)">
        <rect x="-180" y="-20" width="360" height="45" rx="4" fill="rgba(8, 47, 73, 0.4)" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="2 4"/>
        <text y="0" class="iso-bold-text" fill="#7dd3fc" text-anchor="middle">Supersingular Isogeny Graph Expander</text>
        <text y="15" class="iso-math-text" fill="#38bdf8" text-anchor="middle">Vertices: ~p/12 over F_p² | Ramanujan Graph</text>
    </g>

    <!-- Isogeny Graph Visualization -->
    <g transform="translate(0, 80)">
        
        <!-- Target Node Area (Top Right, Hard to reach) -->
        <g transform="translate(320, 60)">
            <g style="animation: iso-float-target 4s ease-in-out infinite;">
                <circle cx="0" cy="0" r="45" fill="url(#iso-glow-et)"/>
                <circle cx="0" cy="0" r="8" class="iso-node-target"/>
                <text x="15" y="-10" class="iso-bold-text" fill="#a7f3d0" filter="url(#iso-glow-green)">E_TARGET</text>
                <text x="15" y="5" class="iso-math-text" fill="#6ee7b7">Unknown</text>
                
                <!-- Broken connection tries near target -->
                <path d="M -40,20 L -15,5" class="iso-edge-l2" opacity="0.3"/>
                <path d="M -30,-30 L -10,-8" class="iso-edge-l3" opacity="0.3"/>
            </g>
        </g>

        <!-- Start Node (Bottom Left) -->
        <g transform="translate(70, 320)">
            <!-- Base Graph Static Edges -->
            <!-- l=2 edges -->
            <path d="M 0,0 L 50,-40" class="iso-edge-l2"/>
            <path d="M 0,0 L 80,10" class="iso-edge-l2"/>
            <path d="M 0,0 L 10,-60" class="iso-edge-l2"/>
            <!-- l=3 edges -->
            <path d="M 50,-40 L 110,-70" class="iso-edge-l3"/>
            <path d="M 50,-40 L 40,-90" class="iso-edge-l3"/>
            <path d="M 80,10 L 130,-20" class="iso-edge-l3"/>
            <path d="M 10,-60 L 70,-110" class="iso-edge-l2"/>
            <path d="M 110,-70 L 160,-40" class="iso-edge-l2"/>
            <path d="M 110,-70 L 130,-120" class="iso-edge-l2"/>
            <path d="M 130,-20 L 180,10" class="iso-edge-l2"/>
            <path d="M 130,-120 L 190,-100" class="iso-edge-l3"/>
            <path d="M 160,-40 L 210,-70" class="iso-edge-l3"/>
            <path d="M 210,-70 L 250,-30" class="iso-edge-l2"/>
            <path d="M 210,-70 L 230,-110" class="iso-edge-l2"/>
            <path d="M 190,-100 L 250,-130" class="iso-edge-l2"/>

            <!-- Node Elements -->
            <circle cx="0" cy="0" r="10" class="iso-node-start"/>
            <text x="-20" y="25" class="iso-bold-text" fill="#67e8f9" filter="url(#iso-glow-cyan)">E_START</text>
            <text x="-20" y="40" class="iso-math-text" fill="#22d3ee">j=1728</text>

            <circle cx="50" cy="-40" r="5" class="iso-node-mid"/>
            <circle cx="80" cy="10" r="4" class="iso-node-mid"/>
            <circle cx="10" cy="-60" r="4" class="iso-node-mid"/>
            <circle cx="110" cy="-70" r="6" class="iso-node-mid"/>
            <circle cx="40" cy="-90" r="3" class="iso-node-mid"/>
            <circle cx="130" cy="-20" r="4" class="iso-node-mid"/>
            <circle cx="70" cy="-110" r="4" class="iso-node-mid"/>
            <circle cx="160" cy="-40" r="5" class="iso-node-mid"/>
            <circle cx="130" cy="-120" r="5" class="iso-node-mid"/>
            <circle cx="180" cy="10" r="3" class="iso-node-mid"/>
            <circle cx="190" cy="-100" r="6" class="iso-node-mid"/>
            <circle cx="210" cy="-70" r="5" class="iso-node-mid"/>
            <circle cx="250" cy="-30" r="4" class="iso-node-mid"/>
            
            <!-- Walking Paths (Animated) -->
            <path d="M 0,0 L 50,-40" class="iso-walk-l2" marker-end="url(#iso-arr-cyan)"/>
            <path d="M 50,-40 L 110,-70" class="iso-walk-l3" style="animation: iso-path-walk 2.5s linear infinite; animation-delay: 1s;" marker-end="url(#iso-arr-purp)"/>
            <path d="M 110,-70 L 160,-40" class="iso-walk-l2" style="animation: iso-path-walk 2s linear infinite; animation-delay: 2s;" marker-end="url(#iso-arr-cyan)"/>
            
            <!-- Dead End / Wrong Path 1 -->
            <path d="M 160,-40 L 210,-70 L 230,-110" class="iso-walk-fail" style="animation-duration: 2s; animation-delay: 3s;" marker-end="url(#iso-arr-red)"/>
            
            <!-- Wrong Path Ending Node -->
            <g transform="translate(230, -110)">
                <circle cx="0" cy="0" r="20" class="iso-search-ring" style="animation-delay: 0s;"/>
                <circle cx="0" cy="0" r="20" class="iso-search-ring" style="animation-delay: 0.5s;"/>
                <circle cx="0" cy="0" r="6" class="iso-node-fail"/>
                <path d="M -8,-8 L 8,8 M -8,8 L 8,-8" stroke="#fecaca" stroke-width="2"/>
                <text x="15" y="-5" class="iso-bold-text" fill="#fca5a5" filter="url(#iso-glow-red)">DEAD_END</text>
            </g>

            <!-- Loop / Cycle Path -->
            <path d="M 110,-70 L 130,-120 L 190,-100 L 250,-130" class="iso-walk-fail" style="animation-duration: 2.5s; animation-delay: 2s;" marker-end="url(#iso-arr-red)"/>
            <g transform="translate(250, -130)">
                <circle cx="0" cy="0" r="20" class="iso-search-ring" style="animation-delay: 0.2s;"/>
                <circle cx="0" cy="0" r="5" class="iso-node-fail"/>
                <text x="10" y="-10" class="iso-bold-text" fill="#fca5a5">CYCLE_DET</text>
            </g>

        </g>
    </g>

    <!-- Info/Failure panels -->
    <g transform="translate(200, 480)">
        <rect x="-160" y="-25" width="320" height="50" rx="4" fill="rgba(88, 28, 135, 0.2)" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text x="-145" y="-5" class="iso-math-text" fill="#d8b4fe">Path length   : O(log p) (Optimal)</text>
        <text x="-145" y="10" class="iso-math-text" fill="#d8b4fe">Graph Degree  : l+1 (p-isogeny)</text>
        <circle cx="130" cy="-5" r="4" fill="#a855f7" class="iso-node-mid"/>
        <text x="145" y="-1" class="iso-math-text" fill="#c084fc">φ_l</text>
    </g>

    <g transform="translate(200, 550)">
        <rect x="-180" y="-18" width="360" height="36" rx="4" fill="#4c0519" stroke="#ef4444" stroke-width="2"/>
        <text x="0" y="5" class="iso-alert-text" fill="#fca5a5" text-anchor="middle" filter="url(#iso-glow-red)">PATH LOST: TARGET CURVE UNREACHABLE</text>
    </g>
</svg>