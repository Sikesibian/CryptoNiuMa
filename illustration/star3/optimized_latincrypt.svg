<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 核心深邃石印背景 -->
        <radialGradient id="lc-bg" cx="50%" cy="50%" r="80%">
            <stop offset="0%" stop-color="#1a2b22"/>
            <stop offset="60%" stop-color="#0d1410"/>
            <stop offset="100%" stop-color="#050806"/>
        </radialGradient>
        
        <!-- 阿兹特克黄金渐变 -->
        <linearGradient id="lc-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffe600"/>
            <stop offset="50%" stop-color="#ffb703"/>
            <stop offset="100%" stop-color="#fb8500"/>
        </linearGradient>

        <!-- 赛博绿松石科技渐变 -->
        <linearGradient id="lc-cyan" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00f5d4"/>
            <stop offset="100%" stop-color="#00bbf9"/>
        </linearGradient>

        <filter id="lc-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="blur1"/>
            <feGaussianBlur stdDeviation="10" result="blur2"/>
            <feMerge>
                <feMergeNode in="blur2"/>
                <feMergeNode in="blur1"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- 阶梯金字塔风/玛雅纹理 pattern -->
        <pattern id="mayan-circuit" width="60" height="60" patternUnits="userSpaceOnUse" opacity="0.02">
            <path d="M0 30 H15 V15 H30 V0 M60 30 H45 V45 H30 V60" fill="none" stroke="#00f5d4" stroke-width="0.1"/>
            <path d="M0 0 H10 V10 H0 Z" fill="#ffb703" opacity="0.3"/>
            <rect x="25" y="25" width="10" height="10" fill="none" stroke="#fb8500" stroke-width="0.05"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#lc-bg)"/>
    <rect width="400" height="600" fill="url(#mayan-circuit)"/>

    <!-- 顶部坐标与协议信息 -->
    <g font-family="'Orbitron', 'Courier New', monospace" font-size="9" fill="#00f5d4" opacity="0.3">
        <text x="20" y="30">QUETZALCOATL_PROTOCOL // 256-BIT</text>
        <text x="380" y="30" text-anchor="end">LOC: 19.68°N, 98.84°W</text>
    </g>

    <!-- 背景能量流束 -->
    <g fill="none" stroke-width="1.5" filter="url(#lc-glow)" opacity="0.1">
        <path d="M 50 100 L 100 150 V 200 L 150 250" stroke="url(#lc-cyan)">
             <animate attributeName="opacity" values="0.02;0.15;0.02" dur="3s" repeatCount="indefinite" />
        </path>
        <path d="M 350 100 L 300 150 V 200 L 250 250" stroke="url(#lc-gold)">
             <animate attributeName="opacity" values="0.15;0.02;0.15" dur="4s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- 核心视觉: 太阳金石+密码锁融合 -->
    <g transform="translate(200, 260)">
        <!-- 外层发光环 -->
        <circle cx="0" cy="0" r="140" fill="none" stroke="#fb8500" stroke-width="1" opacity="0.3" filter="url(#lc-glow)"/>
        
        <!-- 玛雅日历轮盘 1 (正向旋转) -->
        <g opacity="0.8">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="35s" repeatCount="indefinite"/>
            <circle cx="0" cy="0" r="120" fill="none" stroke="url(#lc-gold)" stroke-width="3" stroke-dasharray="15 5 5 5 5 5"/>
            <!-- 边缘阶梯神明刻度 -->
            <path d="M -110 -40 L -120 -40 L -120 -50 L -110 -50 Z M 110 40 L 120 40 L 120 50 L 110 50 Z" fill="url(#lc-gold)" />
            <path d="M -40 110 L -40 120 L -50 120 L -50 110 Z M 40 -110 L 40 -120 L 50 -120 L 50 -110 Z" fill="url(#lc-gold)" />
            <path d="M 0 -130 L 10 -120 L -10 -120 Z M 0 130 L 10 120 L -10 120 Z M -130 0 L -120 10 L -120 -10 Z M 130 0 L 120 10 L 120 -10 Z" fill="#00f5d4"/>
        </g>

        <!-- 玛雅日历轮盘 2 (反向旋转) -->
        <g opacity="0.9">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="25s" repeatCount="indefinite"/>
            <circle cx="0" cy="0" r="95" fill="none" stroke="url(#lc-cyan)" stroke-width="2" stroke-dasharray="40 20"/>
            <!-- 十字阶梯 (查克模像轮廓化) -->
            <path d="M -95 -10 L -80 -10 L -80 -20 L -60 -20 L -60 20 L -80 20 L -80 10 L -95 10 Z" fill="none" stroke="url(#lc-cyan)" stroke-width="1.5"/>
            <path d="M 95 -10 L 80 -10 L 80 -20 L 60 -20 L 60 20 L 80 20 L 80 10 L 95 10 Z" fill="none" stroke="url(#lc-cyan)" stroke-width="1.5" />
            <path d="M -10 -95 L -10 -80 L -20 -80 L -20 -60 L 20 -60 L 20 -80 L 10 -80 L 10 -95 Z" fill="none" stroke="url(#lc-cyan)" stroke-width="1.5"/>
            <path d="M -10 95 L -10 80 L -20 80 L -20 60 L 20 60 L 20 80 L 10 80 L 10 95 Z" fill="none" stroke="url(#lc-cyan)" stroke-width="1.5"/>
        </g>

        <!-- 内侧防护罩锁定环 -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
            <circle cx="0" cy="0" r="70" fill="none" stroke="#ffb703" stroke-width="1" stroke-dasharray="10 30" opacity="0.6"/>
            <circle cx="0" cy="0" r="65" fill="none" stroke="#00f5d4" stroke-width="4" stroke-dasharray="1 10"/>
        </g>

        <!-- 太阳神之眼/核心密码晶体 -->
        <circle cx="0" cy="0" r="45" fill="#1a2b22" stroke="url(#lc-gold)" stroke-width="3" filter="url(#lc-glow)"/>
        
        <!-- 双重六角星芒护盾 -->
        <polygon points="0,-28 24,14 -24,14" fill="none" stroke="url(#lc-cyan)" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="12s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="0,28 24,-14 -24,-14" fill="none" stroke="url(#lc-gold)" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
        </polygon>
        
        <circle cx="0" cy="0" r="10" fill="url(#lc-cyan)" filter="url(#lc-glow)">
            <animate attributeName="r" values="8;13;8" dur="2s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- 高级感框体与主标题 -->
    <g transform="translate(200, 480)">
        <path d="M -120 0 L -100 -22 L 100 -22 L 120 0 L 100 22 L -100 22 Z" fill="rgba(255,183,3,0.1)" stroke="url(#lc-gold)" stroke-width="2" filter="url(#lc-glow)"/>
        <!-- 侧边节点 -->
        <circle cx="-120" cy="0" r="3" fill="#00f5d4"/>
        <circle cx="120" cy="0" r="3" fill="#00f5d4"/>
        
        <text x="0" y="8" text-anchor="middle" fill="#ffffff" font-family="'Orbitron', 'Montserrat', sans-serif" font-size="24" font-weight="900" letter-spacing="6" filter="drop-shadow(0px 0px 8px rgba(255,183,3,0.8))">LATINCRYPT</text>
    </g>

    <!-- 底部副标题区域与古代印记线 -->
    <g transform="translate(200, 535)">
        <text x="0" y="0" text-anchor="middle" fill="url(#lc-cyan)" font-family="'Courier New', monospace" font-size="12" font-weight="600" letter-spacing="3">LATIN AMERICAN CRYPTOGRAPHY</text>
        
        <!-- 古代阶梯纹案底座 -->
        <path d="M -150 35 h 50 v -10 h 20 v 10 h 60 v -10 h 20 v 10 h 50" fill="none" stroke="#fb8500" stroke-width="2" opacity="0.6"/>
        <!-- 中心光点 -->
        <rect x="-6" y="29" width="12" height="12" fill="url(#lc-cyan)" filter="url(#lc-glow)"/>
        
        <!-- 底侧扫光线 -->
        <path d="M -180 50 L 180 50" fill="none" stroke="url(#lc-cyan)" stroke-width="1" opacity="0.3">
             <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2s" repeatCount="indefinite" />
        </path>
    </g>
</svg>