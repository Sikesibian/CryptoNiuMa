<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Very dark cyan/blue to deep space background -->
        <linearGradient id="lin-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020813"/>
            <stop offset="100%" stop-color="#050a1f"/>
        </linearGradient>
        <!-- Intense Signal/Noise Grid Pattern -->
        <pattern id="noise-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="rgba(0, 195, 255, 0.05)" stroke-width="1"/>
            <circle cx="20" cy="20" r="1" fill="rgba(0, 195, 255, 0.2)"/>
        </pattern>
        <!-- Glow effects -->
        <filter id="lin-glow-blue" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="lin-glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- Signal wave gradient -->
        <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00c3ff" stop-opacity="0"/>
            <stop offset="50%" stop-color="#00c3ff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#00c3ff" stop-opacity="0"/>
        </linearGradient>
    </defs>
    
    <rect width="400" height="600" fill="url(#lin-bg)"/>
    
    <!-- Moving Grid Background -->
    <rect width="400" height="600" fill="url(#noise-grid)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -40,-40" dur="4s" repeatCount="indefinite" />
    </rect>

    <!-- Top Section: Visualizing Matsui's Piling-up Theorem / Noise Drowning -->
    <g transform="translate(200, 140)">
        
        <!-- Background decorative rings -->
        <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(0, 195, 255, 0.1)" stroke-width="1" stroke-dasharray="2 6"/>
        <circle cx="0" cy="0" r="60" fill="none" stroke="rgba(0, 195, 255, 0.2)" stroke-width="2" stroke-dasharray="20 10">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite"/>
        </circle>

        <!-- Signal Line (Linear Approximation) trying to hold shape -->
        <g stroke-width="3" stroke-linecap="round" filter="url(#lin-glow-blue)">
            <path d="M -120,0 Q -60,-40 0,0 T 120,0" fill="none" stroke="url(#wave-grad)">
                <animate attributeName="d" 
                         values="M -120,0 Q -60,-40 0,0 T 120,0;
                                 M -120,0 Q -40,30 20,0 T 120,0;
                                 M -120,0 Q -80,-20 -20,0 T 120,0;
                                 M -120,0 Q -60,-40 0,0 T 120,0" 
                         dur="2.5s" repeatCount="indefinite"/>
                <!-- Opacity drops as noise overrides it -->
                <animate attributeName="opacity" values="1;0.2;1" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
            </path>
        </g>

        <!-- Chaotic Noise Particles (Overwhelming the bias) -->
        <g fill="#ff3366" opacity="0.6">
            <!-- Random scattered noise blips -->
            <circle cx="-50" cy="-20" r="2"><animate attributeName="cy" values="-20;25;-20" dur="0.3s" repeatCount="indefinite"/></circle>
            <circle cx="30" cy="15" r="2"><animate attributeName="cy" values="15;-30;15" dur="0.4s" repeatCount="indefinite"/></circle>
            <circle cx="-20" cy="5" r="3"><animate attributeName="cx" values="-20;40;-20" dur="0.25s" repeatCount="indefinite"/></circle>
            <circle cx="70" cy="-10" r="1.5"><animate attributeName="cy" values="-10;30;-10" dur="0.35s" repeatCount="indefinite"/></circle>
            <circle cx="-80" cy="20" r="2"><animate attributeName="cx" values="-80;-10;-80" dur="0.45s" repeatCount="indefinite"/></circle>
            <circle cx="10" cy="-35" r="2"><animate attributeName="r" values="2;5;2" dur="0.2s" repeatCount="indefinite"/></circle>
        </g>
        
        <!-- Center LAT (Linear Approximation Table) Core -->
        <g transform="translate(0, 0)">
            <polygon points="0,-25 25,0 0,25 -25,0" fill="#0f172a" stroke="#00c3ff" stroke-width="2">
                <animate attributeName="stroke" values="#00c3ff;#ff3366;#00c3ff" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
            </polygon>
            <text x="0" y="4" fill="#fff" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">LAT</text>
        </g>

        <!-- Equation overlay dynamically showing bias turning to 0 -->
        <g transform="translate(0, 65)">
            <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="14" fill="#a5b4fc">
                Bias <tspan fill="#00c3ff">ε</tspan> ≈
                <tspan fill="#ff3366" font-weight="bold" filter="url(#lin-glow-red)">
                    <animate attributeName="opacity" values="1;0;1;1" keyTimes="0;0.4;0.5;1" dur="4s" repeatCount="indefinite"/>
                    0.000...
                </tspan>
            </text>
        </g>
    </g>

    <!-- Terminal Emulation (Bottom Half) -->
    <g transform="translate(200, 390)">
        <rect x="-175" y="-120" width="350" height="190" rx="6" fill="#090d14" stroke="#1e293b" stroke-width="2"/>
        
        <!-- Terminal Header -->
        <rect x="-175" y="-120" width="350" height="24" rx="6" fill="#111827"/>
        <rect x="-175" y="-105" width="350" height="9" fill="#111827"/>
        <circle cx="-160" cy="-108" r="4" fill="#ff5f56"/>
        <circle cx="-145" cy="-108" r="4" fill="#ffbd2e"/>
        <circle cx="-130" cy="-108" r="4" fill="#28c840"/>
        <text x="0" y="-105" fill="#64748b" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">matsui_linear.py</text>

        <!-- Script & Math Logs -->
        <g font-family="'Courier New', monospace" font-size="12">
            <!-- Code Block -->
            <text x="-160" y="-70" fill="#c678dd">def <tspan fill="#61afef">evaluate_bias</tspan><tspan fill="#94a3b8">(LAT, X, Y):</tspan></text>
            <text x="-160" y="-50" fill="#94a3b8">    bias = LAT[X][Y] / (2**16)</text>
            <text x="-160" y="-30" fill="#94a3b8">    limit = 1.0 / math.sqrt(DATA_N)</text>
            <text x="-160" y="-10" fill="#c678dd">    if <tspan fill="#56b6c2">abs</tspan><tspan fill="#94a3b8">(bias) &lt; limit:</tspan></text>
            <text x="-160" y="10" fill="#c678dd">        raise <tspan fill="#e5c07b">NoiseFloorError</tspan></text>

            <line x1="-160" y1="25" x2="160" y2="25" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="2 4"/>

            <!-- Flashing Alert Box -->
            <g transform="translate(0, 10)">
                <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.49;0.9;1" dur="4s" repeatCount="indefinite"/>
                
                <text x="-160" y="35" fill="#f43f5e" font-weight="bold">> Exception: Correlation lost.</text>
                <text x="-160" y="52" fill="#fda4af" font-size="11">Data complexity N ∝ |ε|⁻² exceeded limit.</text>
            </g>
        </g>
    </g>

    <!-- Footer Banner / Tag -->
    <g transform="translate(200, 540)">
        <polygon points="-140,-16 140,-16 150,16 -150,16" fill="#1a0510" stroke="#f43f5e" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#f43f5e" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#lin-glow-red)">
            线性逼近失效：被噪声淹没
        </text>
        <!-- Horizontal glitched line under text -->
        <rect x="-145" y="-12" width="290" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="5 20 40 10 10 200">
             <animate attributeName="stroke-dashoffset" from="0" to="-290" dur="2s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>