<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Deep System Core background -->
        <linearGradient id="magma-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050505"/>
            <stop offset="100%" stop-color="#120202"/>
        </linearGradient>
        
        <!-- Glows -->
        <filter id="magma-glow-red" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="magma-glow-green" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Threat Hex Background -->
        <pattern id="hex-grid" width="30" height="30" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
            <path d="M 15 0 L 30 7.5 L 30 22.5 L 15 30 L 0 22.5 L 0 7.5 Z" fill="none" stroke="rgba(239, 68, 68, 0.04)" stroke-width="1"/>
            <circle cx="15" cy="15" r="1.5" fill="rgba(239, 68, 68, 0.1)"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#magma-bg)"/>
    <rect width="400" height="600" fill="url(#hex-grid)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -15,-30; 0,0" dur="10s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

    <!-- Top Part: Distributed Environment (Client vs License Server) -->
    <g transform="translate(200, 130)">
        
        <!-- Background Network Connection -->
        <path d="M -110,0 C -50,0 50,0 110,0" fill="none" stroke="#27272a" stroke-width="3" stroke-dasharray="6 4" stroke-linecap="round"/>
        
        <!-- Component 1: Magma Computation Node (Left) -->
        <g transform="translate(-110, 0)">
            <rect x="-45" y="-35" width="90" height="70" rx="6" fill="#111827" stroke="#374151" stroke-width="2">
                <!-- Frame turns red upon crash -->
                <animate attributeName="stroke" values="#374151;#374151;#ef4444;#ef4444" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
            </rect>

            <!-- Inner Matrix Crunching Animation -->
            <rect x="-25" y="-15" width="50" height="30" fill="none" stroke="#a3e635" stroke-dasharray="4 2" stroke-width="1.5">
                 <animate attributeName="stroke" values="#a3e635;#a3e635;#ef4444;#ef4444" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
                 <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.8s" repeatCount="indefinite" calcMode="linear"/>
            </rect>
            
            <!-- Scanning Line -->
            <line x1="-25" y1="-10" x2="25" y2="-10" stroke="#a3e635" stroke-width="1.5">
                 <animate attributeName="y1" values="-15; 15; -15" dur="1s" repeatCount="indefinite"/>
                 <animate attributeName="y2" values="-15; 15; -15" dur="1s" repeatCount="indefinite"/>
                 <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
            </line>
            
            <text x="0" y="-45" fill="#a1a1aa" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" font-weight="bold">GPU/CPU NODE</text>
            <text x="0" y="52" fill="#84cc16" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">
                F4 Reduction...
                <animate attributeName="fill" values="#84cc16;#84cc16;#ef4444;#ef4444" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
            </text>
        </g>
        
        <!-- Animated Heartbeat Ping (Validates License) -->
        <circle cx="-60" cy="0" r="4.5" fill="#34d399" filter="url(#magma-glow-green)">
            <animate attributeName="cx" values="-60; 60; 60; -60" keyTimes="0; 0.45; 0.46; 1" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.45;0.46;1" dur="4s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Rejected Heartbeat X (At Server Port) -->
        <g transform="translate(60, 0)">
            <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
            <line x1="-10" y1="-10" x2="10" y2="10" stroke="#ef4444" stroke-width="3" filter="url(#magma-glow-red)"/>
            <line x1="10" y1="-10" x2="-10" y2="10" stroke="#ef4444" stroke-width="3" filter="url(#magma-glow-red)"/>
            <!-- Pulsing impact -->
            <circle cx="0" cy="0" r="15" fill="none" stroke="#ef4444" stroke-width="2">
                <animate attributeName="r" values="0; 0; 5; 30" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0; 0; 1; 0" keyTimes="0; 0.49; 0.5; 1" dur="4s" repeatCount="indefinite"/>
            </circle>
        </g>
        
        <!-- Component 2: FLEXlm Server Node (Right) -->
        <g transform="translate(110, 0)">
            <rect x="-40" y="-35" width="80" height="70" rx="6" fill="#111827" stroke="#374151" stroke-width="2"/>
            
            <!-- Safe DB Icon -->
            <path d="M -15, -15 Q 0,-25 15,-15 L 15,10 Q 0,20 -15,10 Z" fill="none" stroke="#60a5fa" stroke-width="2"/>
            
            <text x="0" y="-45" fill="#a1a1aa" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" font-weight="bold">FLEXLM Server</text>
            <text x="0" y="52" fill="#ef4444" font-family="'Courier New', monospace" font-size="13" text-anchor="middle" font-weight="bold" filter="url(#magma-glow-red)">
                <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
                EXPIRED
            </text>
        </g>
    </g>

    <!-- Main Terminal Area -->
    <g transform="translate(200, 360)">
        <rect x="-180" y="-130" width="360" height="230" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="2">
            <!-- Glitch Frame Red Flash -->
            <animate attributeName="stroke" values="#3f3f46;#3f3f46;#ef4444;#ef4444" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="fill" values="#09090b;#09090b;#1f0505;#09090b" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
        </rect>
        
        <!-- Terminal Header -->
        <rect x="-180" y="-130" width="360" height="22" rx="6" fill="#18181b"/>
        <rect x="-180" y="-115" width="360" height="7" fill="#18181b"/>
        <circle cx="-160" cy="-119" r="4" fill="#ff5f56"/>
        <circle cx="-145" cy="-119" r="4" fill="#ffbd2e"/>
        <circle cx="-130" cy="-119" r="4" fill="#27c93f"/>
        <text x="0" y="-115" fill="#71717a" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">magma (v2.28-1) - f4_attack.mg</text>

        <g font-family="'Courier New', monospace" font-size="12" transform="translate(-165, -95)">
            <!-- Initial Algebraic Prep -->
            <text x="0" y="0" fill="#a3e635">&gt; <tspan fill="#d1d5db">F := GF(2^8);</tspan></text>
            <text x="0" y="18" fill="#a3e635">&gt; <tspan fill="#d1d5db">P&lt;x,y,z&gt; := PolynomialRing(F, 3);</tspan></text>
            <text x="0" y="36" fill="#a3e635">&gt; <tspan fill="#d1d5db">I := Ideal([ x^2 + y + z, x*y + z^2 ]);</tspan></text>
            <text x="0" y="54" fill="#a3e635">&gt; <tspan fill="#d1d5db">GroebnerBasis(I);</tspan></text>
            
            <line x1="0" y1="65" x2="330" y2="65" stroke="#27272a" stroke-dasharray="2 4"/>

            <!-- Execution Logs -->
            <text x="0" y="82" fill="#eab308">Computing F4... (matrix: 16384 x 32768)</text>
            <text x="0" y="100" fill="#eab308">Step 1: Symbolic preprocessing...</text>
            <text x="0" y="118" fill="#eab308">Step 2: Matrix reduction...</text>
            
            <!-- Flashing Fatal Crash Override -->
            <g>
                <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.49;0.5;1" dur="4s" repeatCount="indefinite"/>
                
                <rect x="-10" y="130" width="350" height="55" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 2"/>
                
                <text x="2" y="146" fill="#ef4444" font-weight="bold" filter="url(#magma-glow-red)">FLEXlm Error: -15,570. System Error: 10060</text>
                <text x="2" y="160" fill="#fca5a5" font-size="10">Cannot connect to license server system.</text>
                <text x="2" y="176" fill="#ef4444" font-weight="bold" font-size="11">The license has EXPIRED or is INVALID.</text>
            </g>
        </g>
    </g>

    <!-- Footer Banner / Title -->
    <g transform="translate(200, 540)">
        <polygon points="-160,-16 160,-16 170,16 -170,16" fill="#1f070e" stroke="#ef4444" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#ef4444" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#magma-glow-red)">
            代数分析流产：Magma许可证过期
        </text>
        <rect x="-165" y="-12" width="330" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 30 50 15 5 200">
             <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.5s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>