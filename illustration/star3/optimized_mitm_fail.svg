<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="mitm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050b14"/>
            <stop offset="100%" stop-color="#0a192f"/>
        </linearGradient>
        <!-- Data Grid Pattern -->
        <pattern id="mitm-grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(77, 248, 255, 0.05)" stroke-width="1"/>
        </pattern>
        <!-- Cyber Glow Filters -->
        <filter id="mitm-glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="mitm-glow-red" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <!-- Stream Gradients -->
        <linearGradient id="stream-left" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(77, 248, 255, 0)"/>
            <stop offset="100%" stop-color="#4df8ff"/>
        </linearGradient>
        <linearGradient id="stream-right" x1="100%" y1="0%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="rgba(184, 41, 234, 0)"/>
            <stop offset="100%" stop-color="#b829ea"/>
        </linearGradient>
    </defs>

    <rect width="400" height="600" fill="url(#mitm-bg)"/>
    <!-- Animated background grid -->
    <rect width="400" height="600" fill="url(#mitm-grid)">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- DIAGRAM SECTION: The Meet-in-the-Middle Attack -->
    <g transform="translate(0, 40)">
        <!-- Left Side: Forward Encryption P -> E(k1, P) -->
        <g transform="translate(60, 100)">
            <circle cx="0" cy="0" r="25" fill="#0f172a" stroke="#4df8ff" stroke-width="2" filter="url(#mitm-glow-cyan)"/>
            <text x="0" y="5" fill="#4df8ff" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">P</text>
            <text x="0" y="45" fill="#4df8ff" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.8">E(K₁, P)</text>
            <!-- Radar scan pulse -->
            <circle cx="0" cy="0" r="25" fill="none" stroke="#4df8ff" stroke-width="1">
                <animate attributeName="r" values="25;45" dur="1.5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
            </circle>
        </g>

        <!-- Right Side: Backward Decryption C -> D(k2, C) -->
        <g transform="translate(340, 100)">
            <circle cx="0" cy="0" r="25" fill="#0f172a" stroke="#b829ea" stroke-width="2" filter="url(#mitm-glow-cyan)"/>
            <text x="0" y="5" fill="#b829ea" font-family="monospace" font-size="16" font-weight="bold" text-anchor="middle">C</text>
            <text x="0" y="45" fill="#b829ea" font-family="monospace" font-size="10" text-anchor="middle" opacity="0.8">D(K₂, C)</text>
            <!-- Radar scan pulse -->
            <circle cx="0" cy="0" r="25" fill="none" stroke="#b829ea" stroke-width="1">
                <animate attributeName="r" values="25;45" dur="1.5s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
            </circle>
        </g>

        <!-- Data Streams flowing exactly to Center memory -->
        <path d="M 85,100 L 160,100" fill="none" stroke="url(#stream-left)" stroke-width="4" stroke-dasharray="10,6">
            <animate attributeName="stroke-dashoffset" from="32" to="0" dur="0.8s" repeatCount="indefinite" calcMode="linear"/>
        </path>
        <path d="M 315,100 L 240,100" fill="none" stroke="url(#stream-right)" stroke-width="4" stroke-dasharray="10,6">
            <animate attributeName="stroke-dashoffset" from="0" to="32" dur="0.8s" repeatCount="indefinite" calcMode="linear"/>
        </path>

        <!-- Center Node: RAM / Hash Table Overload & Explosion -->
        <g transform="translate(200, 100)">
            <!-- Rotating Warning Rings -->
            <circle cx="0" cy="0" r="60" fill="none" stroke="#ff2a2a" stroke-width="1" stroke-dasharray="4 8" opacity="0.6">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
            </circle>
            <circle cx="0" cy="0" r="50" fill="rgba(255, 42, 42, 0.1)" stroke="#ff2a2a" stroke-width="2" filter="url(#mitm-glow-red)">
                <animate attributeName="opacity" values="0.5;1;0.5" dur="0.4s" repeatCount="indefinite"/>
                <animate attributeName="r" values="46;52;46" dur="0.4s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Stack of Memory Banks filling up and corrupting -->
            <g transform="translate(-25, -20)">
                <rect x="0" y="0" width="50" height="8" fill="#ff2a2a" rx="2"/>
                <rect x="0" y="12" width="50" height="8" fill="#ff2a2a" rx="2"/>
                <rect x="0" y="24" width="50" height="8" fill="#ff2a2a" rx="2"/>
                <rect x="0" y="36" width="50" height="8" fill="#ff2a2a" rx="2"/>
                <!-- Corrupted bounding box animated selection -->
                <rect x="-6" y="-6" width="62" height="56" fill="none" stroke="#ffb800" stroke-width="1.5" stroke-dasharray="4 2">
                    <animate attributeName="stroke-dashoffset" from="12" to="0" dur="0.4s" repeatCount="indefinite"/>
                </rect>
            </g>

            <text x="0" y="65" fill="#ff2a2a" font-family="'Courier New', monospace" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#mitm-glow-red)">
                <animate attributeName="opacity" values="1;0.1;1" dur="0.25s" repeatCount="indefinite"/>
                 RAM OVERFLOW 
            </text>
            <text x="0" y="80" fill="#ffb800" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">STATE: 2²⁵⁶ Req.</text>
        </g>
    </g>

    <!-- Terminal Output Simulator (Bottom Half) -->
    <g transform="translate(200, 390)">
        <rect x="-175" y="-130" width="350" height="200" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
        <!-- macOS style Terminal Header -->
        <rect x="-175" y="-130" width="350" height="24" rx="6" fill="#161b22"/>
        <rect x="-175" y="-115" width="350" height="9" fill="#161b22"/>
        <circle cx="-160" cy="-118" r="4" fill="#ff5f56"/>
        <circle cx="-145" cy="-118" r="4" fill="#ffbd2e"/>
        <circle cx="-130" cy="-118" r="4" fill="#28c840"/>
        <text x="0" y="-115" fill="#8b949e" font-family="'Courier New', monospace" font-size="11" text-anchor="middle">mitm_attack_sim.py</text>

        <!-- Visual HUD Hologram scanline looping down the console -->
        <rect x="-173" y="-105" width="346" height="2" fill="#4df8ff" opacity="0.3">
            <animateTransform attributeName="transform" type="translate" values="0,0; 0,170; 0,0" dur="2.5s" repeatCount="indefinite"/>
        </rect>

        <!-- Python Scripts & Stack Trace -->
        <g font-family="'Courier New', monospace" font-size="12">
            <text x="-160" y="-80" fill="#ff7b72">from <tspan fill="#c9d1d9">crypto </tspan><tspan fill="#ff7b72">import </tspan><tspan fill="#d2a8ff">encrypt, decrypt</tspan></text>
            <text x="-160" y="-60" fill="#c9d1d9">hash_table = {} <tspan fill="#8b949e"># Middle state save</tspan></text>
            <text x="-160" y="-40" fill="#ff7b72">for <tspan fill="#c9d1d9">k1 </tspan><tspan fill="#ff7b72">in </tspan><tspan fill="#79c0ff">range</tspan><tspan fill="#c9d1d9">(2**256):</tspan></text>
            <text x="-160" y="-20" fill="#c9d1d9">    hash_table[<tspan fill="#d2a8ff">encrypt</tspan>(k1, P)] = k1</text>
            
            <line x1="-160" y1="-5" x2="160" y2="-5" stroke="#30363d" stroke-width="1" stroke-dasharray="2 2"/>

            <!-- Error Out block with intense flashing alert -->
            <g transform="translate(0, 5)">
                <text x="-160" y="15" fill="#ff7b72" font-weight="bold">>>> ALLOCATING 4.29e+67 BYTES...</text>
                <text x="-160" y="35" fill="#ff2a2a" font-weight="bold" filter="url(#mitm-glow-red)">
                    <animate attributeName="opacity" values="1;0;1" dur="0.15s" repeatCount="indefinite"/>
                    [FATAL] MemoryError: std::bad_alloc
                </text>
                <text x="-160" y="55" fill="#ffb800" font-size="11">Core Dumped. Operation Process Killed.</text>
            </g>
        </g>
    </g>

    <!-- Base Banner Warning Title -->
    <g transform="translate(200, 540)">
        <polygon points="-120,-16 120,-16 130,16 -130,16" fill="#2a0000" stroke="#ff2a2a" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#ff2a2a" font-family="'Microsoft YaHei', sans-serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#mitm-glow-red)">
            相遇攻击：状态空间爆炸
        </text>
        <!-- Frame laser traveling around the banner -->
        <rect x="-125" y="-12" width="250" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 240">
             <animate attributeName="stroke-dashoffset" from="250" to="0" dur="2s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>