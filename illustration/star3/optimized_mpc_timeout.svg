<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="smpc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#050a1f"/>
            <stop offset="100%" stop-color="#14081c"/>
        </linearGradient>
        <filter id="glow-orange">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <linearGradient id="link-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff3366"/>
            <stop offset="50%" stop-color="#ff9933"/>
            <stop offset="100%" stop-color="#ff3366"/>
        </linearGradient>
        <pattern id="lines" width="4" height="4" patternUnits="userSpaceOnUse">
            <path d="M 0 4 L 4 0" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        </pattern>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#smpc-bg)"/>
    <rect width="100%" height="100%" fill="url(#lines)"/>

    <!-- Network Toplogy -->
    <g transform="translate(200, 240)">
        <!-- Connections (Broken/Timeouts) -->
        <g stroke="url(#link-grad)" stroke-width="3" stroke-dasharray="5,10" opacity="0.6">
            <line x1="-100" y1="-80" x2="100" y2="-80"/>
            <line x1="-100" y1="-80" x2="-100" y2="80"/>
            <line x1="100" y1="-80" x2="100" y2="80"/>
            <line x1="-100" y1="80" x2="100" y2="80"/>
            <line x1="-100" y1="-80" x2="100" y2="80"/>
            <line x1="100" y1="-80" x2="-100" y2="80"/>
            <animate attributeName="stroke-dashoffset" from="15" to="0" dur="0.5s" repeatCount="indefinite"/>
        </g>
        
        <!-- Node P1 -->
        <g transform="translate(-100, -80)">
            <circle cx="0" cy="0" r="30" fill="#1e1b4b" stroke="#818cf8" stroke-width="3"/>
            <text x="0" y="5" text-anchor="middle" fill="#818cf8" font-family="'Orbitron', sans-serif" font-weight="bold">P1</text>
            <circle cx="0" cy="0" r="38" fill="none" stroke="#ff3366" stroke-width="2" stroke-dasharray="60, 20" filter="url(#glow-orange)">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
            </circle>
        </g>
        
        <!-- Node P2 -->
        <g transform="translate(100, -80)">
            <circle cx="0" cy="0" r="30" fill="#1e1b4b" stroke="#818cf8" stroke-width="3"/>
            <text x="0" y="5" text-anchor="middle" fill="#818cf8" font-family="'Orbitron', sans-serif" font-weight="bold">P2</text>
            <circle cx="0" cy="0" r="38" fill="none" stroke="#ff9933" stroke-width="2" stroke-dasharray="40, 40">
                <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="3s" repeatCount="indefinite"/>
            </circle>
        </g>
        
        <!-- Node P3 (Crashed/OOM) -->
        <g transform="translate(-100, 80)">
            <circle cx="0" cy="0" r="30" fill="#4c0519" stroke="#ff3366" stroke-width="3" filter="url(#glow-orange)"/>
            <path d="M -15 -15 L 15 15 M 15 -15 L -15 15" stroke="#ff3366" stroke-width="4"/>
            <text x="0" y="45" text-anchor="middle" fill="#ff3366" font-family="monospace" font-size="10" font-weight="bold">OOM ERROR</text>
        </g>
        
        <!-- Node P4 -->
        <g transform="translate(100, 80)">
            <circle cx="0" cy="0" r="30" fill="#1e1b4b" stroke="#818cf8" stroke-width="3"/>
            <text x="0" y="5" text-anchor="middle" fill="#818cf8" font-family="'Orbitron', sans-serif" font-weight="bold">P4</text>
            <text x="0" y="50" text-anchor="middle" fill="#a1a1aa" font-family="monospace" font-size="10">Waiting...</text>
        </g>

        <!-- Center Loading / Stalled -->
        <g transform="translate(0, 0)">
            <circle cx="0" cy="0" r="15" fill="none" stroke="#ff9933" stroke-width="4" stroke-linecap="round" stroke-dasharray="20 40">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite"/>
            </circle>
        </g>
    </g>

    <!-- Console Log Display -->
    <g transform="translate(20, 400)">
        <polygon points="0,10 10,0 360,0 360,80 350,90 0,90" fill="#0f172a" stroke="#334155" stroke-width="2"/>
        <text x="15" y="25" fill="#facc15" font-family="monospace" font-size="11">[WARN] Comm latency spike detected (45000ms)</text>
        <text x="15" y="45" fill="#facc15" font-family="monospace" font-size="11">[WARN] P3 unresponsive for 120s...</text>
        <text x="15" y="65" fill="#ff3366" font-family="monospace" font-size="12" font-weight="bold" filter="url(#glow-orange)">FATAL: Network Timeout. Protocol aborted.</text>
    </g>
    
    <g transform="translate(20, 520)">
        <rect width="360" height="60" fill="#1a0b1c" stroke="#ff3366" stroke-width="2"/>
        <line x1="0" y1="0" x2="20" y2="20" stroke="#ff3366" stroke-width="2"/>
        <line x1="360" y1="60" x2="340" y2="40" stroke="#ff3366" stroke-width="2"/>
        <text x="180" y="25" text-anchor="middle" fill="#ff3366" font-family="'Orbitron', sans-serif" font-size="18" font-weight="bold" letter-spacing="1">SMPC PROTOCOL STALLED</text>
        <text x="180" y="45" text-anchor="middle" fill="#ff9933" font-family="monospace" font-size="11">BOTTLENECK: COMMUNICATION &amp; MEMORY</text>
    </g>
</svg>