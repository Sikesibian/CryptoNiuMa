<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="oram-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="100%" stop-color="#1e1b4b"/>
        </linearGradient>

        <filter id="oram-glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="oram-glow-magenta" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="oram-glow-red" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Cyberpunk Grid -->
        <pattern id="oram-grid" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(15)">
            <rect width="40" height="40" fill="none" stroke="rgba(139, 92, 246, 0.05)" stroke-width="1"/>
            <circle cx="0" cy="0" r="1.5" fill="rgba(139, 92, 246, 0.2)"/>
        </pattern>
        
        <!-- ORAM Bucket Node -->
        <g id="oram-bucket">
            <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#0f172a" stroke="#8b5cf6" stroke-width="1.5"/>
            <line x1="-12" y1="-2" x2="12" y2="-2" stroke="#8b5cf6" stroke-width="0.5"/>
            <line x1="-12" y1="2" x2="12" y2="2" stroke="#8b5cf6" stroke-width="0.5"/>
        </g>
        
        <!-- Dummy Data Block -->
        <g id="dummy-data">
            <rect x="-4" y="-4" width="8" height="8" rx="1" fill="#ec4899" opacity="0.8"/>
        </g>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#oram-bg)"/>
    <rect width="100%" height="100%" fill="url(#oram-grid)">
        <animateTransform attributeName="transform" type="translate" values="0,-40; 0,0" dur="4s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

    <!-- Top Section: Cloud Server / Path ORAM Tree -->
    <g transform="translate(200, 60)">
        <text x="0" y="-20" fill="#a78bfa" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" letter-spacing="1">CLOUD SERVER (PATH ORAM TREE)</text>
        <path d="M -100 -30 L 100 -30 L 110 -10 L -110 -10 Z" fill="#8b5cf6" opacity="0.05"/>
        <path d="M -110 -10 L 110 -10" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 2"/>

        <!-- Inactive Tree Lines -->
        <g stroke="#334155" stroke-width="1.5" fill="none">
            <path d="M 0,10 L -60,50 L -90,90"/> <path d="M -60,50 L -30,90"/>
            <path d="M 0,10 L 60,50 L 30,90"/>  <path d="M 60,50 L 90,90"/>
            <path d="M -90,90 L -105,130"/> <path d="M -90,90 L -75,130"/>
            <path d="M -30,90 L -45,130"/> <path d="M -30,90 L -15,130"/>
            <path d="M 30,90 L 15,130"/>   <path d="M 30,90 L 45,130"/>
            <path d="M 90,90 L 75,130"/>   <path d="M 90,90 L 105,130"/>
        </g>

        <!-- Active Searched Path (Root to Leaf) -->
        <path d="M 0,10 L -60,50 L -30,90 L -15,130" stroke="#2dd4bf" stroke-width="3" fill="none" filter="url(#oram-glow-cyan)">
             <animate attributeName="stroke-dasharray" values="0 300; 300 0" dur="1.5s" repeatCount="indefinite"/>
             <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
        </path>

        <!-- Tree Nodes (Buckets) -->
        <use href="#oram-bucket" x="0" y="10" filter="url(#oram-glow-cyan)"/>
        <!-- Level 1 -->
        <use href="#oram-bucket" x="-60" y="50" filter="url(#oram-glow-cyan)"/>
        <use href="#oram-bucket" x="60" y="50"/>
        <!-- Level 2 -->
        <use href="#oram-bucket" x="-90" y="90"/>
        <use href="#oram-bucket" x="-30" y="90" filter="url(#oram-glow-cyan)"/>
        <use href="#oram-bucket" x="30" y="90"/>
        <use href="#oram-bucket" x="90" y="90"/>
        <!-- Level 3 -->
        <g opacity="0.6">
            <use href="#oram-bucket" x="-105" y="130"/> <use href="#oram-bucket" x="-75" y="130"/>
            <use href="#oram-bucket" x="-45" y="130"/>  <use href="#oram-bucket" x="-15" y="130" filter="url(#oram-glow-cyan)" opacity="1"/>
            <use href="#oram-bucket" x="15" y="130"/>   <use href="#oram-bucket" x="45" y="130"/>
            <use href="#oram-bucket" x="75" y="130"/>   <use href="#oram-bucket" x="105" y="130"/>
        </g>
    </g>

    <!-- The Bandwidth Torrent / Pipe -->
    <g transform="translate(200, 220)">
        <!-- Pipe borders -->
        <path d="M -80,0 L -30,120 M 80,0 L 30,120" stroke="#ec4899" stroke-width="2" stroke-dasharray="6 4" filter="url(#oram-glow-magenta)">
             <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.5s" repeatCount="indefinite" calcMode="linear"/>
        </path>
        <path d="M -30,120 L -30,165 M 30,120 L 30,165" stroke="#f43f5e" stroke-width="3" filter="url(#oram-glow-red)">
             <animate attributeName="stroke" values="#f43f5e;#9f1239;#f43f5e" dur="1s" repeatCount="indefinite"/>
        </path>
        
        <!-- Network Chokepoint Warning -->
        <text x="0" y="115" fill="#f43f5e" text-anchor="middle" font-family="'Orbitron', monospace" font-size="10" font-weight="bold" filter="url(#oram-glow-red)">
            <animate attributeName="opacity" values="1;0;1" dur="0.5s" repeatCount="indefinite"/>
            NETWORK CHOKEPOINT
        </text>

        <!-- Falling Data Flood (Dummy vs Real) -->
        <g>
            <clipPath id="pipe-clip">
                <polygon points="-80,0 80,0 30,165 -30,165"/>
            </clipPath>
            <g clip-path="url(#pipe-clip)">
                <!-- Mass Dummy Blocks Torrent -->
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,-180; 0,180" dur="1s" repeatCount="indefinite" calcMode="linear"/>
                    <use href="#dummy-data" x="-50" y="20"/> <use href="#dummy-data" x="-20" y="40"/>
                    <use href="#dummy-data" x="30" y="10"/>  <use href="#dummy-data" x="60" y="60"/>
                    <use href="#dummy-data" x="-10" y="80"/> <use href="#dummy-data" x="40" y="90"/>
                    <!-- The ONE real block -->
                    <rect x="0" y="110" width="12" height="12" rx="2" fill="#2dd4bf" filter="url(#oram-glow-cyan)"/>
                    <use href="#dummy-data" x="-60" y="120"/><use href="#dummy-data" x="20" y="130"/>
                    <use href="#dummy-data" x="-40" y="150"/><use href="#dummy-data" x="50" y="160"/>
                    <use href="#dummy-data" x="-30" y="170"/><use href="#dummy-data" x="10" y="175"/>
                </g>
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,-90; 0,270" dur="1.2s" repeatCount="indefinite" calcMode="linear"/>
                    <use href="#dummy-data" x="-40" y="10"/> <use href="#dummy-data" x="10" y="30"/>
                    <use href="#dummy-data" x="-70" y="50"/> <use href="#dummy-data" x="50" y="20"/>
                    <use href="#dummy-data" x="30" y="70"/> <use href="#dummy-data" x="-20" y="90"/>
                    <use href="#dummy-data" x="-50" y="110"/><use href="#dummy-data" x="70" y="130"/>
                </g>
            </g>
        </g>
    </g>

    <!-- Bottom Section: Client Dashboard & Metrics -->
    <g transform="translate(200, 420)">
        <rect x="-160" y="-30" width="320" height="90" rx="6" fill="#09090b" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="-150" y="-12" fill="#60a5fa" font-family="'Courier New', monospace" font-size="11" font-weight="bold">CLIENT STASH & METRICS</text>
        <line x1="-150" y1="-5" x2="150" y2="-5" stroke="#1e293b"/>

        <!-- Target Data Bar -->
        <text x="-150" y="15" fill="#a1a1aa" font-family="'Courier New', monospace" font-size="9">Target Read (1 Block)</text>
        <rect x="-10" y="8" width="5" height="8" rx="1" fill="#2dd4bf" filter="url(#oram-glow-cyan)"/>
        
        <!-- Bandwidth Overhead Bar -->
        <text x="-150" y="35" fill="#a1a1aa" font-family="'Courier New', monospace" font-size="9">Bandwidth (Path x Z)</text>
        <rect x="-10" y="28" width="140" height="8" rx="1" fill="#ec4899">
             <animate attributeName="width" values="0;140;140" dur="2s" repeatCount="indefinite"/>
        </rect>
        <path d="M 130,28 L 138,28 L 138,36 L 130,36 Z" fill="#f43f5e" filter="url(#oram-glow-red)">
             <animate attributeName="opacity" values="0;1;0" dur="0.5s" repeatCount="indefinite"/>
        </path>

        <text x="-150" y="55" fill="#f43f5e" font-family="'Courier New', monospace" font-size="10" font-weight="bold" filter="url(#oram-glow-red)">
            OVERHEAD: O(log³ N)
            <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
        </text>
        <text x="50" y="55" fill="#cbd5e1" font-family="'Courier New', monospace" font-size="9">1MB -> 150MB!</text>
    </g>

    <!-- Footer Banner -->
    <g transform="translate(200, 540)">
        <polygon points="-160,-16 160,-16 170,16 -170,16" fill="#1f070e" stroke="#ec4899" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#fbcfe8" font-family="'Times New Roman', serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#oram-glow-magenta)">
            Oblivious RAM：传输带宽爆炸
        </text>
        <rect x="-165" y="-12" width="330" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 30 50 15 5 200">
             <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2.5s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>