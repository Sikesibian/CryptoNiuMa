<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Intense Warning Gradient -->
        <radialGradient id="page-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#0f172a">
                <animate attributeName="stop-color" values="#0f172a; #450a0a; #0f172a" dur="2s" repeatCount="indefinite"/>
            </stop>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        
        <!-- Danger Glow for Overflow -->
        <filter id="glow-danger">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        
        <filter id="glitch-page">
            <feTurbulence type="fractalNoise" baseFrequency="0.1" numOctaves="2" result="noise">
                <animate attributeName="baseFrequency" values="0.01; 0.9; 0.01" dur="0.2s" repeatCount="indefinite"/>
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
        </filter>

        <pattern id="grid-page" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5"/>
        </pattern>
        
        <!-- Clipping mask for the allowed zone -->
        <clipPath id="allowed-zone">
            <rect x="-100" y="-120" width="200" height="240"/>
        </clipPath>
    </defs>
    
    <rect width="400" height="600" fill="url(#page-bg)"/>
    <rect width="400" height="600" fill="url(#grid-page)"/>
    
    <g transform="translate(200, 240)">
        
        <!-- The Legal Boundary (12 Pages Max) -->
        <g>
            <rect x="-100" y="-120" width="200" height="240" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="8 4" opacity="0.5">
                <animate attributeName="stroke" values="#22c55e; #ef4444; #22c55e" dur="2s" repeatCount="indefinite"/>
            </rect>
            <!-- Boundary Labels -->
            <text x="-95" y="-105" fill="#22c55e" font-family="'Courier New', monospace" font-size="10" font-weight="bold">
                <animate attributeName="fill" values="#22c55e; #ef4444; #22c55e" dur="2s" repeatCount="indefinite"/>
                MAX_BOUNDARY: 12_PAGES
            </text>
            <text x="-95" y="115" fill="#22c55e" font-family="'Courier New', monospace" font-size="10" font-weight="bold">
                <animate attributeName="fill" values="#22c55e; #ef4444; #22c55e" dur="2s" repeatCount="indefinite"/>
                END_OF_VALID_SPACE
            </text>
        </g>

        <!-- Document Stack that is growing too large -->
        <g>
            <animateTransform attributeName="transform" type="translate" values="0 0; 0 -40; 0 0" dur="4s" repeatCount="indefinite"/>
            
            <!-- Legal Pages (Base) -->
            <rect x="-80" y="-40" width="160" height="220" fill="#1e293b" stroke="#334155" stroke-width="2"/>
            <rect x="-75" y="-30" width="160" height="220" fill="#292524" stroke="#475569" stroke-width="2"/>
            
            <!-- The final legal page (Page 12) -->
            <rect x="-70" y="-20" width="160" height="220" fill="#0f172a" stroke="#22c55e" stroke-width="2"/>
            <text x="-60" y="0" fill="#22c55e" font-family="'Courier New', monospace" font-size="14" font-weight="bold">PAGE 12 / 12</text>
            <text x="-60" y="20" fill="#94a3b8" font-family="'Courier New', monospace" font-size="10">Conclusion...</text>

            <!-- ILLEGAL OVERFLOW PAGES -->
            <!-- These drop down below the boundary and flash red -->
            <g>
                <animateTransform attributeName="transform" type="translate" values="0 0; 0 30; 0 30" keyTimes="0; 0.2; 1" dur="4s" repeatCount="indefinite"/>
                
                <!-- Page 13 (Appendix) -->
                <rect x="-65" y="50" width="160" height="220" fill="#450a0a" stroke="#ef4444" stroke-width="3" filter="url(#glow-danger)">
                    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.2; 1" dur="4s" repeatCount="indefinite"/>
                </rect>
                
                <g filter="url(#glitch-page)">
                    <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.2; 1" dur="4s" repeatCount="indefinite"/>
                    <text x="-50" y="80" fill="#fca5a5" font-family="'Courier New', monospace" font-size="18" font-weight="900">PAGE 13</text>
                    <text x="-50" y="100" fill="#ef4444" font-family="'Courier New', monospace" font-size="12" font-weight="bold">APPENDIX A: PROOFS</text>
                    <line x1="-50" y1="120" x2="80" y2="120" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4"/>
                    <line x1="-50" y1="140" x2="60" y2="140" stroke="#fca5a5" stroke-width="2" stroke-dasharray="4"/>
                </g>

                <!-- Page 14 (Extra references) -->
                <rect x="-60" y="110" width="160" height="220" fill="#7f1d1d" stroke="#ff0000" stroke-width="4" filter="url(#glow-danger)">
                    <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.4; 0.5; 1" dur="4s" repeatCount="indefinite"/>
                </rect>
                
                <g filter="url(#glitch-page)">
                    <animate attributeName="opacity" values="0; 0; 1; 1" keyTimes="0; 0.4; 0.5; 1" dur="4s" repeatCount="indefinite"/>
                    <text x="-40" y="140" fill="#ffffff" font-family="'Courier New', monospace" font-size="20" font-weight="900">PAGE 14</text>
                    <text x="-40" y="160" fill="#ff0000" font-family="'Courier New', monospace" font-size="14" font-weight="bold">APPENDIX B: MORE</text>
                </g>
            </g>
        </g>
        
        <!-- Massive Red Cross at the bottom indicating restriction block -->
        <g transform="translate(0, 120)">
            <line x1="-120" y1="0" x2="120" y2="0" stroke="#ff0000" stroke-width="4" filter="url(#glow-danger)">
                 <animate attributeName="opacity" values="0.5; 1; 0.5" dur="1s" repeatCount="indefinite"/>
            </line>
            <polygon points="-120,-10 -100,0 -120,10" fill="#ff0000"/>
            <polygon points="120,-10 100,0 120,10" fill="#ff0000"/>
            
            <rect x="-80" y="-15" width="160" height="30" fill="#000" stroke="#ff0000" stroke-width="2"/>
            <text x="0" y="5" fill="#ff0000" font-family="'Impact', sans-serif" font-size="18" text-anchor="middle" letter-spacing="2">FATAL: OVERFLOW</text>
        </g>

        <!-- Danger Exceed Text appearing on the right -->
        <g transform="translate(130, 20)">
            <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.3; 1" dur="4s" repeatCount="indefinite"/>
            <path d="M -15 30 L 10 30 L 10 100 L -15 100" fill="none" stroke="#ff0000" stroke-width="3" filter="url(#glow-danger)"/>
            <text x="20" y="60" fill="#ff0000" font-family="'Impact', sans-serif" font-size="28" font-weight="bold" filter="url(#glow-danger)">+2</text>
            <text x="20" y="80" fill="#fca5a5" font-family="'Courier New', monospace" font-size="12" font-weight="bold">EXTRA</text>
            <text x="20" y="95" fill="#fca5a5" font-family="'Courier New', monospace" font-size="12" font-weight="bold">PAGES</text>
        </g>
    </g>

    <g transform="translate(200, 540)">
        <rect x="-120" y="-20" width="240" height="40" rx="5" fill="#2a0a0a" stroke="#ff0000" stroke-width="2">
            <animate attributeName="stroke" values="#ff0000; #7f1d1d; #ff0000" dur="1s" repeatCount="indefinite"/>
        </rect>
        <text x="0" y="5" text-anchor="middle" fill="#fca5a5" font-family="'Times New Roman', serif" font-size="16" font-weight="bold">因为页数超标被拒之门外</text>
        <text x="0" y="-25" text-anchor="middle" fill="#ef4444" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" letter-spacing="1">ERROR: PAGE_LIMIT_EXCEEDED</text>
    </g>
</svg>