<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="pair-bg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#1a1122"/>
            <stop offset="100%" stop-color="#0a0510"/>
        </radialGradient>
        <linearGradient id="pair-core" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ff007f"/>
            <stop offset="100%" stop-color="#7f00ff"/>
        </linearGradient>
        <filter id="pair-glow">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="grid-dots" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="1" fill="#7f00ff" opacity="0.2"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#pair-bg)"/>
    <rect width="400" height="600" fill="url(#grid-dots)"/>

    <g opacity="0.4" fill="none" stroke="url(#pair-core)" stroke-width="1.5">
        <path d="M0,200 Q200,300 400,200"/>
        <path d="M0,400 Q200,300 400,400"/>
    </g>

    <g stroke="#ff007f" stroke-width="2" fill="none" opacity="0.7">
        <path d="M80 450 Q200 150 320 450">
            <animate attributeName="d" values="M80 450 Q200 150 320 450; M80 450 Q200 500 320 450; M80 450 Q200 150 320 450" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </path>
        <path d="M80 150 Q200 450 320 150">
            <animate attributeName="d" values="M80 150 Q200 450 320 150; M80 150 Q200 100 320 150; M80 150 Q200 450 320 150" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
        </path>
    </g>

    <g fill="#ff007f" filter="url(#pair-glow)">
        <polygon points="200,280 220,300 200,320 180,300">
            <animateTransform attributeName="transform" type="scale" values="1;1.2;1" dur="2s" repeatCount="indefinite" additive="sum"/>
        </polygon>
        
        <circle cx="140" cy="220" r="5"/>
        <circle cx="260" cy="220" r="5"/>
        <circle cx="140" cy="380" r="5"/>
        <circle cx="260" cy="380" r="5"/>
    </g>

    <g stroke="#7f00ff" stroke-width="2" stroke-dasharray="6,6" opacity="0.8">
        <line x1="140" y1="220" x2="200" y2="300">
            <animate attributeName="stroke-dashoffset" values="12;0" dur="0.8s" repeatCount="indefinite"/>
        </line>
        <line x1="260" y1="220" x2="200" y2="300">
            <animate attributeName="stroke-dashoffset" values="12;0" dur="0.8s" repeatCount="indefinite"/>
        </line>
        <line x1="140" y1="380" x2="200" y2="300">
            <animate attributeName="stroke-dashoffset" values="12;0" dur="0.8s" repeatCount="indefinite"/>
        </line>
        <line x1="260" y1="380" x2="200" y2="300">
            <animate attributeName="stroke-dashoffset" values="12;0" dur="0.8s" repeatCount="indefinite"/>
        </line>
    </g>

    <g transform="translate(200, 100)">
        <rect x="-80" y="-30" width="160" height="60" rx="8" fill="rgba(26,17,34,0.8)" stroke="#ff007f" stroke-width="2"/>
        <text x="0" y="5" text-anchor="middle" fill="#ff007f" font-family="'Space Mono', monospace" font-size="28" font-weight="bold" filter="url(#pair-glow)">e(G₁,G₂)</text>
    </g>

    <text x="200" y="530" text-anchor="middle" fill="#ff007f" font-family="'Orbitron', sans-serif" font-size="24" font-weight="800" letter-spacing="3">PAIRING</text>
    <text x="200" y="555" text-anchor="middle" fill="#7f00ff" font-family="sans-serif" font-size="12" letter-spacing="2">BILINEAR CRYPTOGRAPHY</text>
    
    <circle cx="100" cy="500" r="2" fill="#ff007f">
        <animate attributeName="cy" values="500;450" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="500" r="2" fill="#7f00ff">
        <animate attributeName="cy" values="500;450" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
    </circle>
</svg>