<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="prov-bg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#0a0a20"/>
            <stop offset="100%" stop-color="#02020a"/>
        </radialGradient>
        <linearGradient id="prov-holo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="100%" stop-color="#cc00ff"/>
        </linearGradient>
        <filter id="holo-glow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="hex-net" width="30" height="51.96" patternUnits="userSpaceOnUse" patternTransform="scale(0.5)">
            <path d="M15 0 L30 8.66 L30 25.98 L15 34.64 L0 25.98 L0 8.66 Z" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.15"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#prov-bg)"/>
    <rect width="400" height="600" fill="url(#hex-net)"/>

    <g opacity="0.3" stroke="#cc00ff" stroke-width="1">
        <line x1="0" y1="100" x2="400" y2="100"/>
        <line x1="0" y1="500" x2="400" y2="500"/>
        <circle cx="200" cy="300" r="180" fill="none" stroke-dasharray="4 12"/>
    </g>

    <g transform="translate(200, 280)">
        <polygon points="-120,-80 120,-80 140,-40 140,80 120,120 -120,120 -140,80 -140,-40" fill="rgba(0, 229, 255, 0.05)" stroke="url(#prov-holo)" stroke-width="2" filter="url(#holo-glow)"/>
        
        <rect x="-100" y="-60" width="200" height="130" fill="rgba(10,10,32,0.6)" stroke="#00e5ff" stroke-width="1"/>
        
        <line x1="-120" y1="-80" x2="120" y2="-80" stroke="#cc00ff" stroke-width="4">
            <animate attributeName="stroke" values="#cc00ff;#00e5ff;#cc00ff" dur="3s" repeatCount="indefinite"/>
        </line>
        <line x1="-120" y1="120" x2="120" y2="120" stroke="#cc00ff" stroke-width="4">
            <animate attributeName="stroke" values="#cc00ff;#00e5ff;#cc00ff" dur="3s" repeatCount="indefinite"/>
        </line>
        
        <text x="0" y="-30" text-anchor="middle" fill="#00e5ff" font-family="'Orbitron', sans-serif" font-size="20" font-weight="bold" letter-spacing="2">PROOF OF</text>
        <text x="0" y="10" text-anchor="middle" fill="#cc00ff" font-family="'Orbitron', sans-serif" font-size="32" font-weight="900" letter-spacing="4" filter="url(#holo-glow)">SECURITY</text>
        
        <rect x="-30" y="25" width="60" height="15" fill="#00e5ff" rx="2"/>
        <text x="0" y="36" text-anchor="middle" fill="#02020a" font-family="monospace" font-size="10" font-weight="bold">Q.E.D.</text>

        <circle cx="90" cy="40" r="20" fill="none" stroke="#00e5ff" stroke-width="2" stroke-dasharray="4 4">
            <animateTransform attributeName="transform" type="rotate" from="0 90 40" to="360 90 40" dur="5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="90" cy="40" r="14" fill="rgba(0,229,255,0.2)" stroke="#cc00ff" stroke-width="2"/>
        <text x="90" y="45" text-anchor="middle" fill="#00e5ff" font-size="12" font-weight="bold">✓</text>
    </g>

    <text x="50" y="80" fill="#00e5ff" font-family="serif" font-size="30" opacity="0.5">∀</text>
    <text x="350" y="80" fill="#cc00ff" font-family="serif" font-size="30" opacity="0.5">∃</text>
    <text x="50" y="540" fill="#cc00ff" font-family="serif" font-size="30" opacity="0.5">⊢</text>
    <text x="350" y="540" fill="#00e5ff" font-family="serif" font-size="30" opacity="0.5">∴</text>

    <rect x="0" y="0" width="400" height="4" fill="rgba(0,229,255,0.5)">
        <animate attributeName="y" values="0;600;0" dur="4s" repeatCount="indefinite"/>
    </rect>
</svg>