<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="rwc-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#083344"/>
            <stop offset="60%" stop-color="#042f2e"/>
            <stop offset="100%" stop-color="#020617"/>
        </radialGradient>
        <linearGradient id="rwc-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5eead4"/>
            <stop offset="50%" stop-color="#0ea5e9"/>
            <stop offset="100%" stop-color="#0369a1"/>
        </linearGradient>
        <filter id="rwc-glow">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="rwc-map" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 0 30 Q 15 15 30 30 T 60 30" fill="none" stroke="#0e7490" stroke-width="0.5" opacity="0.3"/>
            <path d="M 30 0 Q 45 15 30 30 T 30 60" fill="none" stroke="#0f766e" stroke-width="0.5" opacity="0.3"/>
        </pattern>
    </defs>
    <rect width="400" height="600" fill="url(#rwc-bg)"/>
    <rect width="400" height="600" fill="url(#rwc-map)"/>

    <!-- Global Network / Real World Connectivity -->
    <g transform="translate(200, 260)">
        <g stroke="#06b6d4" fill="none" opacity="0.4">
            <!-- Latitude / Longitude lines -->
            <ellipse cx="0" cy="0" rx="140" ry="140" stroke-width="2"/>
            <ellipse cx="0" cy="0" rx="140" ry="70" stroke-width="1"/>
            <ellipse cx="0" cy="0" rx="70" ry="140" stroke-width="1"/>
            <path d="M -140 0 L 140 0 M 0 -140 L 0 140" stroke-width="1" stroke-dasharray="4 4"/>
        </g>
        
        <!-- Orbital Satellites / Nodes -->
        <g>
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
            <circle cx="140" cy="0" r="4" fill="#67e8f9" filter="url(#rwc-glow)"/>
            <circle cx="-140" cy="0" r="4" fill="#5eead4" filter="url(#rwc-glow)"/>
        </g>
        <g>
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="20s" repeatCount="indefinite"/>
            <circle cx="0" cy="140" r="3" fill="#38bdf8"/>
            <circle cx="0" cy="-140" r="3" fill="#34d399"/>
        </g>
    </g>

    <!-- Central Infrastructure / Cloud Security -->
    <g transform="translate(200, 260)" filter="url(#rwc-glow)">
        <!-- Hexagonal Infrastructure Nodes -->
        <path d="M 0 -80 L 69.3 -40 L 69.3 40 L 0 80 L -69.3 40 L -69.3 -40 Z" fill="#082f49" stroke="url(#rwc-neon)" stroke-width="3" opacity="0.9"/>
        <path d="M 0 -60 L 52 -30 L 52 30 L 0 60 L -52 30 L -52 -30 Z" fill="none" stroke="#2dd4bf" stroke-width="1" stroke-dasharray="5 5">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
        </path>
        
        <!-- Central Padlock Cloud -->
        <path d="M -25 -10 V -30 A 25 25 0 0 1 25 -30 V -10" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
        <rect x="-35" y="-10" width="70" height="50" rx="10" fill="#042f2e" stroke="url(#rwc-neon)" stroke-width="2"/>
        
        <!-- Inner Circuit -->
        <circle cx="0" cy="15" r="8" fill="#5eead4"/>
        <path d="M -3 15 L -6 30 L 6 30 L 3 15 Z" fill="#5eead4"/>
        
        <!-- Network Connection points on Hexagon -->
        <circle cx="0" cy="-80" r="5" fill="#bae6fd"/>
        <circle cx="69.3" cy="-40" r="5" fill="#bae6fd"/>
        <circle cx="69.3" cy="40" r="5" fill="#bae6fd"/>
        <circle cx="0" cy="80" r="5" fill="#bae6fd"/>
        <circle cx="-69.3" cy="40" r="5" fill="#bae6fd"/>
        <circle cx="-69.3" cy="-40" r="5" fill="#bae6fd"/>

        <path d="M 0 -80 L 0 -130 M 69.3 -40 L 110 -65 M 69.3 40 L 110 65 M 0 80 L 0 130 M -69.3 40 L -110 65 M -69.3 -40 L -110 -65" stroke="url(#rwc-neon)" stroke-width="2" stroke-dasharray="4 4" opacity="0.6"/>
    </g>

    <!-- Typography -->
    <text x="200" y="475" text-anchor="middle" fill="#5eead4" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="900" letter-spacing="6" filter="url(#rwc-glow)">RWC</text>
    <path d="M 50 500 L 350 500" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="2 4" opacity="0.5"/>
    <text x="200" y="525" text-anchor="middle" fill="#bae6fd" font-family="'Times New Roman', Times, serif" font-size="16" letter-spacing="2">Real World Cryptography</text>
</svg>