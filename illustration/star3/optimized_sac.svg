<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="sac-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#0f171e"/>
            <stop offset="100%" stop-color="#05080a"/>
        </radialGradient>
        <linearGradient id="sac-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ffa3"/>
            <stop offset="100%" stop-color="#0066ff"/>
        </linearGradient>
        <filter id="sac-glow">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="sbox-grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <rect width="40" height="40" fill="none" stroke="#00ffa3" stroke-width="0.5" opacity="0.1"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#sac-bg)"/>
    <rect width="400" height="600" fill="url(#sbox-grid)"/>

    <g transform="translate(120, 160)" filter="url(#sac-glow)">
        <rect x="0" y="0" width="160" height="160" rx="4" fill="rgba(0,255,163,0.05)" stroke="url(#sac-neon)" stroke-width="2"/>
        
        <g stroke="#0066ff" stroke-width="1.5" opacity="0.6">
            <line x1="40" y1="0" x2="40" y2="160"/>
            <line x1="80" y1="0" x2="80" y2="160"/>
            <line x1="120" y1="0" x2="120" y2="160"/>
            <line x1="0" y1="40" x2="160" y2="40"/>
            <line x1="0" y1="80" x2="160" y2="80"/>
            <line x1="0" y1="120" x2="160" y2="120"/>
        </g>
    </g>

    <g fill="none" stroke="#00ffa3" stroke-width="3" stroke-dasharray="10 15" opacity="0.8">
        <path d="M60 200 L120 200">
            <animate attributeName="stroke-dashoffset" values="25;0" dur="1s" repeatCount="indefinite"/>
        </path>
        <path d="M60 280 L120 280">
            <animate attributeName="stroke-dashoffset" values="25;0" dur="1.2s" repeatCount="indefinite"/>
        </path>
        <path d="M280 240 L340 240">
            <animate attributeName="stroke-dashoffset" values="25;0" dur="0.9s" repeatCount="indefinite"/>
        </path>
        <path d="M280 320 L340 320">
            <animate attributeName="stroke-dashoffset" values="25;0" dur="1.1s" repeatCount="indefinite"/>
        </path>
    </g>

    <g transform="translate(200, 420)">
        <polygon points="-50,-30 0,-60 50,-30 50,30 0,60 -50,30" fill="none" stroke="#00ffa3" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite"/>
        </polygon>
        <polygon points="-40,-24 0,-48 40,-24 40,24 0,48 -40,24" fill="rgba(0,102,255,0.2)" stroke="#0066ff" stroke-width="2">
            <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="10s" repeatCount="indefinite"/>
        </polygon>
        <text x="0" y="10" text-anchor="middle" fill="#00ffa3" font-family="'Orbitron', monospace" font-size="28" font-weight="bold" filter="url(#sac-glow)">SAC</text>
    </g>
    
    <text x="200" y="540" text-anchor="middle" fill="#00ffa3" font-family="sans-serif" font-size="16" letter-spacing="2">SYMMETRIC AREAS IN</text>
    <text x="200" y="560" text-anchor="middle" fill="#0066ff" font-family="sans-serif" font-size="16" letter-spacing="2">CRYPTOGRAPHY</text>
</svg>