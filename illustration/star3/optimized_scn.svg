<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="scn-bg" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#021426"/>
            <stop offset="100%" stop-color="#01060e"/>
        </radialGradient>
        <linearGradient id="scn-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00ff87"/>
            <stop offset="100%" stop-color="#60efff"/>
        </linearGradient>
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill="#60efff" opacity="0.15"/>
        </pattern>
    </defs>

    <!-- Deep Space Network Background -->
    <rect width="400" height="600" fill="url(#scn-bg)"/>
    <rect width="400" height="600" fill="url(#dot-grid)"/>

    <!-- Cybernetic Tree / Nodes -->
    <g stroke="#60efff" stroke-width="1.5" opacity="0.5">
        <path d="M200 150 L100 250 L150 350 L200 400 L250 350 L300 250 Z" fill="none"/>
        <path d="M100 250 L200 300 L300 250" fill="none"/>
        <path d="M200 150 L200 300 L200 400" fill="none" stroke-dasharray="4,4">
            <animate attributeName="stroke-dashoffset" values="8;0" dur="0.5s" repeatCount="indefinite"/>
        </path>
    </g>

    <!-- Pulsing Node Particles -->
    <g fill="#00ff87">
        <circle cx="200" cy="150" r="5" filter="url(#neon-glow)"/>
        <circle cx="100" cy="250" r="4" filter="url(#neon-glow)"/>
        <circle cx="300" cy="250" r="4" filter="url(#neon-glow)"/>
        <circle cx="150" cy="350" r="5" filter="url(#neon-glow)"/>
        <circle cx="250" cy="350" r="5" filter="url(#neon-glow)"/>
        <circle cx="200" cy="400" r="6" filter="url(#neon-glow)">
            <animate attributeName="r" values="6;9;6" dur="1s" repeatCount="indefinite"/>
        </circle>
    </g>

    <!-- Glassmorphic Central Shield Ring -->
    <g transform="translate(200, 260)">
        <circle cx="0" cy="0" r="75" fill="rgba(0, 255, 135, 0.05)" stroke="url(#scn-neon)" stroke-width="2" filter="url(#neon-glow)"/>
        <circle cx="0" cy="0" r="65" fill="none" stroke="#60efff" stroke-width="1" stroke-dasharray="10 10">
            <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="10s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Padlock / Lock Element -->
        <rect x="-20" y="-5" width="40" height="30" rx="4" fill="#01060e" stroke="#00ff87" stroke-width="2"/>
        <path d="M-12 -5 v-10 a 12 12 0 0 1 24 0 v10" fill="none" stroke="#00ff87" stroke-width="2"/>
        <circle cx="0" cy="10" r="4" fill="#60efff"/>
        <path d="M0 14 L0 20" stroke="#60efff" stroke-width="2"/>
    </g>

    <!-- Framing & Borders -->
    <g fill="none" stroke="#60efff" stroke-width="2" opacity="0.6">
        <path d="M10 50 L10 10 L50 10"/>
        <path d="M390 50 L390 10 L350 10"/>
        <path d="M10 550 L10 590 L50 590"/>
        <path d="M390 550 L390 590 L350 590"/>
    </g>

    <!-- Typography -->
    <text x="200" y="480" text-anchor="middle" fill="#00ff87" font-family="'Space Mono', monospace" font-size="40" font-weight="bold" filter="url(#neon-glow)">SCN</text>
    <text x="200" y="510" text-anchor="middle" fill="#60efff" font-family="sans-serif" font-size="12" letter-spacing="3" opacity="0.8">SECURITY CRYPTOGRAPHY NETWORKS</text>
    
    <!-- Glitch / Data stream lines -->
    <rect x="50" y="540" width="300" height="2" fill="rgba(96, 239, 255, 0.2)"/>
    <rect x="150" y="539" width="40" height="4" fill="#00ff87" filter="url(#neon-glow)">
        <animate attributeName="x" values="50;310;50" dur="4s" repeatCount="indefinite" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    </rect>
</svg>