<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="tches-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#2c1a06"/>
            <stop offset="60%" stop-color="#140a02"/>
            <stop offset="100%" stop-color="#0a0501"/>
        </radialGradient>
        <linearGradient id="tches-gold" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fdf6e3"/>
            <stop offset="30%" stop-color="#fbbf24"/>
            <stop offset="70%" stop-color="#b45309"/>
            <stop offset="100%" stop-color="#78350f"/>
        </linearGradient>
        <linearGradient id="tches-copper" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f87171"/>
            <stop offset="50%" stop-color="#ea580c"/>
            <stop offset="100%" stop-color="#9a3412"/>
        </linearGradient>
        <filter id="tches-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="tches-pcb" width="60" height="60" patternUnits="userSpaceOnUse">
            <path d="M 0 30 L 15 30 L 25 20 L 35 20 L 45 30 L 60 30" fill="none" stroke="#b45309" stroke-width="1" opacity="0.2"/>
            <path d="M 30 0 L 30 15 L 20 25 L 20 35 L 30 45 L 30 60" fill="none" stroke="#d97706" stroke-width="1" opacity="0.15"/>
            <circle cx="30" cy="30" r="2" fill="#f59e0b" opacity="0.3"/>
            <circle cx="15" cy="30" r="1.5" fill="#f59e0b" opacity="0.3"/>
            <circle cx="45" cy="30" r="1.5" fill="#f59e0b" opacity="0.3"/>
        </pattern>
    </defs>
    <rect width="400" height="600" fill="url(#tches-bg)"/>
    <rect width="400" height="600" fill="url(#tches-pcb)"/>

    <!-- Integrated Circuit Traces -->
    <g fill="none" stroke="url(#tches-gold)" stroke-width="1.5" opacity="0.6">
        <path d="M 50 100 L 120 100 L 150 130 L 150 200"/>
        <path d="M 350 100 L 280 100 L 250 130 L 250 200"/>
        <path d="M 50 420 L 120 420 L 150 390 L 150 320"/>
        <path d="M 350 420 L 280 420 L 250 390 L 250 320"/>
        
        <!-- Data flow dots on traces -->
        <circle cx="50" cy="100" r="2" fill="#fbbf24">
            <animateMotion path="M 0 0 L 70 0 L 100 30 L 100 100" dur="2s" repeatCount="indefinite" />
        </circle>
        <circle cx="350" cy="420" r="2" fill="#fbbf24">
            <animateMotion path="M 0 0 L -70 0 L -100 -30 L -100 -100" dur="2.5s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Main Microchip Controller -->
    <g transform="translate(200, 260)" filter="url(#tches-glow)">
        <!-- Outer casing -->
        <rect x="-90" y="-90" width="180" height="180" rx="15" fill="#1c0a00" stroke="#b45309" stroke-width="4"/>
        <rect x="-82" y="-82" width="164" height="164" rx="10" fill="#291201" stroke="url(#tches-gold)" stroke-width="1.5"/>
        
        <!-- IC Pins (Top, Bottom, Left, Right) -->
        <g stroke="url(#tches-gold)" stroke-width="4" stroke-linecap="round">
            <!-- Top / Bottom -->
            <path d="M -60 -100 L -60 -90 M -30 -100 L -30 -90 M 0 -100 L 0 -90 M 30 -100 L 30 -90 M 60 -100 L 60 -90"/>
            <path d="M -60 100 L -60 90 M -30 100 L -30 90 M 0 100 L 0 90 M 30 100 L 30 90 M 60 100 L 60 90"/>
            <!-- Left / Right -->
            <path d="M -100 -60 L -90 -60 M -100 -30 L -90 -30 M -100 0 L -90 0 M -100 30 L -90 30 M -100 60 L -90 60"/>
            <path d="M 100 -60 L 90 -60 M 100 -30 L 90 -30 M 100 0 L 90 0 M 100 30 L 90 30 M 100 60 L 90 60"/>
        </g>
        
        <!-- CPU Silicon Core -->
        <rect x="-45" y="-45" width="90" height="90" rx="5" fill="#0f0500" stroke="url(#tches-copper)" stroke-width="2"/>
        
        <!-- Rotating logic gear inside core -->
        <g stroke="url(#tches-gold)" stroke-width="1" fill="none">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
            <circle cx="0" cy="0" r="30" stroke-dasharray="10,5"/>
            <circle cx="0" cy="0" r="22" stroke-dasharray="4,4"/>
            <path d="M 0 -22 L 0 22 M -22 0 L 22 0 M -15 -15 L 15 15 M -15 15 L 15 -15" stroke-width="0.5"/>
            <circle cx="0" cy="0" r="10" fill="url(#tches-gold)" opacity="0.8"/>
        </g>

        <!-- Sine wave power tracing -->
        <path d="M -45 0 Q -22.5 -30 0 0 T 45 0" fill="none" stroke="#ef4444" stroke-width="2">
            <animate attributeName="stroke-dasharray" values="5,15; 15,5" dur="1s" repeatCount="indefinite"/>
        </path>
    </g>

    <!-- Branding -->
    <text x="200" y="490" text-anchor="middle" fill="#fef3c7" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="900" letter-spacing="4" filter="url(#tches-glow)">TCHES</text>
    <text x="200" y="530" text-anchor="middle" fill="#fbbf24" font-family="'Times New Roman', Times, serif" font-size="16" letter-spacing="1">Transactions on CHES</text>
    <text x="200" y="555" text-anchor="middle" fill="#d97706" font-family="'Courier New', Courier, monospace" font-size="9" letter-spacing="2">CRYPTOGRAPHIC HARDWARE &amp; EMBEDDED SYSTEMS</text>
</svg>