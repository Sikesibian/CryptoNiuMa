<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <radialGradient id="tosc-bg" cx="50%" cy="50%" r="75%">
            <stop offset="0%" stop-color="#111827"/>
            <stop offset="70%" stop-color="#05070e"/>
            <stop offset="100%" stop-color="#020305"/>
        </radialGradient>
        <linearGradient id="tosc-neon" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#60a5fa"/>
            <stop offset="50%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#1d4ed8"/>
        </linearGradient>
        <linearGradient id="tosc-purple" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa"/>
            <stop offset="100%" stop-color="#4c1d95"/>
        </linearGradient>
        <filter id="tosc-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <pattern id="tosc-tech-bg" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e3a8a" stroke-width="0.3" opacity="0.3"/>
            <circle cx="30" cy="30" r="1" fill="#3b82f6" opacity="0.5"/>
        </pattern>
    </defs>
    <rect width="400" height="600" fill="url(#tosc-bg)"/>
    <rect width="400" height="600" fill="url(#tosc-tech-bg)"/>
    
    <!-- Schematic Diagram / Cipher Blocks -->
    <g transform="translate(0, 30)" filter="url(#tosc-glow)">
        <g stroke="#3b82f6" fill="none" opacity="0.15" stroke-width="1">
            <path d="M 40 0 L 40 600 M 120 0 L 120 600 M 200 0 L 200 600 M 280 0 L 280 600 M 360 0 L 360 600 M 0 60 L 400 60 M 0 160 L 400 160 M 0 260 L 400 260 M 0 360 L 400 360"/>
        </g>
        
        <!-- Core Encryption Boxes (Feistel-like structure) -->
        <g stroke-width="2">
            <rect x="80" y="80" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-neon)"/>
            <rect x="220" y="80" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-purple)"/>
            
            <rect x="80" y="200" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-purple)"/>
            <rect x="220" y="200" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-neon)"/>
            
            <rect x="80" y="320" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-neon)"/>
            <rect x="220" y="320" width="100" height="50" rx="6" fill="#0f172a" stroke="url(#tosc-purple)"/>
        </g>
        
        <!-- Cross Wiring with Animation -->
        <g fill="none" stroke="url(#tosc-neon)" stroke-width="2" stroke-linecap="round">
            <path d="M 130 130 L 130 150 L 270 180 L 270 200" stroke-dasharray="5,5">
                <animate attributeName="stroke-dashoffset" values="20;0" dur="1s" repeatCount="indefinite" />
            </path>
            <path d="M 270 130 L 270 150 L 130 180 L 130 200" stroke="url(#tosc-purple)" stroke-dasharray="5,5">
                <animate attributeName="stroke-dashoffset" values="0;20" dur="1.2s" repeatCount="indefinite" />
            </path>
            
            <path d="M 130 250 L 130 270 L 270 300 L 270 320" stroke="url(#tosc-purple)" stroke-dasharray="5,5">
                <animate attributeName="stroke-dashoffset" values="20;0" dur="1.3s" repeatCount="indefinite" />
            </path>
            <path d="M 270 250 L 270 270 L 130 300 L 130 320" stroke="url(#tosc-neon)" stroke-dasharray="5,5">
                <animate attributeName="stroke-dashoffset" values="0;20" dur="1s" repeatCount="indefinite" />
            </path>
            
            <!-- XOR operations circles -->
            <circle cx="130" cy="180" r="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
            <path d="M 125 180 L 135 180 M 130 175 L 130 185" stroke="#818cf8" stroke-width="1.5"/>
            
            <circle cx="270" cy="180" r="8" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
            <path d="M 265 180 L 275 180 M 270 175 L 270 185" stroke="#818cf8" stroke-width="1.5"/>
            
            <circle cx="130" cy="300" r="8" fill="#1e1b4b" stroke="#c084fc" stroke-width="2"/>
            <path d="M 125 300 L 135 300 M 130 295 L 130 305" stroke="#c084fc" stroke-width="1.5"/>
            
            <circle cx="270" cy="300" r="8" fill="#1e1b4b" stroke="#c084fc" stroke-width="2"/>
            <path d="M 265 300 L 275 300 M 270 295 L 270 305" stroke="#c084fc" stroke-width="1.5"/>
        </g>
        
        <!-- Text inside boxes -->
        <g fill="#bfdbfe" font-family="'Courier New', Courier, monospace" font-size="12" font-weight="bold" text-anchor="middle">
            <text x="130" y="110">L_{i-1}</text>
            <text x="270" y="110">R_{i-1}</text>
            <text x="130" y="230">L_{i}</text>
            <text x="270" y="230">R_{i}</text>
            <text x="130" y="350">L_{i+1}</text>
            <text x="270" y="350">R_{i+1}</text>
        </g>
    </g>

    <g transform="translate(200, 470)">
        <circle cx="0" cy="0" r="55" fill="#1e3a8a" stroke="url(#tosc-neon)" stroke-width="3" filter="url(#tosc-glow)"/>
        <circle cx="0" cy="0" r="45" fill="#020617"/>
        <path d="M-30 0 L30 0 M0 -30 L0 30 M-20 -20 L20 20 M-20 20 L20 -20" stroke="#3b82f6" stroke-width="0.5" stroke-dasharray="2,2">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
        </path>
        <circle cx="0" cy="0" r="28" fill="url(#tosc-purple)" opacity="0.3"/>
        <text x="0" y="8" text-anchor="middle" fill="#e0e7ff" font-family="'Courier New', Courier, monospace" font-size="24" font-weight="900" letter-spacing="2" filter="url(#tosc-glow)">ToSC</text>
    </g>
    <text x="200" y="560" text-anchor="middle" fill="#93c5fd" font-family="'Times New Roman', Times, serif" font-size="18" font-weight="bold" letter-spacing="1">Transactions on Symmetric Cryptology</text>
    <text x="200" y="580" text-anchor="middle" fill="#60a5fa" font-family="'Courier New', Courier, monospace" font-size="10" letter-spacing="3" opacity="0.6">F E I S T E L   N E T W O R K</text>
</svg>