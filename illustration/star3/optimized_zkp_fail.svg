<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="zkp-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#020617"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>

        <filter id="zkp-glow-red" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="zkp-glow-cyan" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="zkp-glow-green" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <filter id="zkp-glow-yellow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <pattern id="zkp-circuit-grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 15 L 0 15 M 15 30 L 15 0" fill="none" stroke="rgba(45, 212, 191, 0.05)" stroke-width="1"/>
            <circle cx="15" cy="15" r="1" fill="rgba(45, 212, 191, 0.1)"/>
        </pattern>
    </defs>

    <rect width="400" height="600" fill="url(#zkp-bg)"/>
    <rect width="400" height="600" fill="url(#zkp-circuit-grid)">
        <animateTransform attributeName="transform" type="translate" values="0,0; -30,-30; 0,0" dur="10s" repeatCount="indefinite" calcMode="linear"/>
    </rect>

    <!-- Top Concept: Arithmetic Circuit & The Exploit -->
    <g transform="translate(200, 140)">
        <!-- Background wires -->
        <g stroke="#334155" stroke-width="2" fill="none">
            <path d="M -120,-60 L -60,-60 L -40,-20 L 0,-20"/>
            <path d="M -120,20 L -60,20 L -40,-20"/>
            <path d="M 0,-20 L 40,-20 L 60,0 L 100,0"/>
            <path d="M 0,60 L 40,60 L 60,0"/>
        </g>
        
        <!-- Missing Constraint Link -->
        <path d="M -40,-20 L 0,20" stroke="#f43f5e" stroke-width="2" stroke-dasharray="4 4" filter="url(#zkp-glow-red)">
            <animate attributeName="stroke-dashoffset" from="16" to="0" dur="1s" repeatCount="indefinite" calcMode="linear"/>
            <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
        </path>
        
        <!-- Nodes -->
        <!-- Public Input X -->
        <circle cx="-120" cy="-60" r="10" fill="#0f172a" stroke="#2dd4bf" stroke-width="2" filter="url(#zkp-glow-cyan)"/>
        <text x="-120" y="-56" fill="#2dd4bf" text-anchor="middle" font-family="'Courier New', monospace" font-size="10">X</text>
        
        <!-- Malicious Witness w' -->
        <circle cx="-120" cy="20" r="12" fill="#0f172a" stroke="#f43f5e" stroke-width="2" filter="url(#zkp-glow-red)">
            <animate attributeName="r" values="12;15;12" dur="1s" repeatCount="indefinite"/>
        </circle>
        <text x="-120" y="24" fill="#f43f5e" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="bold">w'</text>

        <!-- Honest gates -->
        <rect x="-50" y="-30" width="20" height="20" rx="4" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
        <text x="-40" y="-16" fill="#2dd4bf" text-anchor="middle" font-family="'Courier New', monospace" font-size="12">×</text>

        <rect x="50" y="-10" width="20" height="20" rx="4" fill="#0f172a" stroke="#2dd4bf" stroke-width="2"/>
        <text x="60" y="4" fill="#2dd4bf" text-anchor="middle" font-family="'Courier New', monospace" font-size="12">+</text>

        <!-- Missing Check Gate -->
        <g transform="translate(0, 20)">
            <rect x="-15" y="-15" width="30" height="30" rx="4" fill="rgba(244, 63, 94, 0.1)" stroke="#f43f5e" stroke-dasharray="2 2" stroke-width="2"/>
            <text x="0" y="3" fill="#f43f5e" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" font-weight="bold">w(w-1)</text>
            <path d="M -10,-10 L 10,10 M 10,-10 L -10,10" stroke="#f43f5e" stroke-width="2" filter="url(#zkp-glow-red)">
                <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
            </path>
            <text x="0" y="25" fill="#f43f5e" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" filter="url(#zkp-glow-red)">UNCONSTRAINED</text>
        </g>

        <!-- Payload Animations -->
        <circle r="4" fill="#f43f5e" filter="url(#zkp-glow-red)">
            <!-- Path bypassing the check -->
            <animateMotion path="M -120,20 L -60,20 L -40,-20 L 0,-20 L 40,-20 L 60,0 L 100,0" dur="3s" repeatCount="indefinite" rotate="auto"/>
        </circle>
        <circle r="3" fill="#2dd4bf" filter="url(#zkp-glow-cyan)">
            <animateMotion path="M -120,-60 L -60,-60 L -40,-20" dur="3s" repeatCount="indefinite" rotate="auto"/>
        </circle>

        <!-- Fake Proof Token -->
        <g transform="translate(100, 0)">
            <path d="M -12,0 L 0,-15 L 12,0 L 0,15 Z" fill="#0f172a" stroke="#eab308" stroke-width="2" filter="url(#zkp-glow-yellow)">
                <animateTransform attributeName="transform" type="rotate" values="0;180;360" dur="4s" repeatCount="indefinite"/>
            </path>
            <text x="0" y="4" fill="#eab308" text-anchor="middle" font-family="'Times New Roman', serif" font-size="12" font-style="italic" font-weight="bold">π'</text>
        </g>
    </g>

    <!-- Code & Console Section -->
    <g transform="translate(200, 360)">
        <!-- Prover vulnerability code -->
        <rect x="-185" y="-110" width="370" height="90" rx="6" fill="#09090b" stroke="#3f3f46" stroke-width="1.5"/>
        <rect x="-185" y="-110" width="370" height="20" rx="6" fill="#18181b"/>
        <circle cx="-170" cy="-100" r="3" fill="#ff5f56"/>
        <circle cx="-160" cy="-100" r="3" fill="#ffbd2e"/>
        <circle cx="-150" cy="-100" r="3" fill="#28c840"/>
        <text x="0" y="-96" fill="#71717a" font-family="'Courier New', monospace" font-size="10" text-anchor="middle">circuit.circom (Prover)</text>
        
        <g font-family="'Courier New', monospace" font-size="10" transform="translate(-175, -75)">
            <text x="0" y="0" fill="#c678dd">template</text> <text x="55" y="0" fill="#61afef">VoteSystem() {</text>
            <text x="10" y="15" fill="#c678dd">signal input</text> <text x="95" y="15" fill="#abb2bf">w;</text>  <text x="120" y="15" fill="#5c6370">// expected 0 or 1</text>
            
            <rect x="5" y="24" width="340" height="14" fill="rgba(244, 63, 94, 0.15)"/>
            <text x="10" y="34" fill="#5c6370">// VULNERABILITY: Boolean constraint missing!</text>
            <text x="10" y="49" fill="#f43f5e" text-decoration="line-through">w * (1 - w) === 0;</text>
            <text x="140" y="49" fill="#f43f5e" font-weight="bold" filter="url(#zkp-glow-red)">&lt;-- BUG: Malicious w=42 allowed</text>
        </g>

        <!-- Verifier Acceptance (The Soundness failure) -->
        <rect x="-185" y="-5" width="370" height="110" rx="6" fill="#020617" stroke="#34d399" stroke-width="1.5">
            <animate attributeName="stroke" values="#34d399;#f43f5e;#34d399" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="-185" y="-5" width="370" height="18" fill="rgba(52, 211, 153, 0.1)"/>
        <text x="-175" y="8" fill="#34d399" font-family="'Courier New', monospace" font-size="10" font-weight="bold">&gt;_ snarkjs groth16 verify</text>

        <g font-family="'Courier New', monospace" font-size="9" transform="translate(-175, 28)">
            <text x="0" y="0" fill="#94a3b8">[+] Loading verification key ...</text>
            <text x="0" y="14" fill="#94a3b8">[+] Loading forged proof (π') ...</text>
            <text x="0" y="28" fill="#94a3b8">[+] Checking Pairings: e(A,B) == e(α,β) ⋅ e(C,δ)</text>
            
            <g>
                <animate attributeName="opacity" values="0;1;1" keyTimes="0;0.5;1" dur="2s" repeatCount="indefinite"/>
                <rect x="-5" y="38" width="350" height="16" fill="rgba(52, 211, 153, 0.2)"/>
                <text x="0" y="49" fill="#34d399" font-weight="bold" font-size="10" filter="url(#zkp-glow-green)">[OK] Proof Verified Successfully.</text>
                <text x="0" y="65" fill="#f43f5e" font-weight="bold" filter="url(#zkp-glow-red)">FATAL: FALSE STATEMENT ACCEPTED (Soundness Broken!)</text>
            </g>
        </g>
    </g>

    <!-- Footer Title -->
    <g transform="translate(200, 540)">
        <polygon points="-160,-16 160,-16 170,16 -170,16" fill="#1f070e" stroke="#f43f5e" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" fill="#fda4af" font-family="'Times New Roman', serif" font-size="15" font-weight="bold" letter-spacing="2" filter="url(#zkp-glow-red)">
            ZKP 证明伪造：算术电路约束缺失
        </text>
        <rect x="-165" y="-12" width="330" height="24" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="10 30 50 15 5 200">
             <animate attributeName="stroke-dashoffset" from="300" to="0" dur="2s" repeatCount="indefinite" calcMode="linear"/>
        </rect>
    </g>
</svg>